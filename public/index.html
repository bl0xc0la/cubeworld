<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CUBEWORLD | PLATFORM</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --panel: #111111;
            --accent: #00a2ff;
            --accent-glow: rgba(0, 162, 255, 0.3);
            --border: #222222;
            --text: #ffffff;
            --text-dim: #666666;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* AUTH UI */
        #auth-gate {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: var(--panel);
            padding: 50px;
            border-radius: 4px;
            border: 1px solid var(--border);
            width: 380px;
            text-align: center;
        }
        input {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            padding: 12px;
            color: white;
            margin-bottom: 10px;
            font-family: monospace;
        }
        button {
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
        }
        .nav-link {
            padding: 15px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        .nav-link:hover { color: white; background: #1a1a1a; }
        .nav-link.active { color: var(--accent); background: rgba(0, 162, 255, 0.05); }

        /* MAIN CONTENT */
        .viewport { flex: 1; display: flex; flex-direction: column; }
        .header {
            height: 80px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }
        .view-section { padding: 40px; display: none; flex: 1; overflow-y: auto; }
        .active-view { display: block; }

        /* CARDS */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .item-card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 20px;
            transition: 0.3s;
        }
        .item-card:hover { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

        /* CHAT */
        #chat-sys {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 320px;
            background: var(--panel);
            border: 1px solid var(--border);
            display: none;
            flex-direction: column;
        }
        #msg-box { height: 200px; overflow-y: auto; padding: 15px; font-size: 12px; font-family: monospace; }
        
        #three-canvas { display: none; width: 100%; height: 100%; }

        .btn-action {
            background: var(--accent);
            border: none;
            color: black;
            padding: 12px 20px;
            width: 100%;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="auth-card">
            <h2 style="letter-spacing: 5px; margin-bottom: 30px;">CUBEWORLD</h2>
            <input type="text" id="u" placeholder="USERNAME">
            <input type="password" id="p" placeholder="PASSWORD">
            <button class="btn-action" onclick="auth('login')">INITIALIZE</button>
            <p onclick="auth('register')" style="font-size: 10px; color: var(--text-dim); margin-top: 20px; cursor: pointer;">REGISTER NEW IDENTITY</p>
        </div>
    </div>

    <div class="sidebar">
        <h3 style="letter-spacing: 2px; color: var(--accent); margin-bottom: 40px;">CW_CORE</h3>
        <div class="nav-link active" onclick="tab('home')">DASHBOARD</div>
        <div class="nav-link" onclick="tab('games')">DIRECTORY</div>
        <div class="nav-link" onclick="tab('studio')">STUDIO</div>
        <div class="nav-link" onclick="tab('shop')">MARKET</div>
        <div id="adm-nav" class="nav-link hidden" style="color: #ff4444;" onclick="tab('admin')">ADMIN_ROOT</div>
    </div>

    <div class="viewport">
        <div class="header">
            <div id="user-id" style="font-family: monospace; font-size: 14px;">GUEST</div>
            <div style="color: var(--accent); font-weight: bold;"><span id="bal">0</span> CUBES</div>
        </div>

        <div id="home" class="view-section active-view">
            <h1>SYSTEM OVERVIEW</h1>
            <div class="card-grid">
                <div class="item-card"><h4>ACTIVE USERS</h4><p id="pop">1,204</p></div>
                <div class="item-card"><h4>SERVER LATENCY</h4><p>24MS</p></div>
            </div>
        </div>

        <div id="games" class="view-section">
            <h1>GLOBAL DIRECTORY</h1>
            <button class="btn-action" style="width: 200px;" onclick="joinWorld()">JOIN MULTIPLAYER WORLD</button>
        </div>

        <div id="studio" class="view-section">
            <h1>3D STUDIO ENGINE</h1>
            <button class="btn-action" style="width: 200px;" onclick="bootStudio()">LAUNCH RENDERER</button>
            <canvas id="three-canvas"></canvas>
        </div>

        <div id="admin" class="view-section">
            <h1 style="color: #ff4444;">ADMIN ROOT ACCESS</h1>
            <button class="btn-action" style="background: #ff4444;">WIPE GLOBAL CHAT</button>
        </div>
    </div>

    <div id="chat-sys">
        <div id="msg-box"></div>
        <input type="text" id="chat-in" placeholder="TYPE MESSAGE..." style="margin: 0; border: none; border-top: 1px solid var(--border);">
    </div>

    <script>
        const socket = io();
        let user = "";

        async function auth(mode) {
            const u = document.getElementById("u").value;
            const p = document.getElementById("p").value;
            const r = await fetch(`/api/${mode}`, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({username: u, password: p})
            });
            const d = await r.json();
            if(d.success) {
                if(mode === 'login') {
                    user = d.user;
                    document.getElementById("auth-gate").style.display = "none";
                    document.getElementById("user-id").innerText = user.toUpperCase();
                    document.getElementById("bal").innerText = d.cubes;
                    if(d.role === "Admin") document.getElementById("adm-nav").classList.remove("hidden");
                } else { alert("IDENTITY REGISTERED"); }
            }
        }

        function tab(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active-view');
            event.target.classList.add('active');
        }

        function joinWorld() {
            document.getElementById("chat-sys").style.display = "flex";
            socket.emit("join-session", {user: user});
        }

        document.getElementById("chat-in").addEventListener("keypress", (e) => {
            if(e.key === "Enter") {
                socket.emit("broadcast-chat", {u: user, m: e.target.value});
                e.target.value = "";
            }
        });

        socket.on("receive-chat", (data) => {
            const el = document.createElement("div");
            el.innerHTML = `<span style="color:var(--accent)">${data.u}:</span> ${data.m}`;
            document.getElementById("msg-box").appendChild(el);
        });

        function bootStudio() {
            const canvas = document.getElementById("three-canvas");
            canvas.style.display = "block";
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth/canvas.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({canvas: canvas, antialias: true});
            renderer.setSize(canvas.clientWidth, 400);

            const geo = new THREE.BoxGeometry();
            const mat = new THREE.MeshBasicMaterial({color: 0x00a2ff, wireframe: true});
            const mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);
            camera.position.z = 3;

            function anim() {
                requestAnimationFrame(anim);
                mesh.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            anim();
        }
    </script>
</body>
</html>
