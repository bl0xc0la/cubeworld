<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CubeWorld</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { 
            --accent: #0070ff; 
            --bg: #0e1117; 
            --panel: #161b22; 
            --border: #30363d;
            --text: #c9d1d9;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; }

        /* HEADER / TOPBAR */
        header { 
            height: 50px; 
            background: var(--panel); 
            border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
        }

        .logo { font-weight: 800; color: #fff; letter-spacing: -1px; font-size: 20px; }
        .logo span { color: var(--accent); }

        /* STUDIO LAYOUT */
        .studio-container { display: flex; height: calc(100vh - 50px); }

        /* SIDEBARS */
        aside { 
            width: 280px; background: var(--panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .right-bar { border-right: none; border-left: 1px solid var(--border); }

        .panel-header { 
            padding: 10px 15px; background: rgba(255,255,255,0.03); 
            font-size: 11px; font-weight: bold; text-transform: uppercase; color: #8b949e;
        }

        /* TOOLBOX & PROPERTIES */
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 15px; }
        .tool-btn { 
            background: #21262d; border: 1px solid var(--border); color: #fff; 
            padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .tool-btn:hover { background: var(--accent); border-color: var(--accent); }

        .prop-item { padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .prop-item label { font-size: 13px; }
        .prop-input { background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 4px 8px; border-radius: 4px; width: 100px; font-size: 12px; }

        /* VIEWPORT */
        main { flex: 1; position: relative; background: #000; }
        
        /* PLAYER LIST */
        .player-item { padding: 10px 15px; display: flex; align-items: center; font-size: 14px; border-bottom: 1px solid var(--border); }
        .status-dot { width: 8px; height: 8px; background: #238636; border-radius: 50%; margin-right: 10px; }

        /* ADMIN NOTIFICATION */
        #admin-badge { background: #f85149; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
    </style>
</head>
<body>

<header>
    <div class="logo">CUBE<span>WORLD</span> STUDIO</div>
    <div style="display: flex; align-items: center; gap: 20px;">
        <span style="font-size: 13px;">Cubes: <b style="color:#f1c40f">500</b></span>
        <button class="tool-btn" style="padding: 5px 15px; background: var(--accent);" onclick="studio.publish()">Publish</button>
    </div>
</header>

<div class="studio-container">
    <aside>
        <div class="panel-header">Toolbox</div>
        <div class="tool-grid">
            <button class="tool-btn" onclick="studio.addPart('Box')">Part</button>
            <button class="tool-btn" onclick="studio.addPart('Sphere')">Sphere</button>
            <button class="tool-btn" onclick="studio.addPart('Wedge')">Wedge</button>
            <button class="tool-btn" onclick="studio.addPart('Cylinder')">Cylinder</button>
        </div>
        
        <div class="panel-header">Explorer</div>
        <div id="explorer-list" style="flex:1; overflow-y:auto;">
            </div>
    </aside>

    <main id="viewport">
        </main>

    <aside class="right-bar">
        <div class="panel-header">Properties</div>
        <div id="property-panel">
            <div class="prop-item">
                <label>Name</label>
                <input class="prop-input" type="text" id="p-name" onchange="studio.updateProp('name', this.value)">
            </div>
            <div class="prop-item">
                <label>Color</label>
                <input class="prop-input" type="color" id="p-color" onchange="studio.updateProp('color', this.value)">
            </div>
        </div>

        <div class="panel-header" style="margin-top:20px">Players Online</div>
        <div id="online-list">
            <div class="player-item"><div class="status-dot"></div> Cola <span id="admin-badge">ADMIN</span></div>
        </div>
    </aside>
</div>

<script>
    const socket = io();
    let selectedObject = null;

    const studio = {
        scene: new THREE.Scene(),
        objects: [],
        init() {
            const container = document.getElementById('viewport');
            this.cam = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(this.renderer.domElement);
            
            this.scene.background = new THREE.Color(0x050505);
            this.scene.add(new THREE.GridHelper(50, 50, 0x30363d, 0x21262d));
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            
            this.cam.position.set(10, 10, 10);
            this.cam.lookAt(0,0,0);
            this.render();
        },
        addPart(type) {
            let geo;
            if(type === 'Sphere') geo = new THREE.SphereGeometry(0.5, 32, 32);
            else if(type === 'Wedge') geo = new THREE.CylinderGeometry(0, 1, 1, 4);
            else geo = new THREE.BoxGeometry(1,1,1);

            const mat = new THREE.MeshStandardMaterial({ color: 0x0070ff });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.name = type + "_" + this.objects.length;
            this.scene.add(mesh);
            this.objects.push(mesh);
            this.select(mesh);
            this.refreshExplorer();
        },
        select(obj) {
            selectedObject = obj;
            document.getElementById('p-name').value = obj.name;
            document.getElementById('p-color').value = "#" + obj.material.color.getHexString();
        },
        updateProp(prop, val) {
            if(!selectedObject) return;
            if(prop === 'name') selectedObject.name = val;
            if(prop === 'color') selectedObject.material.color.set(val);
            this.refreshExplorer();
        },
        refreshExplorer() {
            const list = document.getElementById('explorer-list');
            list.innerHTML = this.objects.map((obj, i) => `
                <div class="player-item" style="cursor:pointer; ${selectedObject === obj ? 'background:rgba(0,112,255,0.1)' : ''}" onclick="studio.select(studio.objects[${i}])">
                    📦 ${obj.name}
                </div>
            `).join('');
        },
        render() {
            requestAnimationFrame(() => this.render());
            this.renderer.render(this.scene, this.cam);
        }
    };

    window.addEventListener('resize', () => {
        const container = document.getElementById('viewport');
        studio.cam.aspect = container.clientWidth / container.clientHeight;
        studio.cam.updateProjectionMatrix();
        studio.renderer.setSize(container.clientWidth, container.clientHeight);
    });

    studio.init();
</script>
</body>
</html>
