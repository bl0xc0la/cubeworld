<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeWorld</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #05070a;
            --panel: #0d1117;
            --accent: #0070ff;
            --glass: rgba(255, 255, 255, 0.03);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 112, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* --- LOGIN --- */
        #login-view { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card { 
            background: var(--panel); padding: 40px; border-radius: 25px; width: 340px;
            box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        input { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; background: #000;
            color: white; margin-bottom: 10px; outline: none; border: 1px solid #222;
        }
        .btn-blue { 
            background: #0070ff; color: white; padding: 14px; border-radius: 12px; 
            border: none; width: 100%; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-blue:hover { background: #0056cc; transform: translateY(-2px); }

        /* --- LAYOUT --- */
        .app-shell { 
            display: grid; grid-template-columns: 240px 1fr 300px; height: 100vh; 
            padding: 15px; gap: 15px; visibility: hidden; 
        }

        .panel { 
            background: var(--panel); border-radius: 20px; box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.05); overflow: hidden; display: flex; flex-direction: column;
        }

        /* SIDEBAR (CLEAN) */
        .sidebar { padding: 20px; }
        .user-mini { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .pfp-circle { width: 45px; height: 45px; background: #000; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent); }
        .pfp-circle iframe { width: 100%; height: 100%; transform: scale(3); pointer-events: none; }

        .nav-link { padding: 12px 15px; cursor: pointer; color: #888; border-radius: 10px; margin-bottom: 5px; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--glass); color: white; }
        .nav-link.admin { color: #ff4757; margin-top: 20px; border: 1px solid rgba(255, 71, 87, 0.2); }

        /* VIEWS */
        main { overflow-y: auto; padding: 10px; }
        .view { display: none; }
        .view.active { display: block; }

        .card { background: var(--glass); padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03); }
        .game-item { display: flex; justify-content: space-between; align-items: center; }

        /* SOCIAL */
        .chat-area { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; }
        .chat-input-wrap { padding: 15px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 8px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-view">
    <div class="login-card">
        <h1 style="margin-bottom: 25px;">CubeWorld</h1>
        <input id="u-in" type="text" placeholder="Username">
        <input id="p-in" type="password" placeholder="Password">
        <button class="btn-blue" onclick="core.login()">Log In</button>
    </div>
</div>

<div class="app-shell" id="main-app">
    <aside class="panel sidebar">
        <div class="user-mini">
            <div class="pfp-circle">
                <iframe src="https://my.spline.design/untitled-rTr9O3JjlJGN8gVcG65A69Lz/"></iframe>
            </div>
            <div>
                <div id="u-name" style="font-weight: 700; font-size: 14px;">User</div>
                <div id="u-cubes" style="color: #f1c40f; font-size: 12px; font-weight: 700;">0 C</div>
            </div>
        </div>
        
        <div class="nav-link active" onclick="core.nav('games', this)">Games</div>
        <div class="nav-link" onclick="core.nav('studio', this)">Studio</div>
        <div class="nav-link" onclick="core.nav('avatar', this)">Avatar Shop</div>
        <div id="adm-link" class="nav-link admin hidden" onclick="core.nav('admin', this)">Admin Root</div>
        <div class="nav-link" style="margin-top:auto; opacity:0.5" onclick="core.logout()">Logout</div>
    </aside>

    <main class="panel">
        <section id="view-games" class="view active">
            <h2 style="margin-bottom: 15px;">Discover Games</h2>
            <div id="game-list">
                </div>
        </section>

        <section id="view-studio" class="view">
            <h2 style="margin-bottom: 15px;">Creator Studio</h2>
            <div class="card">
                <p style="margin-bottom: 10px; color: #888;">Publish a new game to the global feed.</p>
                <input id="game-title" placeholder="Project Name...">
                <button class="btn-blue" style="width: auto; padding: 10px 25px;" onclick="core.publish()">Publish Game</button>
            </div>
        </section>

        <section id="view-admin" class="view">
            <h2 style="color: #ff4757; margin-bottom: 15px;">System Console</h2>
            <div class="card">
                <input id="mod-target" placeholder="Username...">
                <button class="btn-blue" style="background: #ff4757;">Ban User</button>
            </div>
        </section>
    </main>

    <aside class="panel">
        <div style="padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 700;">Global Chat</div>
        <div class="chat-area" id="chat-logs"></div>
        <div class="chat-input-wrap">
            <input id="chat-in" placeholder="Type..." style="margin-bottom:0; padding:10px;">
            <button class="btn-blue" style="width:50px;" onclick="core.chat()">></button>
        </div>
    </aside>
</div>

<script>
    const socket = io();
    let session = JSON.parse(localStorage.getItem('cw_user'));

    const core = {
        init() {
            if (session) {
                document.getElementById("login-view").style.display = "none";
                document.getElementById("main-app").style.visibility = "visible";
                document.getElementById("u-name").innerText = session.name;
                document.getElementById("u-cubes").innerText = (session.name === "BloxColaYT") ? "∞ CUBES" : session.cubes + " CUBES";
                if (session.name === "BloxColaYT") document.getElementById("adm-link").classList.remove("hidden");
            }
        },
        login() {
            const username = document.getElementById("u-in").value;
            const password = document.getElementById("p-in").value;
            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            }).then(res => res.json()).then(data => {
                if(data.success) {
                    localStorage.setItem('cw_user', JSON.stringify({name: data.user, cubes: data.cubes}));
                    location.reload();
                }
            });
        },
        nav(id, el) {
            document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
            document.querySelectorAll(".nav-link").forEach(n => n.classList.remove("active"));
            document.getElementById("view-" + id).classList.add("active");
            el.classList.add("active");
        },
        publish() {
            const name = document.getElementById("game-title").value;
            if(!name) return;
            socket.emit("publish-game", { name, creator: session.name });
            document.getElementById("game-title").value = "";
            this.nav('games', document.querySelector('.nav-link'));
        },
        chat() {
            const text = document.getElementById("chat-in").value;
            if(!text) return;
            socket.emit("send-msg", { from: session.name, text });
            document.getElementById("chat-in").value = "";
        },
        logout() { localStorage.removeItem('cw_user'); location.reload(); }
    };

    socket.on("update-games", (games) => {
        const list = document.getElementById("game-list");
        list.innerHTML = games.map(g => `
            <div class="card game-item">
                <div><b>${g.name}</b><br><small style="color:#555">by ${g.creator}</small></div>
                <button class="btn-blue" style="width:auto; padding:8px 20px;">PLAY</button>
            </div>
        `).join('');
    });

    socket.on("new-msg", (data) => {
        const logs = document.getElementById("chat-logs");
        logs.innerHTML += `<div><b style="color:var(--accent)">${data.from}:</b> ${data.text}</div>`;
        logs.scrollTop = logs.scrollHeight;
    });

    core.init();
</script>
</body>
</html>
