<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CubeWorld</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --sidebar: #010409; --accent: #007bff; --text: #c9d1d9; --border: #30363d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Auth Overlay */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--panel); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 350px; text-align: center; }
        
        #sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); display: none; flex-direction: column; padding: 20px 0; }
        main { flex: 1; padding: 30px; display: none; overflow-y: auto; }
        .page { display: none; }
        .active { display: block; }

        .btn { background: var(--accent); color: #fff; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 10px; }
        input { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; width: 100%; margin-bottom: 15px; outline: none; }
        .link { color: var(--accent); cursor: pointer; font-size: 13px; margin-top: 15px; display: block; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h1 style="margin-bottom: 25px;">CubeWorld</h1>
        <div id="auth-form">
            <input id="auth-user" placeholder="Username">
            <input id="auth-pass" type="password" placeholder="Password">
            <button class="btn" id="auth-btn" onclick="handleAuth()">Login</button>
            <span class="link" id="auth-toggle" onclick="toggleAuthMode()">Need an account? Sign Up</span>
        </div>
    </div>
</div>

<div id="sidebar">
    <div style="padding: 0 25px 20px; font-weight: 800; font-size: 22px;">CubeWorld</div>
    <div class="nav-link" onclick="nav('games')">Discover</div>
    <div class="nav-link" onclick="nav('studio')">Studio</div>
    <div class="nav-link" style="margin-top:auto" onclick="logout()">Logout</div>
</div>

<main id="main-content">
    <div id="page-games" class="page active">
        <h1>Welcome, <span id="display-name"></span></h1>
        <p>CubeBucks: <span id="display-bucks">0</span></p>
    </div>
    </main>

<script>
    const socket = io();
    let isLoginMode = true;
    let currentUser = null;

    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-btn').innerText = isLoginMode ? 'Login' : 'Sign Up';
        document.getElementById('auth-toggle').innerText = isLoginMode ? 'Need an account? Sign Up' : 'Have an account? Login';
    }

    async function handleAuth() {
        const username = document.getElementById('auth-user').value;
        const password = document.getElementById('auth-pass').value;
        const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';

        const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        if (res.ok) {
            const data = await res.json();
            loginSuccess(data);
        } else {
            alert(await res.text());
        }
    }

    function loginSuccess(user) {
        currentUser = user;
        localStorage.setItem('cubeUser', JSON.stringify(user));
        
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('display-name').innerText = user.username;
        document.getElementById('display-bucks').innerText = user.cubebucks || 0;

        socket.emit('join-session', user.username);
    }

    function logout() {
        localStorage.removeItem('cubeUser');
        window.location.reload();
    }

    // Auto-login if session exists
    window.onload = () => {
        const savedUser = localStorage.getItem('cubeUser');
        if (savedUser) loginSuccess(JSON.parse(savedUser));
    };

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
    }
</script>
</body>
</html>
