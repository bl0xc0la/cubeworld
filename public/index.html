<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeWorld</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root {
            --bg: #111216; --sidebar: #191b20; --top: #1d2026;
            --panel: #20242b; --panel2: #2a2f38; --border: #313844;
            --text: #f1f5f9; --dim: #9ba4b2; --accent: #0066ff;
            --radius: 14px; --shadow: 0 10px 35px rgba(0,0,0,.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; font-weight: 400; }

        /* APP LAYOUT */
        .app { display: grid; grid-template-columns: 250px 1fr; grid-template-rows: 64px 1fr; height: 100vh; }

        header {
            grid-column: 1/-1; background: linear-gradient(to bottom, #232830, #1d2128);
            border-bottom: 1px solid var(--border); display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; z-index: 100;
        }

        .logo { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }

        .header-right { display: flex; gap: 10px; }
        .pill { background: #272d36; border: 1px solid var(--border); border-radius: 99px; padding: 6px 14px; font-size: 12px; font-weight: 600; }

        /* SIDEBAR */
        aside { background: #171b20; border-right: 1px solid var(--border); padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
        .nav-link { 
            padding: 12px 14px; border-radius: 10px; color: var(--dim); cursor: pointer; 
            transition: .2s; font-size: 14px; font-weight: 400;
        }
        .nav-link:hover { background: #262d36; color: white; }
        .nav-link.active { background: var(--accent); color: white; }

        /* MAIN CONTENT */
        main { overflow-y: auto; padding: 30px; }
        .view { display: none; }
        .view.active { display: block; }

        .hero { background: var(--accent); padding: 30px; border-radius: 18px; margin-bottom: 20px; }
        .hero h1 { font-size: 28px; font-weight: 600; }

        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); }

        /* AUTH OVERLAY */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-box { width: 340px; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 35px; text-align: center; }
        input { width: 100%; padding: 12px; background: #111317; border: 1px solid var(--border); border-radius: 10px; color: white; margin-bottom: 12px; outline: none; }
        
        .btn { border: none; cursor: pointer; border-radius: 10px; padding: 10px 20px; font-weight: 600; background: var(--accent); color: white; }

        /* STUDIO */
        #studio-ui { position: fixed; inset: 0; background: #000; display: none; z-index: 5000; }
        .studio-topbar { height: 50px; background: #1b1f24; border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 15px; gap: 10px; }
        .studio-viewport { position: absolute; left: 0; right: 0; top: 50px; bottom: 0; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 style="margin-bottom: 20px;">Cube<span>World</span></h2>
        <input id="login-user" type="text" placeholder="Username">
        <input id="login-pass" type="password" placeholder="Password">
        <button class="btn" style="width: 100%;" onclick="core.login()">Login</button>
    </div>
</div>

<div class="app">
    <header>
        <div class="logo">Cube<span>World</span></div>
        <div class="header-right">
            <div class="pill" id="user-display">Guest</div>
        </div>
    </header>

    <aside>
        <div class="nav-link active" onclick="core.nav('home', this)">Home</div>
        <div class="nav-link" onclick="core.nav('discover', this)">Discover</div>
        <div class="nav-link" onclick="core.nav('create', this)">Studio</div>
        <div class="nav-link" onclick="core.nav('social', this)">Messages</div>
    </aside>

    <main>
        <section id="view-home" class="view active">
            <div class="hero">
                <h1>Welcome Home</h1>
                <p>Build and explore the metaverse.</p>
            </div>
        </section>

        <section id="view-discover" class="view">
            <h2>Discover Games</h2>
            <p style="color:var(--dim)">Coming soon...</p>
        </section>

        <section id="view-create" class="view">
            <h2>CubeWorld Studio</h2>
            <div class="card" style="margin-top:20px;">
                <button class="btn" onclick="core.launchStudio()">Open Studio</button>
            </div>
        </section>

        <section id="view-social" class="view">
            <h2>Messages</h2>
            <div class="card" style="margin-top:20px;">
                <p style="color:var(--dim)">Connect with friends.</p>
            </div>
        </section>
    </main>
</div>

<div id="studio-ui">
    <div class="studio-topbar">
        <button class="btn" style="background:#ef4444" onclick="core.exitStudio()">Exit</button>
        <button class="btn" onclick="core.addPart()">Add Part</button>
    </div>
    <div class="studio-viewport" id="studio-canvas"></div>
</div>

<script>
    const socket = io();
    let user = "";

    const core = {
        scene: null, renderer: null, camera: null,

        async login() {
            const u = document.getElementById("login-user").value;
            const p = document.getElementById("login-pass").value;
            const res = await fetch('/api/login', {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            if(data.success) {
                user = data.user;
                document.getElementById("auth-overlay").classList.add("hidden");
                document.getElementById("user-display").innerText = user;
            } else {
                alert("Invalid Credentials");
            }
        },

        nav(id, el) {
            const target = document.getElementById("view-" + id);
            if (!target) {
                console.error("View not found: view-" + id);
                return;
            }
            
            // Remove active classes
            document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
            document.querySelectorAll(".nav-link").forEach(n => n.classList.remove("active"));
            
            // Add active classes
            target.classList.add("active");
            el.classList.add("active");
        },

        launchStudio() {
            document.getElementById("studio-ui").style.display = "block";
            this.init3D();
        },

        init3D() {
            const container = document.getElementById("studio-canvas");
            this.scene = new THREE.Scene();
            this.scene.background = new THREE.Color(0x0a0b0e);
            this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({antialias: true});
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(this.renderer.domElement);

            this.scene.add(new THREE.GridHelper(100, 100, 0x0066ff, 0x222222));
            this.camera.position.set(5, 5, 5);
            this.camera.lookAt(0,0,0);
            this.animate();
        },

        animate() {
            if(!this.renderer) return;
            requestAnimationFrame(() => this.animate());
            this.renderer.render(this.scene, this.camera);
        },

        addPart() {
            const cube = new THREE.Mesh(
                new THREE.BoxGeometry(1, 1, 1),
                new THREE.MeshBasicMaterial({color: 0x0066ff, wireframe: true})
            );
            cube.position.y = 0.5;
            this.scene.add(cube);
        },

        exitStudio() {
            location.reload();
        }
    };
</script>
</body>
</html>
