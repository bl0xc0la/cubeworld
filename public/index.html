<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CubeWorld v4</title>

<style>

:root{
    --bg:#070707;
    --panel:#0f0f0f;
    --gold:#d4af37;
    --gold2:#ffcc66;
    --shadow:0 10px 30px rgba(0,0,0,0.6);
    --radius:16px;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:white;
}

/* LOGIN */
#login{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;

    background: radial-gradient(circle at top, #1a1a1a, #000);
}

.box{
    width:320px;
    padding:20px;
    background:linear-gradient(145deg,#111,#000);
    border:1px solid #222;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:12px;
    background:#111;
    color:white;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    margin-top:6px;

    border:none;
    border-radius:12px;

    background:linear-gradient(145deg,var(--gold),var(--gold2));
    color:black;
    font-weight:bold;

    cursor:pointer;

    box-shadow:0 8px 20px rgba(212,175,55,0.3);
}

button:hover{
    transform:translateY(-1px);
}

/* APP */
.app{
    display:grid;
    grid-template-columns:220px 1fr;
    height:100vh;
}

.sidebar{
    background:linear-gradient(180deg,#0a0a0a,#111);
    border-right:1px solid #222;
    padding:12px;
}

.navBtn{
    background:#111;
    color:white;
    margin:6px 0;
}

.navBtn:hover{
    border:1px solid var(--gold);
}

.main{
    padding:16px;
}

/* CARDS */
.card{
    background:linear-gradient(145deg,#111,#0a0a0a);
    border:1px solid #1f1f1f;
    border-radius:var(--radius);
    padding:14px;
    box-shadow:var(--shadow);
    margin-bottom:10px;
}

.goldText{
    color:var(--gold);
}

.hidden{display:none}

</style>
</head>

<body>

<div id="login">
    <div class="box">
        <h2 class="goldText">CubeWorld</h2>

        <input id="u" placeholder="username">
        <input id="p" type="password" placeholder="password">

        <button onclick="login()">Login</button>
        <button onclick="register()">Register</button>
    </div>
</div>

<div class="app hidden" id="app">

<div class="sidebar">
    <button class="navBtn" onclick="show('home')">Home</button>
    <button class="navBtn" onclick="show('friends')">Friends</button>
    <button class="navBtn" onclick="show('studio')">Studio</button>
</div>

<div class="main">

<div id="home">
    <div class="card">
        Welcome <span id="user"></span>
    </div>
</div>

<div id="friends" class="hidden">
    <div class="card">
        Add Friend
        <input id="friend">
        <button onclick="addFriend()">Add</button>
    </div>
</div>

<div id="studio" class="hidden">
    <div class="card">
        CubeWorld Studio
        <button onclick="saveWorld()">Save World</button>
    </div>
</div>

</div>
</div>

<script>

let user = "";

async function register(){

    await fetch("/api/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:u.value,
            email:"test@test.com",
            password:p.value
        })
    });

}

async function login(){

    const res = await fetch("/api/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:u.value,
            password:p.value
        })
    });

    const data = await res.json();

    if(data.success){
        user = data.user;

        login.style.display="none";
        app.classList.remove("hidden");

        document.getElementById("user").innerText = user;
    }
}

/* FRIENDS */
function addFriend(){

    fetch("/api/friend/add",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            user,
            friend:friend.value
        })
    });

}

/* WORLD */
function saveWorld(){

    fetch("/api/world/save",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            gameId:"main",
            owner:user,
            data:{blocks:1}
        })
    });

}

/* NAV */
function show(id){

    document.querySelectorAll(".main > div")
    .forEach(d=>d.classList.add("hidden"));

    document.getElementById(id).classList.remove("hidden");
}

</script>

</body>
</html>
