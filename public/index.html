<!DOCTYPE html>
<html>
<head>
    <title>CubeWorld | Legacy + Modern</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/DragControls.js"></script>
    <style>
        :root { --accent: #0070ff; --sidebar: #161b22; --bg: #0d1117; --border: #30363d; }
        * { margin:0; padding:0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; overflow: hidden; display: flex; height: 100vh; }

        /* SIDEBAR */
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .nav-btn { padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 5px; color: #8b949e; }
        .nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,0.05); color: white; }
        
        /* MAIN AREA */
        main { flex: 1; position: relative; display: flex; flex-direction: column; }
        #viewport { flex: 1; background: #000; display: none; }
        .page { padding: 30px; display: none; overflow-y: auto; flex: 1; }
        .active-page { display: block; }

        /* SOCIAL & DM */
        #dm-window { position: fixed; bottom: 20px; right: 20px; width: 300px; background: var(--sidebar); border: 1px solid var(--accent); border-radius: 10px; display: none; z-index: 1000; }
        #dm-history { height: 200px; overflow-y: auto; padding: 10px; font-size: 13px; border-bottom: 1px solid var(--border); }
        
        /* CARDS */
        .card { background: var(--sidebar); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .btn { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="margin-bottom:20px">CUBE<span>WORLD</span></h2>
    <div class="nav-btn active" onclick="ui.page('home')">🏠 Home</div>
    <div class="nav-btn" onclick="ui.page('games')">🎮 Games</div>
    <div class="nav-btn" onclick="ui.page('studio')">🛠️ Studio</div>
    <div class="nav-btn" onclick="ui.page('social')">👥 Friends</div>
    <div style="margin-top:auto; font-size: 12px; color: #8b949e;">⬢ <span id="cubes">500</span> Cubes</div>
</div>

<main>
    <div id="page-home" class="page active-page">
        <h1>Welcome back, Cola</h1>
        <p>Your friends are waiting for you.</p>
    </div>

    <div id="page-games" class="page">
        <h1>Discover Games</h1>
        <div id="game-list" style="margin-top:20px"></div>
    </div>

    <div id="page-social" class="page">
        <h1>Friends</h1>
        <input id="friend-search" placeholder="Friend Username..." style="background:#000; color:#fff; border:1px solid var(--border); padding:10px; width:100%; border-radius:5px;">
        <button class="btn" style="margin-top:10px" onclick="ui.addFriend()">Add Friend</button>
        <div id="friend-list" style="margin-top:20px"></div>
    </div>

    <div id="viewport">
        <div style="position:absolute; top:10px; left:10px; z-index:10; display:flex; gap:10px">
            <button class="btn" onclick="studio.spawn('box')">Add Box</button>
            <button class="btn" onclick="studio.spawn('sphere')">Add Sphere</button>
            <button class="btn" style="background:#238636" onclick="studio.publish()">Publish</button>
        </div>
    </div>
</main>

<div id="dm-window">
    <div style="padding:10px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between">
        <b id="dm-title">Chat</b>
        <span onclick="ui.closeDM()" style="cursor:pointer">×</span>
    </div>
    <div id="dm-history"></div>
    <input id="dm-input" placeholder="Message..." style="width:100%; padding:10px; background:#000; color:#fff; border:none;" onkeypress="if(event.key==='Enter') ui.sendDM()">
</div>

<script>
    const socket = io();
    let me = { username: "Cola", friends: [] };
    let activeDM = null;

    // --- STUDIO WITH DRAG CONTROLS ---
    const studio = {
        scene: new THREE.Scene(),
        objects: [],
        init() {
            if(this.renderer) return;
            this.container = document.getElementById('viewport');
            this.cam = new THREE.PerspectiveCamera(75, this.container.clientWidth/this.container.clientHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(this.container.clientWidth, this.container.clientHeight);
            this.container.appendChild(this.renderer.domElement);
            
            this.scene.add(new THREE.GridHelper(50, 50, 0x333333, 0x222222));
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            this.cam.position.set(10, 10, 10);
            this.cam.lookAt(0,0,0);

            // Enable Dragging
            this.controls = new THREE.DragControls(this.objects, this.cam, this.renderer.domElement);
            this.controls.addEventListener('dragstart', () => { /* optional sound/color change */ });
            
            this.render();
        },
        spawn(type) {
            const geo = type === 'box' ? new THREE.BoxGeometry(1,1,1) : new THREE.SphereGeometry(0.5, 32, 32);
            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x0070ff }));
            mesh.position.y = 0.5;
            this.scene.add(mesh);
            this.objects.push(mesh);
        },
        publish() {
            const name = prompt("Game Name:");
            socket.emit("publish", { name, creator: me.username, mapData: [] });
        },
        render() {
            requestAnimationFrame(() => this.render());
            this.renderer.render(this.scene, this.cam);
        }
    };

    // --- UI & SOCIAL ---
    const ui = {
        page(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById('viewport').style.display = (id === 'studio') ? 'block' : 'none';
            if(id === 'studio') studio.init();
            else document.getElementById('page-'+id).classList.add('active-page');
        },
        addFriend() {
            const friend = document.getElementById('friend-search').value;
            socket.emit("add-friend", { user: me.username, friend });
        },
        openDM(name) {
            activeDM = name;
            document.getElementById('dm-title').innerText = "Chat with " + name;
            document.getElementById('dm-window').style.display = 'block';
        },
        sendDM() {
            const text = document.getElementById('dm-input').value;
            socket.emit("send-dm", { from: me.username, to: activeDM, text });
            document.getElementById('dm-history').innerHTML += `<div><b>You:</b> ${text}</div>`;
            document.getElementById('dm-input').value = "";
        }
    };

    socket.emit("join", "Cola");
    socket.on("user-data", data => {
        me = data;
        document.getElementById('cubes').innerText = me.cubes;
        document.getElementById('friend-list').innerHTML = me.friends.map(f => `
            <div class="card">
                <span>${f}</span>
                <button class="btn" onclick="ui.openDM('${f}')">Message</button>
            </div>
        `).join('');
    });

    socket.on(`dm-Cola`, data => {
        if(activeDM === data.from) {
            document.getElementById('dm-history').innerHTML += `<div><b>${data.from}:</b> ${data.text}</div>`;
        }
    });

    socket.on("sync-games", games => {
        document.getElementById('game-list').innerHTML = games.map(g => `
            <div class="card">
                <div><b>${g.name}</b><br><small>by ${g.creator}</small></div>
                <button class="btn">Join Game</button>
            </div>
        `).join('');
    });
</script>
</body>
</html>
