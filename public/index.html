<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CubeWorld | Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0d0e12; --sidebar: #15171c; --panel: #1c1f26;
            --accent: #0066ff; --text: #f1f5f9; --dim: #94a3b8;
            --red: #ff4757; --green: #2ecc71;
        }
        /* [Themes Logic] */
        body.light-theme { --bg: #f0f2f5; --sidebar: #ffffff; --panel: #f8f9fa; --text: #1c1f26; --dim: #65676b; }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; transition: 0.3s; }

        /* LAYOUT */
        .app { display: grid; grid-template-columns: 260px 1fr; grid-template-rows: 65px 1fr; height: 100vh; }
        header { grid-column: 1/-1; background: var(--sidebar); border-bottom: 1px solid #2d333d; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }
        
        /* GLOBAL ALERT */
        #global-notif { position: fixed; top: 0; left: 0; right: 0; background: var(--accent); padding: 10px; text-align: center; font-weight: 600; z-index: 10000; display: none; }

        /* SIDEBAR */
        aside { background: var(--sidebar); padding: 20px; display: flex; flex-direction: column; gap: 5px; border-right: 1px solid #2d333d; }
        .nav-link { padding: 12px 15px; border-radius: 10px; color: var(--dim); cursor: pointer; font-size: 14px; }
        .nav-link.active { background: var(--accent); color: white; }

        /* VIEWS */
        main { padding: 40px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: var(--panel); padding: 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #2d333d; }

        /* STUDIO UI */
        #studio-ui { position: fixed; inset: 0; background: #000; display: none; z-index: 5000; }
        .studio-grid { display: grid; grid-template-columns: 250px 1fr 280px; grid-template-rows: 50px 1fr; height: 100vh; }
        .st-bar { grid-column: 1/-1; background: #1c1f26; display: flex; align-items: center; padding: 0 15px; gap: 10px; border-bottom: 1px solid #333; }
        .st-side { background: #121418; padding: 20px; border: 1px solid #222; }

        /* AUTH */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: white; margin-bottom: 10px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="dark-theme">

    <div id="global-notif">SYSTEM ALERT</div>

    <div id="auth-overlay">
        <div class="card" style="width: 350px; text-align: center;">
            <h2 style="margin-bottom: 20px;">Cube<span>World</span></h2>
            <input id="login-user" type="text" placeholder="Username">
            <input id="login-pass" type="password" placeholder="Password">
            <button class="btn" style="background:var(--accent); color:white; width: 100%;" onclick="core.login()">Enter Engine</button>
        </div>
    </div>

    <div class="app">
        <header>
            <div style="font-weight: 800; font-size: 20px;">CUBE<span>WORLD</span></div>
            <div style="display:flex; gap:15px; align-items:center;">
                <div id="u-display" style="font-size: 13px; font-weight: 600;">Guest</div>
                <button class="btn" style="background: var(--red); color: white; font-size: 11px;" onclick="core.logout()">LOGOUT</button>
            </div>
        </header>

        <aside>
            <div class="nav-link active" onclick="core.nav('home', this)">Home</div>
            <div class="nav-link" onclick="core.nav('discover', this)">Discover</div>
            <div class="nav-link" onclick="core.nav('studio', this)">Studio</div>
            <div class="nav-link" onclick="core.nav('social', this)">Messages</div>
            <div class="nav-link" onclick="core.nav('settings', this)">Settings</div>
            <div id="admin-link" class="nav-link hidden" style="color: var(--red);" onclick="core.nav('admin', this)">Admin Root</div>
        </aside>

        <main>
            <section id="view-home" class="view active">
                <div class="card" style="background: var(--accent); color: white;">
                    <h1>Welcome, <span id="welcome-name">User</span></h1>
                    <p>Version 0.8.0 Gold is now live.</p>
                </div>
            </section>

            <section id="view-discover" class="view">
                <h2>Discover Worlds</h2>
                <div id="discover-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;">
                    </div>
            </section>

            <section id="view-settings" class="view">
                <h2>Account Settings</h2>
                <div class="card" style="margin-top:20px;">
                    <h3>Theme Selection</h3>
                    <button class="btn" style="background: #333; color: white;" onclick="core.setTheme('dark')">Dark Mode</button>
                    <button class="btn" style="background: #ddd; color: #000;" onclick="core.setTheme('light')">Light Mode</button>
                </div>
            </section>

            <section id="view-admin" class="view">
                <h2 style="color: var(--red);">Root Access</h2>
                <div class="card" style="margin-top:20px;">
                    <h3>Global Notification</h3>
                    <input id="notif-text" type="text" placeholder="Message to all users...">
                    <button class="btn" style="background: var(--accent); color: white;" onclick="core.sendGlobal()">Send Alert</button>
                </div>
                <div class="card">
                    <h3>Moderation</h3>
                    <input id="ban-target" type="text" placeholder="Username to ban">
                    <button class="btn" style="background: var(--red); color: white;" onclick="core.banUser()">Ban Identity</button>
                </div>
            </section>
        </main>
    </div>

    <div id="studio-ui">
        <div class="studio-grid">
            <div class="st-bar">
                <button class="btn" style="background:var(--red); color:white;" onclick="core.exitStudio()">Exit</button>
                <button class="btn" onclick="core.setTool('move')">Move</button>
                <button class="btn" onclick="core.setTool('scale')">Scale</button>
                <button class="btn" style="background:var(--green); color:white;" onclick="core.addPart()">+ Part</button>
                <button class="btn" style="background:var(--accent); color:white; margin-left:auto;" onclick="core.publish()">Publish Game</button>
            </div>
            <div class="st-side">
                <h3>Explorer</h3>
                <div id="explorer-list" style="font-size: 12px; color: var(--dim); margin-top: 10px;"></div>
            </div>
            <div id="studio-canvas"></div>
            <div class="st-side">
                <h3>Properties</h3>
                <div id="prop-panel" style="font-size: 12px; margin-top: 10px;">
                    <p>No item selected</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let user = JSON.parse(localStorage.getItem('cw_user'));
        let selectedObject = null;
        let publishedGames = [];

        // INITIALIZE SESSION
        if(user) {
            document.getElementById("auth-overlay").classList.add("hidden");
            document.getElementById("u-display").innerText = user.name;
            document.getElementById("welcome-name").innerText = user.name;
            if(user.role === "Admin") document.getElementById("admin-link").classList.remove("hidden");
        }

        const core = {
            async login() {
                const u = document.getElementById("login-user").value;
                const p = document.getElementById("login-pass").value;
                const res = await fetch('/api/login', {
                    method: "POST", headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({username: u, password: p})
                });
                const data = await res.json();
                if(data.success) {
                    const session = { name: data.user, role: data.role };
                    localStorage.setItem('cw_user', JSON.stringify(session));
                    location.reload();
                } else { alert("Login Failed"); }
            },

            logout() {
                localStorage.removeItem('cw_user');
                location.reload();
            },

            nav(id, el) {
                document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
                document.querySelectorAll(".nav-link").forEach(n => n.classList.remove("active"));
                document.getElementById("view-" + id).classList.add("active");
                el.classList.add("active");
            },

            setTheme(t) {
                document.body.className = t + "-theme";
            },

            // ADMIN LOGIC
            sendGlobal() {
                const msg = document.getElementById("notif-text").value;
                socket.emit("admin-notify", msg);
            },

            banUser() {
                const target = document.getElementById("ban-target").value;
                socket.emit("admin-ban", target);
                alert(target + " has been terminated.");
            },

            // STUDIO LOGIC
            launchStudio() {
                document.getElementById("studio-ui").style.display = "block";
                this.init3D();
            },

            init3D() {
                const container = document.getElementById("studio-canvas");
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x0a0b0e);
                this.camera = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({antialias: true});
                this.renderer.setSize(container.clientWidth, container.clientHeight);
                container.appendChild(this.renderer.domElement);
                
                this.scene.add(new THREE.GridHelper(100, 100, 0x0066ff, 0x222222));
                this.camera.position.set(10, 10, 10);
                this.camera.lookAt(0,0,0);
                this.animate();
            },

            animate() {
                if(!this.renderer) return;
                requestAnimationFrame(() => this.animate());
                this.renderer.render(this.scene, this.camera);
            },

            addPart() {
                const geo = new THREE.BoxGeometry(1, 1, 1);
                const mat = new THREE.MeshStandardMaterial({color: 0x0066ff});
                const cube = new THREE.Mesh(geo, mat);
                cube.position.y = 0.5;
                this.scene.add(cube);
                
                const id = "Part_" + Math.floor(Math.random()*1000);
                const item = document.createElement("div");
                item.innerText = id;
                item.onclick = () => this.selectItem(cube, id);
                document.getElementById("explorer-list").appendChild(item);
            },

            selectItem(obj, id) {
                selectedObject = obj;
                document.getElementById("prop-panel").innerHTML = `
                    <b>Name:</b> ${id}<br>
                    <b>PosX:</b> ${obj.position.x.toFixed(2)}<br>
                    <b>Scale:</b> ${obj.scale.x}
                `;
            },

            publish() {
                const name = prompt("Name your game:");
                if(name) {
                    publishedGames.push({ name, creator: user.name });
                    this.renderDiscover();
                    alert("Published to Discover!");
                }
            },

            renderDiscover() {
                const grid = document.getElementById("discover-grid");
                grid.innerHTML = publishedGames.map(g => `
                    <div class="card" style="text-align:center;">
                        <div style="height:100px; background:var(--accent); border-radius:10px; margin-bottom:10px;"></div>
                        <b>${g.name}</b><br>
                        <span style="font-size:11px; color:var(--dim)">By ${g.creator}</span>
                    </div>
                `).join('');
            },

            exitStudio() { location.reload(); }
        };

        // SOCKET LISTENERS
        socket.on("global-alert", (msg) => {
            const el = document.getElementById("global-notif");
            el.innerText = msg;
            el.style.display = "block";
            setTimeout(() => el.style.display = "none", 5000);
        });

        socket.on("force-logout", (name) => {
            if(user && user.name === name) core.logout();
        });
    </script>
</body>
</html>
