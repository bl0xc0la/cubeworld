<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeWorld</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Flat Color Palette */
            --primary: #3a86ff;
            --primary-dark: #2563eb;
            --success: #06d6a0;
            --error: #ff4d6d;
            --warning: #ffbe0b;
            
            /* Backgrounds */
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            
            /* Text & Borders */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --border-radius: 8px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- FLAT AUTH LAYOUT --- */
        .auth-container {
            display: flex;
            min-height: 100vh;
        }

        .auth-left {
            flex: 1;
            background-color: var(--primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
        }

        .auth-left h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 1rem;
        }

        .auth-left p {
            font-size: 1.25rem;
            opacity: 0.9;
            max-width: 450px;
        }

        .auth-right {
            flex: 0 0 500px;
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            border-left: 2px solid var(--border-color);
        }

        .auth-box {
            width: 100%;
            max-width: 360px;
        }

        .auth-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .auth-subtitle {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        /* --- FLAT COMPONENTS --- */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            background-color: var(--bg-input);
            border: 2px solid transparent;
            border-radius: var(--border-radius);
            color: white;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 1.5rem;
            border-radius: var(--border-radius);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
            width: 100%;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
        }

        /* --- TOPBAR --- */
        .topbar {
            background-color: var(--bg-card);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--border-color);
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
        }

        .nav-item {
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius);
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--bg-input);
            color: var(--text-main);
        }

        /* --- GAME CARDS (FLAT STYLE) --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding: 2rem;
        }

        .game-card {
            background-color: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .game-card:hover {
            border-color: var(--primary);
        }

        .game-thumb {
            width: 100%;
            height: 160px;
            background-color: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .game-info {
            padding: 1.5rem;
        }

        .game-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .game-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        /* --- UTILS --- */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 1rem 0;
        }

        .checkbox-group input {
            accent-color: var(--primary);
        }

        @media (max-width: 900px) {
            .auth-left { display: none; }
            .auth-right { flex: 1; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-left">
            <h1>CubeWorld.</h1>
            <p>A flat-out better way to build, play, and share your own digital universes.</p>
        </div>
        
        <div class="auth-right">
            <div class="auth-box">
                <div class="auth-title">Welcome back</div>
                <div class="auth-subtitle">Login to your developer account</div>
                
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" placeholder="e.g. CubeDev">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="••••••••">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="remember">
                    <label for="remember">Keep me logged in</label>
                </div>

                <button class="btn btn-primary">
                    <i class="fas fa-arrow-right"></i> Sign In
                </button>
            </div>
        </div>
    </div>

    <nav class="topbar">
        <div class="brand">
            <i class="fas fa-cube"></i> CubeWorld
        </div>
        <div class="nav-links">
            <a href="#" class="nav-item active">Home</a>
            <a href="#" class="nav-item">Discover</a>
            <a href="#" class="nav-item">Develop</a>
            <a href="#" class="nav-item">Market</a>
        </div>
        <div style="font-weight: 700; color: var(--success);">
            <i class="fas fa-coins"></i> 1,250
        </div>
    </nav>

    <div class="grid">
        <div class="game-card">
            <div class="game-thumb"><i class="fas fa-rocket"></i></div>
            <div class="game-info">
                <div class="game-title">Space Explorer</div>
                <div class="game-meta">by StarLord • 1.2k playing</div>
                <button class="btn btn-primary">Play</button>
            </div>
        </div>

        <div class="game-card">
            <div class="game-thumb" style="background-color: var(--primary);"><i class="fas fa-hammer"></i></div>
            <div class="game-info">
                <div class="game-title">City Builder Tycoon</div>
                <div class="game-meta">by Architect • 850 playing</div>
                <button class="btn btn-primary">Play</button>
            </div>
        </div>
    </div>

</body>
</html>
