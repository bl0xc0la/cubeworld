<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUBEWORLD | V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0a0b10;
            --side: #12141c;
            --accent: #0070ff;
            --text: #ffffff;
            --shadow: 0 8px 30px rgba(0,0,0,0.5);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        /* --- LOGIN --- */
        #login-overlay { position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; }
        .login-box { background: var(--side); padding: 40px; border-radius: 20px; box-shadow: var(--shadow); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #222; background: #000; color: #fff; outline: none; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }

        /* --- LAYOUT --- */
        .wrapper { display: grid; grid-template-columns: 250px 1fr 300px; height: 100vh; visibility: hidden; }
        .sidebar { background: var(--side); padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #1f222e; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; color: #888; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: #fff; }

        main { padding: 30px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }

        .card { background: #161922; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: var(--shadow); }

        /* --- AVATAR SHOP --- */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .item-box { background: #000; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #222; }
        .item-icon { font-size: 30px; margin-bottom: 10px; }

        /* --- CHAT SECTIONS --- */
        .chat-wrap { background: var(--side); display: flex; flex-direction: column; border-left: 1px solid #1f222e; }
        .chat-logs { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; }
        .chat-input { padding: 15px; border-top: 1px solid #1f222e; display: flex; gap: 5px; }

        /* --- PM WINDOW --- */
        #pm-window { position: fixed; bottom: 20px; right: 330px; width: 250px; background: var(--accent); border-radius: 10px; display: none; box-shadow: var(--shadow); }
        .pm-header { padding: 10px; font-weight: 700; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h1 style="margin-bottom: 20px;">CubeWorld</h1>
        <input id="u-in" type="text" placeholder="Username">
        <input id="p-in" type="password" placeholder="Password">
        <button class="btn" onclick="core.login()">Log In</button>
    </div>
</div>

<div class="wrapper" id="main-ui">
    <aside class="sidebar">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="width:60px; height:60px; background:#000; border-radius:50%; margin: 0 auto 10px; border:2px solid var(--accent); overflow:hidden;">
                <iframe id="rig-preview" src="https://my.spline.design/untitled-rTr9O3JjlJGN8gVcG65A69Lz/" style="width:100%; height:100%; transform:scale(4); pointer-events:none;"></iframe>
            </div>
            <div id="disp-user" style="font-weight: 800;">User</div>
            <div id="disp-cubes" style="font-size: 12px; color: #f1c40f;">0 Cubes</div>
        </div>
        <div class="nav-item active" onclick="core.nav('games', this)">Games</div>
        <div class="nav-item" onclick="core.nav('studio', this)">Studio</div>
        <div class="nav-item" onclick="core.nav('shop', this)">Avatar Shop</div>
        <div class="nav-item" style="margin-top:auto;" onclick="location.reload()">Log Out</div>
    </aside>

    <main>
        <section id="view-games" class="view active">
            <h2>Discover Games</h2>
            <div id="game-list" style="margin-top: 20px;"></div>
        </section>

        <section id="view-studio" class="view">
            <h2>Creator Studio</h2>
            <div class="card">
                <p style="margin-bottom: 10px; color: #888;">Name your new world:</p>
                <input id="new-game-name" placeholder="Island Life...">
                <button class="btn" onclick="core.publish()">Publish Game</button>
            </div>
        </section>

        <section id="view-shop" class="view">
            <h2>Avatar Shop</h2>
            <div class="shop-grid" style="margin-top: 20px;">
                <div class="item-box">
                    <div class="item-icon">🎩</div>
                    <b>Valkyrie</b><br>
                    <button class="btn" style="padding:5px; margin-top:5px; font-size:12px;" onclick="core.wear('valk')">Wear Item</button>
                </div>
                <div class="item-box">
                    <div class="item-icon">👕</div>
                    <b>Neon Hoodie</b><br>
                    <button class="btn" style="padding:5px; margin-top:5px; font-size:12px;" onclick="core.wear('neon')">Wear Item</button>
                </div>
            </div>
        </section>
    </main>

    <aside class="chat-wrap">
        <div style="padding: 15px; font-weight: 800; border-bottom: 1px solid #1f222e;">Global Chat</div>
        <div class="chat-logs" id="global-chat"></div>
        <div class="chat-input">
            <input id="chat-in" placeholder="Say something..." style="margin-bottom:0;">
            <button class="btn" style="width: 50px;" onclick="core.sendGlobal()">></button>
        </div>
    </aside>
</div>

<div id="pm-window">
    <div class="pm-header">
        <span id="pm-target">User</span>
        <span onclick="document.getElementById('pm-window').style.display='none'" style="cursor:pointer;">×</span>
    </div>
    <div id="pm-logs" style="height: 150px; background: #000; padding: 10px; font-size: 11px; overflow-y: auto;"></div>
    <div style="padding: 5px; display: flex; gap: 2px;">
        <input id="pm-in" placeholder="DM..." style="margin-bottom:0; font-size: 12px; padding: 5px;">
        <button class="btn" style="width: 40px; padding: 5px;" onclick="core.sendPM()">></button>
    </div>
</div>

<script>
    const socket = io();
    let user = JSON.parse(localStorage.getItem('cw_user'));
    let activePM = null;

    const core = {
        init() {
            if (user) {
                document.getElementById("login-overlay").style.display = "none";
                document.getElementById("main-ui").style.visibility = "visible";
                document.getElementById("disp-user").innerText = user.name;
                document.getElementById("disp-cubes").innerText = (user.name === "BloxColaYT") ? "∞ CUBES" : user.cubes + " CUBES";
            }
        },
        login() {
            const username = document.getElementById("u-in").value;
            const password = document.getElementById("p-in").value;
            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            }).then(res => res.json()).then(data => {
                if(data.success) {
                    localStorage.setItem('cw_user', JSON.stringify({name: data.user, cubes: data.cubes}));
                    location.reload();
                }
            });
        },
        nav(id, el) {
            document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
            document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
            document.getElementById("view-" + id).classList.add("active");
            el.classList.add("active");
        },
        publish() {
            const name = document.getElementById("new-game-name").value;
            socket.emit("publish-game", { name, user: user.name });
            alert("Game published!");
        },
        wear(item) {
            socket.emit("wear-item", { user: user.name, item });
            alert("Now wearing: " + item);
        },
        sendGlobal() {
            const text = document.getElementById("chat-in").value;
            socket.emit("global-msg", { from: user.name, text });
            document.getElementById("chat-in").value = "";
        },
        openPM(target) {
            if(target === user.name) return;
            activePM = target;
            document.getElementById("pm-target").innerText = target;
            document.getElementById("pm-window").style.display = "block";
            document.getElementById("pm-logs").innerHTML = "";
        },
        sendPM() {
            const text = document.getElementById("pm-in").value;
            socket.emit("send-pm", { from: user.name, to: activePM, text });
            document.getElementById("pm-in").value = "";
        }
    };

    socket.on("sync-games", (games) => {
        document.getElementById("game-list").innerHTML = games.map(g => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${g.name}</b><br><small>by ${g.creator}</small></div>
                <button class="btn" style="width: auto; padding: 8px 15px;">Join Game</button>
            </div>
        `).join('');
    });

    socket.on("global-receive", (data) => {
        document.getElementById("global-chat").innerHTML += `
            <div style="margin-bottom:8px;">
                <b onclick="core.openPM('${data.from}')" style="color:var(--accent); cursor:pointer;">${data.from}:</b> ${data.text}
            </div>`;
    });

    socket.on("pm-receive", (data) => {
        if(data.to === user.name || data.from === user.name) {
            if(activePM === data.from || activePM === data.to) {
                document.getElementById("pm-logs").innerHTML += `<div><b>${data.from}:</b> ${data.text}</div>`;
            }
        }
    });

    core.init();
</script>
</body>
</html>
