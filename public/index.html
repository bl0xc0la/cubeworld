<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CubeWorld</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --sidebar: #010409;
            --accent: #007bff; --text: #c9d1d9; --border: #30363d;
            --card: #21262d;
        }
        .neon-theme { --accent: #28a745; --border: #28a745; }
        .white-theme { --bg: #f6f8fa; --panel: #fff; --sidebar: #fff; --text: #24292f; --border: #d0d7de; --card: #f6f8fa; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Navigation */
        #sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0; }
        .sidebar-header { padding: 0 25px 20px; font-weight: 800; font-size: 22px; color: #fff; letter-spacing: -1px; }
        .nav-link { padding: 12px 25px; cursor: pointer; color: var(--text); font-weight: 500; font-size: 14px; border-left: 3px solid transparent; transition: 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.05); }
        .nav-link.active { background: rgba(0, 123, 255, 0.1); border-left-color: var(--accent); color: #fff; }

        /* Main Workspace */
        main { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
        .page { display: none; width: 100%; max-width: 1200px; margin: 0 auto; }
        .page.active-page { display: block; }

        /* Studio & Gameplay */
        .studio-container { display: grid; grid-template-columns: 1fr 300px; gap: 20px; height: 580px; }
        #viewport { background: #000; border-radius: 12px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .editor-side { background: var(--panel); border-radius: 12px; border: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Game Grid */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .game-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: 0.2s; }
        .game-thumb { height: 130px; background: #000; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .game-info { padding: 15px; }

        /* UI Elements */
        .btn { background: var(--accent); color: #fff; border: none; padding: 10px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn:hover { opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        input { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 6px; width: 100%; outline: none; }
        
        #ui-overlay { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        .studio-text { position: absolute; color: white; font-weight: bold; pointer-events: auto; cursor: move; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; }
    </style>
</head>
<body id="app-body">

<div id="sidebar">
    <div class="sidebar-header">CubeWorld</div>
    <div class="nav-link active" id="nav-games" onclick="nav('games')">Games</div>
    <div class="nav-link" id="nav-studio" onclick="nav('studio')">Create</div>
    <div class="nav-link" id="nav-settings" onclick="nav('settings')">Settings</div>
    <div class="nav-link" id="nav-admin" onclick="nav('admin')">Admin</div>
</div>

<main>
    <div id="page-games" class="page active-page">
        <h1 style="margin-bottom: 20px;">Discover</h1>
        <div id="game-list" class="game-grid"></div>
    </div>

    <div id="page-studio" class="page">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 id="studio-header">Studio Workspace</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-outline" style="width:auto;" onclick="gameEngine.startPlayMode()">Play Game</button>
                <button class="btn" style="width:auto;" onclick="publishGame()">Publish</button>
            </div>
        </div>
        <div class="studio-container">
            <div id="viewport">
                <div id="ui-overlay"></div>
            </div>
            <div class="editor-side">
                <h3>Inspector</h3>
                <label style="font-size:12px; color:#8b949e">Part Color</label>
                <input type="color" id="p-color" value="#007bff">
                <button class="btn btn-outline" onclick="studio.addPart()">Insert Part</button>
                <button class="btn btn-outline" onclick="studio.addText()">Insert Text UI</button>
                <hr style="border:0; border-top: 1px solid var(--border)">
                <h3>Controls</h3>
                <button class="btn" style="background:#da3633" onclick="studio.deleteSelected()">Delete Selected</button>
                <button class="btn btn-outline" style="margin-top:auto;" onclick="studio.clear()">Clear All</button>
            </div>
        </div>
    </div>

    <div id="page-settings" class="page">
        <h1>Settings</h1>
        <div class="editor-side" style="margin-top:20px; max-width:500px;">
            <h3>Personalization</h3>
            <label>Theme Selection</label>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="btn" onclick="setTheme('dark')">Dark Mode</button>
                <button class="btn" style="background:#28a745" onclick="setTheme('neon')">Neon Green</button>
                <button class="btn" style="background:#fff; color:#000" onclick="setTheme('white')">White Mode</button>
            </div>
        </div>
    </div>

    <div id="page-admin" class="page">
        <h1>Admin Panel</h1>
        <p style="margin-top:20px; color:#8b949e">Authorized Access: BloxColaYT</p>
    </div>
</main>

<script>
    const socket = io();
    const currentUser = "BloxColaYT";

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active-page');
        document.getElementById('nav-' + id).classList.add('active');
        if(id === 'studio') studio.init();
    }

    function setTheme(t) {
        document.getElementById('app-body').className = t + '-theme';
    }

    const studio = {
        scene: null, cam: null, renderer: null, objects: [], gizmo: null,
        init() {
            if(this.renderer) return;
            const div = document.getElementById('viewport');
            this.scene = new THREE.Scene();
            this.cam = new THREE.PerspectiveCamera(75, div.clientWidth/div.clientHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(div.clientWidth, div.clientHeight);
            div.appendChild(this.renderer.domElement);
            
            this.scene.add(new THREE.GridHelper(30, 30, 0x30363d, 0x30363d));
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            this.cam.position.set(10, 10, 10);
            this.cam.lookAt(0,0,0);

            this.gizmo = new THREE.TransformControls(this.cam, this.renderer.domElement);
            this.scene.add(this.gizmo);
            this.render();
        },
        addPart(data = null) {
            const color = data ? data.col : document.getElementById('p-color').value;
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 1.5, 1.5),
                new THREE.MeshStandardMaterial({ color: color })
            );
            if(data) mesh.position.set(data.pos.x, data.pos.y, data.pos.z);
            this.scene.add(mesh);
            this.objects.push(mesh);
            this.gizmo.attach(mesh);
            return mesh;
        },
        addText() {
            const t = document.createElement('div');
            t.className = 'studio-text';
            t.innerText = 'New UI Text';
            t.contentEditable = true;
            document.getElementById('ui-overlay').appendChild(t);
        },
        deleteSelected() {
            if(this.gizmo.object) {
                this.scene.remove(this.gizmo.object);
                this.objects = this.objects.filter(o => o !== this.gizmo.object);
                this.gizmo.detach();
            }
        },
        clear() {
            this.objects.forEach(o => this.scene.remove(o));
            this.objects = [];
            this.gizmo.detach();
        },
        render() {
            requestAnimationFrame(() => this.render());
            this.renderer.render(this.scene, this.cam);
        }
    };

    const gameEngine = {
        isPlaying: false, keys: {}, localPlayer: null,
        startPlayMode() {
            this.isPlaying = true;
            document.getElementById('studio-header').innerText = "Playing CubeWorld";
            studio.gizmo.detach();
            
            const geo = new THREE.BoxGeometry(1, 2, 1);
            const mat = new THREE.MeshStandardMaterial({ color: '#ffcc00' });
            this.localPlayer = new THREE.Mesh(geo, mat);
            this.localPlayer.position.set(0, 2, 0);
            studio.scene.add(this.localPlayer);

            window.addEventListener('keydown', e => this.keys[e.code] = true);
            window.addEventListener('keyup', e => this.keys[e.code] = false);
            this.loop();
        },
        loop() {
            if(!this.isPlaying) return;
            requestAnimationFrame(() => this.loop());

            const speed = 0.15;
            if(this.keys['KeyW']) this.localPlayer.position.z -= speed;
            if(this.keys['KeyS']) this.localPlayer.position.z += speed;
            if(this.keys['KeyA']) this.localPlayer.position.x -= speed;
            if(this.keys['KeyD']) this.localPlayer.position.x += speed;

            studio.cam.position.set(this.localPlayer.position.x, this.localPlayer.position.y + 6, this.localPlayer.position.z + 12);
            studio.cam.lookAt(this.localPlayer.position);
            socket.emit('update-pos', this.localPlayer.position);
        }
    };

    async function joinGame(id) {
        nav('studio');
        const res = await fetch('/api/games/' + id);
        const game = await res.json();
        studio.clear();
        game.parts.forEach(p => studio.addPart(p));
        gameEngine.startPlayMode();
    }

    function publishGame() {
        const name = prompt("Name your CubeWorld creation:");
        if(name) {
            socket.emit('publish-game', {
                name: name,
                creator: currentUser,
                parts: studio.objects.map(o => ({ pos: o.position, col: '#' + o.material.color.getHexString() }))
            });
            alert("Game Published to Discover!");
        }
    }

    socket.on('sync-games', games => {
        document.getElementById('game-list').innerHTML = games.map(g => `
            <div class="game-card">
                <div class="game-thumb">🧊</div>
                <div class="game-info">
                    <b style="color:#fff">${g.name}</b><br>
                    <small style="color:#8b949e">by ${g.creator}</small>
                    <button class="btn" style="margin-top:10px; font-size:12px; padding:6px;" onclick="joinGame('${g._id}')">Join Game</button>
                </div>
            </div>
        `).join('');
    });
</script>
</body>
</html>
