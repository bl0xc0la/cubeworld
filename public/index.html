<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeWorld</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #06080f;
            --panel: #0d121f;
            --accent: #0070ff;
            --text: #ffffff;
            --radius: 20px;
        }

        body.theme-roblox { --bg: #06080f; --panel: #0d121f; --accent: #0070ff; }
        body.theme-neon { --bg: #000; --panel: #111; --accent: #00f28d; }
        body.theme-dark { --bg: #121212; --panel: #1e1e1e; --accent: #fff; }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        #login-overlay { position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; }
        .login-box { background: var(--panel); padding: 40px; border-radius: var(--radius); width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #222; background: #000; color: #fff; outline: none; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; }

        .wrapper { display: grid; grid-template-columns: 260px 1fr 320px; height: 100vh; padding: 20px; gap: 20px; visibility: hidden; }
        .sidebar { background: var(--panel); border-radius: var(--radius); padding: 25px; display: flex; flex-direction: column; }
        
        .nav-item { padding: 14px; cursor: pointer; border-radius: 12px; margin-bottom: 6px; color: #64748b; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.03); color: var(--text); }

        main { background: var(--panel); border-radius: var(--radius); padding: 35px; overflow-y: auto; position: relative; }
        .view { display: none; height: 100%; }
        .view.active { display: block; }

        .game-card { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 16px; margin-bottom: 12px; }
        .game-logo { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; margin-right: 15px; background: #000; }

        #avatar-box { width: 80px; height: 80px; background: #000; border-radius: 50%; margin: 0 auto 12px; border: 2px solid var(--accent); overflow: hidden; }

        .chat-wrap { background: var(--panel); border-radius: var(--radius); display: flex; flex-direction: column; padding: 25px; }
        .chat-logs { flex: 1; overflow-y: auto; font-size: 14px; }
        .chat-input { display: flex; gap: 8px; margin-top: 15px; }

        #pm-window { position: fixed; bottom: 25px; right: 360px; width: 280px; background: var(--panel); border-radius: 16px; display: none; border: 2px solid var(--accent); overflow: hidden; z-index: 4000; }
        .pm-header { padding: 12px; font-weight: 700; display: flex; justify-content: space-between; background: rgba(255,255,255,0.02); }
        .pm-logs { height: 160px; padding: 12px; font-size: 13px; overflow-y: auto; }

        #game-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; }
        #canvas-game-container { flex: 1; position: relative; width: 100%; height: 100%; }
        .game-room-chat { height: 220px; background: rgba(0,0,0,0.8); width: 380px; position: absolute; bottom: 20px; left: 20px; border-radius: 12px; padding: 15px; border: 1px solid #222; }

        .studio-layout { display: flex; flex-direction: column; gap: 15px; height: 100%; }
        #studio-canvas { width: 100%; height: 350px; background: #111; border-radius: 12px; position: relative; border: 1px solid #333; }
        .studio-tools { display: flex; gap: 10px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body class="theme-roblox">

<div id="login-overlay">
    <div class="login-box">
        <h1>CubeWorld</h1>
        <input id="u-in" type="text" placeholder="Username">
        <input id="p-in" type="password" placeholder="Password">
        <button class="btn" onclick="core.login()">Log In</button>
    </div>
</div>

<div id="game-screen">
    <div id="canvas-game-container">
        <div style="position: absolute; top: 20px; left: 20px; font-weight:700; background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 8px; z-index: 10;">
            <span id="active-game-title">Game Workspace</span><br>
            <small style="font-weight:400; color:#00f28d">Controls: W, A, S, D / Arrows to Move</small>
        </div>
        <button class="btn" style="position: absolute; top: 20px; right: 20px; width: auto; background: #ff4757; padding: 10px 20px; z-index: 10;" onclick="core.leaveGame()">EXIT TO MENU</button>
    </div>
    <div class="game-room-chat">
        <div id="server-chat-logs" style="height: 140px; overflow-y: auto; font-size: 13px; margin-bottom: 8px; color:#ddd;"></div>
        <input id="server-chat-in" placeholder="Press Enter to send chat room message..." style="margin-bottom:0; padding:8px;">
    </div>
</div>

<div class="wrapper" id="main-ui">
    <aside class="sidebar">
        <div id="avatar-box"></div>
        <div style="text-align: center; margin-bottom: 30px;">
            <div id="disp-user" style="font-weight: 700;">User</div>
            <div id="disp-cubes" style="font-size: 13px; color: #f1c40f; font-weight: 700;">0 Cubes</div>
        </div>
        <div class="nav-item active" onclick="core.nav('games', this)">Games</div>
        <div class="nav-item" onclick="core.nav('studio', this); studio.init();">Studio Workspace</div>
        <div class="nav-item" onclick="core.nav('settings', this)">Settings</div>
        <div class="nav-item" style="margin-top:auto; opacity: 0.5;" onclick="location.reload()">Logout</div>
    </aside>

    <main>
        <section id="view-games" class="view active">
            <h2>Discover Games</h2>
            <div id="game-list" style="margin-top: 15px;"></div>
        </section>

        <section id="view-studio" class="view">
            <div class="studio-layout">
                <div>
                    <h2>Roblox Style Engine Studio</h2>
                    <p style="color: #64748b; font-size:13px;">Place block structures visually before compiling your game instance.</p>
                </div>
                <div class="studio-tools">
                    <button class="btn" style="width:auto; padding:5px 15px; background:#ef4444;" onclick="studio.addBlock(0xff0000)">+ Red Brick</button>
                    <button class="btn" style="width:auto; padding:5px 15px; background:#10b981;" onclick="studio.addBlock(0x10b981)">+ Green Brick</button>
                    <button class="btn" style="width:auto; padding:5px 15px; background:#0070ff;" onclick="studio.addBlock(0x0070ff)">+ Blue Brick</button>
                    <button class="btn" style="width:auto; padding:5px 15px; background:#7c3aed;" onclick="studio.clear()">Clear Studio</button>
                </div>
                <div id="studio-canvas"></div>
                <div style="background: rgba(255,255,255,0.01); padding: 15px; border-radius: 12px; display:flex; gap:10px;">
                    <input id="new-game-name" placeholder="Game Title..." style="margin-bottom:0;">
                    <input id="new-game-logo" placeholder="Logo Link..." style="margin-bottom:0;">
                    <button class="btn" style="width:200px;" onclick="core.publish()">Publish to Feed</button>
                </div>
            </div>
        </section>

        <section id="view-settings" class="view">
            <h2>Themes</h2>
            <div style="display:flex; gap:10px; margin-top: 15px;">
                <button class="btn" style="background:#0070ff" onclick="core.setTheme('roblox')">Roblox Blue</button>
                <button class="btn" style="background:#00f28d; color:#000" onclick="core.setTheme('neon')">Neon Green</button>
                <button class="btn" style="background:#333" onclick="core.setTheme('dark')">Dark Mode</button>
            </div>
        </section>
    </main>

    <aside class="chat-wrap">
        <h3>Global Chat</h3>
        <div class="chat-logs" id="global-chat"></div>
        <div class="chat-input">
            <input id="chat-in" placeholder="Type a message...">
            <button class="btn" style="width: 50px;" onclick="core.sendGlobal()">></button>
        </div>
    </aside>
</div>

<div id="pm-window">
    <div class="pm-header">
        <span id="pm-target">Private Chat</span>
        <span onclick="document.getElementById('pm-window').style.display='none'" style="cursor:pointer; color:red;">×</span>
    </div>
    <div id="pm-logs" class="pm-logs"></div>
    <div style="padding: 10px; display: flex; gap: 5px;">
        <input id="pm-in" placeholder="Send private message..." style="margin-bottom:0; padding: 5px;">
        <button class="btn" style="width: 45px;" onclick="core.sendPM()">></button>
    </div>
</div>

<script>
    const socket = io();
    let user = JSON.parse(localStorage.getItem('cw_user'));
    let activePM = null;
    let currentRoomId = null;

    let gameScene, gameCamera, gameRenderer, playerMesh;
    let moveKeys = { w: false, a: false, s: false, d: false };

    let studioScene, studioCamera, studioRenderer;
    let studioBlocksData = [];

    function initMenuAvatar() {
        const container = document.getElementById("avatar-box");
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(80, 80);
        container.appendChild(renderer.domElement);

        const cube = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({ color: 0x0070ff }));
        scene.add(cube);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        camera.position.z = 3.5;

        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    }

    const studio = {
        init() {
            const container = document.getElementById("studio-canvas");
            if (container.children.length > 0) return;

            studioScene = new THREE.Scene();
            studioScene.background = new THREE.Color(0x1a1a24);
            studioCamera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
            studioRenderer = new THREE.WebGLRenderer({ antialias: true });
            studioRenderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(studioRenderer.domElement);

            const grid = new THREE.GridHelper(20, 20, 0x0070ff, 0x444455);
            studioScene.add(grid);

            studioScene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 0.6);
            light.position.set(10, 20, 10);
            studioScene.add(light);

            studioCamera.position.set(0, 8, 12);
            studioCamera.lookAt(0, 0, 0);

            function renderStudio() {
                requestAnimationFrame(renderStudio);
                studioRenderer.render(studioScene, studioCamera);
            }
            renderStudio();
        },
        addBlock(colorHex) {
            const x = (Math.floor(Math.random() * 5) - 2) * 1.5;
            const z = (Math.floor(Math.random() * 5) - 2) * 1.5;
            const y = 0.5;

            const boxGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
            const boxMat = new THREE.MeshStandardMaterial({ color: colorHex });
            const mesh = new THREE.Mesh(boxGeo, boxMat);
            mesh.position.set(x, y, z);
            studioScene.add(mesh);

            studioBlocksData.push({ x, y, z, color: colorHex });
        },
        clear() {
            studioBlocksData = [];
            if(studioScene) {
                while(studioScene.children.length > 0){ 
                    studioScene.remove(studioScene.children[0]); 
                }
                studioScene.add(new THREE.GridHelper(20, 20, 0x0070ff, 0x444455));
                studioScene.add(new THREE.AmbientLight(0xffffff, 0.7));
            }
        }
    };

    function runGameWorldEngine(mapData) {
        const holder = document.getElementById("canvas-game-container");
        
        const oldCanvas = holder.querySelector('canvas');
        if(oldCanvas) oldCanvas.remove();

        gameScene = new THREE.Scene();
        gameScene.background = new THREE.Color(0xa0b0d0);

        gameCamera = new THREE.PerspectiveCamera(60, holder.clientWidth / holder.clientHeight, 0.1, 1000);
        gameRenderer = new THREE.WebGLRenderer({ antialias: true });
        gameRenderer.setSize(holder.clientWidth, holder.clientHeight);
        holder.appendChild(gameRenderer.domElement);

        // FIX: Changed from PlainGeometry to PlaneGeometry, and rotated it correctly
        const floorGeo = new THREE.PlaneGeometry(50, 50);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x347a40, side: THREE.DoubleSide });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = Math.PI / 2;
        floor.position.y = 0;
        gameScene.add(floor);

        if (mapData && mapData.length > 0) {
            mapData.forEach(b => {
                const block = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({ color: b.color }));
                block.position.set(b.x, b.y, b.z);
                gameScene.add(block);
            });
        }

        playerMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({ color: 0xffcc00 }));
        playerMesh.position.set(0, 1, 0);
        gameScene.add(playerMesh);

        gameScene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 30, 15);
        gameScene.add(sun);

        gameCamera.position.set(0, 6, 10);

        function loop() {
            if (!currentRoomId) return;
            requestAnimationFrame(loop);

            if (moveKeys.w) playerMesh.position.z -= 0.1;
            if (moveKeys.s) playerMesh.position.z += 0.1;
            if (moveKeys.a) playerMesh.position.x -= 0.1;
            if (moveKeys.d) playerMesh.position.x += 0.1;

            gameCamera.position.x = playerMesh.position.x;
            gameCamera.position.z = playerMesh.position.z + 8;
            gameCamera.lookAt(playerMesh.position);

            gameRenderer.render(gameScene, gameCamera);
        }
        loop();
    }

    // FIX: Checked if e.key exists and handle string conversions cleanly to avoid .toLowerCase() crash
    window.addEventListener('keydown', (e) => {
        if (!e.key) return;
        const key = e.key.toLowerCase();
        if(key === 'w' || key === 'arrowup') moveKeys.w = true;
        if(key === 's' || key === 'arrowdown') moveKeys.s = true;
        if(key === 'a' || key === 'arrowleft') moveKeys.a = true;
        if(key === 'd' || key === 'arrowright') moveKeys.d = true;
    });
    
    window.addEventListener('keyup', (e) => {
        if (!e.key) return;
        const key = e.key.toLowerCase();
        if(key === 'w' || key === 'arrowup') moveKeys.w = false;
        if(key === 's' || key === 'arrowdown') moveKeys.s = false;
        if(key === 'a' || key === 'arrowleft') moveKeys.a = false;
        if(key === 'd' || key === 'arrowright') moveKeys.d = false;
    });

    const core = {
        init() {
            if (user) {
                document.getElementById("login-overlay").style.display = "none";
                document.getElementById("main-ui").style.visibility = "visible";
                document.getElementById("disp-user").innerText = user.name;
                document.getElementById("disp-cubes").innerText = (user.name === "BloxColaYT") ? "∞ CUBES" : user.cubes + " CUBES";
                initMenuAvatar();
            }
        },
        login() {
            const username = document.getElementById("u-in").value;
            const password = document.getElementById("p-in").value;
            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            }).then(res => res.json()).then(data => {
                if(data.success) {
                    localStorage.setItem('cw_user', JSON.stringify({name: data.user, cubes: data.cubes}));
                    location.reload();
                }
            });
        },
        nav(id, el) {
            document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
            document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
            document.getElementById("view-" + id).classList.add("active");
            el.classList.add("active");
        },
        publish() {
            const name = document.getElementById("new-game-name").value;
            const logo = document.getElementById("new-game-logo").value;
            if(!name) return alert("Please type a name in the Studio panel first!");
            
            socket.emit("publish-game", { 
                name, 
                logo, 
                user: user.name, 
                mapData: studioBlocksData 
            });

            document.getElementById("new-game-name").value = "";
            document.getElementById("new-game-logo").value = "";
            studio.clear();
            this.nav('games', document.querySelectorAll('.nav-item')[0]);
        },
        joinGame(id, name, mapDataString) {
            currentRoomId = id;
            document.getElementById("active-game-title").innerText = name;
            document.getElementById("game-screen").style.display = "flex";
            document.getElementById("server-chat-logs").innerHTML = "";
            
            socket.emit("join-room", { roomId: id, user: user.name });

            const parsedBlocks = JSON.parse(decodeURIComponent(mapDataString));
            setTimeout(() => runGameWorldEngine(parsedBlocks), 200);
        },
        leaveGame() {
            document.getElementById("game-screen").style.display = "none";
            currentRoomId = null;
        },
        setTheme(t) { document.body.className = "theme-" + t; },
        sendGlobal() {
            const text = document.getElementById("chat-in").value;
            if(!text) return;
            socket.emit("global-msg", { from: user.name, text });
            document.getElementById("chat-in").value = "";
        },
        openPM(target) {
            if(target === user.name) return;
            activePM = target;
            document.getElementById("pm-target").innerText = `Chat with ${target}`;
            document.getElementById("pm-window").style.display = "block";
            document.getElementById("pm-logs").innerHTML = "";
        },
        sendPM() {
            const text = document.getElementById("pm-in").value;
            if(!text) return;
            socket.emit("send-pm", { from: user.name, to: activePM, text });
            document.getElementById("pm-in").value = "";
        }
    };

    socket.on("sync-games", (games) => {
        document.getElementById("game-list").innerHTML = games.map(g => {
            const mapDataString = encodeURIComponent(JSON.stringify(g.mapData || []));
            return `
                <div class="game-card">
                    <div style="display:flex; align-items:center;">
                        <img class="game-logo" src="${g.logo}">
                        <div><b>${g.name}</b><br><small style="color:#64748b">by ${g.creator}</small></div>
                    </div>
                    <button class="btn" style="width: auto; padding: 8px 16px;" onclick="core.joinGame('${g.id}', '${g.name}', '${mapDataString}')">Play</button>
                </div>
            `;
        }).join('');
    });

    socket.on("global-receive", (data) => {
        document.getElementById("global-chat").innerHTML += `
            <div style="margin-bottom:8px;">
                <b onclick="core.openPM('${data.from}')" style="color:var(--accent); cursor:pointer;">${data.from}:</b> ${data.text}
            </div>`;
        document.getElementById("global-chat").scrollTop = document.getElementById("global-chat").scrollHeight;
    });

    socket.on("pm-receive", (data) => {
        if(data.to === user.name || data.from === user.name) {
            if(activePM === data.from || activePM === data.to) {
                document.getElementById("pm-logs").innerHTML += `<div><b>${data.from}:</b> ${data.text}</div>`;
            }
        }
    });

    socket.on("server-msg", (data) => {
        document.getElementById("server-chat-logs").innerHTML += `<div><b>${data.user}:</b> ${data.text}</div>`;
        document.getElementById("server-chat-logs").scrollTop = document.getElementById("server-chat-logs").scrollHeight;
    });

    document.getElementById("server-chat-in").addEventListener("keypress", (e) => {
        if(e.key === "Enter" && e.target.value) {
            socket.emit("game-chat-send", { roomId: currentRoomId, user: user.name, text: e.target.value });
            e.target.value = "";
        }
    });

    core.init();
</script>
</body>
</html>
