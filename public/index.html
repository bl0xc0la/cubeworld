<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CubeWorld</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <style>
        :root {
            --bg: #08080a; --panel: #121217; --accent: #3b82f6; 
            --text: #a1a1aa; --text-bright: #ffffff;
            --border: #27272a; --ui-corner: 15px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        .btn { background: var(--accent); color: #fff; border: none; padding: 12px 24px; border-radius: var(--ui-corner); font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--ui-corner); padding: 30px; width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        input { 
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; 
            border: 1px solid var(--border); background: #000; color: white; outline: none;
        }
        input:focus { border-color: var(--accent); }

        /* Navigation & Sidebar */
        #sidebar { width: 280px; background: #000; border-right: 1px solid var(--border); display: none; flex-direction: column; padding: 25px; }
        .nav-link { padding: 15px; cursor: pointer; border-radius: var(--ui-corner); margin-bottom: 5px; transition: 0.2s; font-weight: 600; }
        .nav-link.active { background: var(--panel); color: white; border: 1px solid var(--border); }

        main { flex: 1; padding: 40px; overflow-y: auto; display: none; }
        .page { display: none; }
        .active-page { display: block; }

        #viewport-container { width: 100%; height: 500px; border-radius: var(--ui-corner); border: 1px solid var(--border); background: #000; position: relative; overflow: hidden; }
        #viewport { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="auth-overlay" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div class="card">
        <h1 style="color:white; margin-bottom:10px; letter-spacing:-1px;">cubeworld</h1>
        <p style="margin-bottom:25px; font-size:14px;">Enter your credentials to join.</p>
        
        <input id="auth-user" type="text" placeholder="Username">
        <input id="auth-pass" type="password" placeholder="Password">
        
        <button class="btn" onclick="handleAuth()">Access Account</button>
        <p id="auth-error" style="color:#ef4444; font-size:12px; margin-top:15px; text-align:center;"></p>
    </div>
</div>

<div id="sidebar">
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:40px;">
        <div id="pfp" style="width:50px; height:50px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; color:white; font-weight:900;">?</div>
        <div>
            <div id="u-name" style="color:white; font-weight:bold;">Guest</div>
            <div id="u-bucks" style="font-size:12px; color:var(--accent);">0 CB</div>
        </div>
    </div>
    <div class="nav-link active" onclick="nav('games')">Discover</div>
    <div class="nav-link" onclick="nav('studio')">Studio</div>
    <div class="nav-link" style="margin-top:auto; color:#ef4444" onclick="location.reload()">Logout</div>
</div>

<main id="app-main">
    <div id="page-games" class="page active-page">
        <h1 style="color:white; margin-bottom:30px;">Discover</h1>
        <div id="game-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap:20px;"></div>
    </div>

    <div id="page-studio" class="page">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h1 style="color:white;">Editor</h1>
            <button class="btn" style="width:auto" onclick="publishGame()">🚀 Publish</button>
        </div>
        <div id="viewport-container">
            <div id="viewport"></div>
            <div style="position:absolute; bottom:20px; left:20px; display:flex; gap:10px;">
                <button class="btn" style="background:#27272a; width:auto;" onclick="studio.addPart()">+ Cube</button>
            </div>
        </div>
    </div>
</main>

<script>
    const socket = io();
    let user = null;

    async function handleAuth() {
        const username = document.getElementById('auth-user').value;
        const password = document.getElementById('auth-pass').value;
        const errorEl = document.getElementById('auth-error');

        if(!username || !password) return errorEl.innerText = "Fill in both fields!";

        const res = await fetch('/api/auth/entry', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, password })
        });

        if(res.ok) {
            const data = await res.json();
            login(data.user);
        } else {
            errorEl.innerText = await res.text();
        }
    }

    function login(userData) {
        user = userData;
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('app-main').style.display = 'block';
        document.getElementById('u-name').innerText = user.username;
        document.getElementById('pfp').innerText = user.username[0].toUpperCase();
        document.getElementById('u-bucks').innerText = user.cubebucks + " CB";
        socket.emit('join-session', user.username);
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById('page-' + id).classList.add('active-page');
        if(id === 'studio') studio.init();
    }

    // --- 3D ENGINE ---
    const studio = {
        scene: null, cam: null, renderer: null, control: null, objects: [],
        init() {
            if(this.renderer) return;
            const container = document.getElementById('viewport');
            this.scene = new THREE.Scene();
            this.scene.background = new THREE.Color(0x08080a);
            this.cam = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(this.renderer.domElement);

            this.control = new THREE.TransformControls(this.cam, this.renderer.domElement);
            this.scene.add(this.control);
            this.scene.add(new THREE.GridHelper(50, 50, 0x27272a, 0x27272a));
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            this.cam.position.set(10, 10, 10);
            this.cam.lookAt(0,0,0);

            window.addEventListener('keydown', (e) => {
                if(e.key === 't') this.control.setMode('translate');
                if(e.key === 'r') this.control.setMode('rotate');
                if(e.key === 's') this.control.setMode('scale');
            });

            window.addEventListener('mousedown', (e) => {
                const rect = container.getBoundingClientRect();
                const mouse = new THREE.Vector2(
                    ((e.clientX - rect.left) / container.clientWidth) * 2 - 1,
                    -((e.clientY - rect.top) / container.clientHeight) * 2 + 1
                );
                const ray = new THREE.Raycaster();
                ray.setFromCamera(mouse, this.cam);
                const hits = ray.intersectObjects(this.objects);
                if(hits.length > 0) this.control.attach(hits[0].object);
            });

            this.render();
        },
        addPart() {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshStandardMaterial({color: 0x3b82f6}));
            mesh.position.y = 1;
            this.scene.add(mesh);
            this.objects.push(mesh);
            this.control.attach(mesh);
        },
        render() { requestAnimationFrame(() => this.render()); this.renderer.render(this.scene, this.cam); }
    };

    socket.on('sync-games', games => {
        document.getElementById('game-list').innerHTML = games.map(g => `
            <div class="card" style="width:100%">
                <b style="color:white; font-size:18px;">${g.name}</b>
                <p style="font-size:12px; margin-top:5px;">by ${g.creator}</p>
                <button class="btn" style="margin-top:15px;" onclick="nav('studio')">Play</button>
            </div>
        `).join('');
    });

    function publishGame() {
        const name = prompt("Name:");
        if(name) socket.emit('publish-game', { name, creator: user.username, parts: [] });
    }
</script>
</body>
</html>
