<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="n7p7UOErXQiczzvvaaj9eOXtoEKdtDYR-pfbA4bVhs0" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeWorld</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #080a0f; --panel: #0f121a; --accent: #0070ff;
            --shadow: 0 10px 30px rgba(0,0,0,0.5); --radius: 20px;
        }
        /* THEMES */
        body.theme-roblox { --bg: #05070a; --accent: #0070ff; }
        body.theme-neon { --bg: #000; --accent: #00f28d; --panel: #111; }
        body.theme-dark { --bg: #111; --panel: #1a1a1a; --accent: #ffffff; }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; transition: 0.3s; }

        #login-view { position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; }
        .card { background: var(--panel); padding: 25px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.05); }
        input { width:100%; padding:12px; border-radius:10px; border:none; background:#000; color:white; margin-bottom:10px; outline:none; }
        .btn { background:var(--accent); color:white; border:none; padding:12px 25px; border-radius:10px; cursor:pointer; font-weight:700; transition:0.2s; }

        .app-grid { display: grid; grid-template-columns: 240px 1fr 300px; height: 100vh; padding: 15px; gap: 15px; visibility: hidden; }
        .sidebar { background: var(--panel); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; }
        .nav-link { padding: 12px; cursor: pointer; color: #888; border-radius: 10px; margin-bottom: 5px; }
        .nav-link.active { background: rgba(255,255,255,0.05); color: white; }

        main { overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }

        /* MULTIPLAYER OVERLAY */
        #game-overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; }
        .game-chat { height: 200px; background: rgba(0,0,0,0.8); position: absolute; bottom: 0; width: 400px; padding: 15px; }

        .hidden { display: none !important; }
    </style>
</head>
<body class="theme-roblox">

<div id="login-view">
    <div class="card" style="width: 320px; text-align: center;">
        <h1 style="margin-bottom: 20px;">CubeWorld</h1>
        <input id="u-in" type="text" placeholder="Username">
        <input id="p-in" type="password" placeholder="Password">
        <button class="btn" style="width: 100%" onclick="core.login()">Enter</button>
    </div>
</div>

<div id="game-overlay">
    <button class="btn" style="position: absolute; top: 20px; right: 20px;" onclick="core.leaveGame()">EXIT SERVER</button>
    <div style="flex: 1; display: flex; align-items: center; justify-content: center;">
        <h1 id="playing-title">Joining Server...</h1>
    </div>
    <div class="game-chat">
        <div id="server-logs" style="height: 140px; overflow-y: auto; font-size: 13px;"></div>
        <input id="server-in" placeholder="In-game chat..." style="margin-top: 5px;">
    </div>
</div>

<div class="app-grid" id="main-app">
    <aside class="sidebar">
        <div style="margin-bottom: 20px;">
            <div id="u-name" style="font-weight: 700;">User</div>
            <div id="u-cubes" style="color: gold; font-size: 12px; font-weight: 700;">0 C</div>
        </div>
        <div class="nav-link active" onclick="core.nav('games', this)">Games</div>
        <div class="nav-link" onclick="core.nav('studio', this)">Studio</div>
        <div class="nav-link" onclick="core.nav('settings', this)">Settings</div>
        <div class="nav-link" style="margin-top: auto; opacity: 0.5;" onclick="core.logout()">Logout</div>
    </aside>

    <main class="card">
        <section id="view-games" class="view active">
            <h2>Discover</h2>
            <div id="game-list" style="margin-top: 15px;"></div>
        </section>

        <section id="view-studio" class="view">
            <h2>Creator Studio</h2>
            <div style="background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; margin-top: 15px;">
                <input id="studio-title" placeholder="Game Name...">
                <button class="btn" onclick="core.publish()">Publish to Feed</button>
            </div>
        </section>

        <section id="view-settings" class="view">
            <h2>Settings</h2>
            <div style="margin-top: 20px;">
                <p>Select Theme:</p>
                <button class="btn" style="background:#0070ff" onclick="core.setTheme('roblox')">Roblox Blue</button>
                <button class="btn" style="background:#00f28d; color:black" onclick="core.setTheme('neon')">Neon Green</button>
                <button class="btn" style="background:#333" onclick="core.setTheme('dark')">Onyx Dark</button>
            </div>
        </section>
    </main>

    <aside class="sidebar">
        <h3>Global Chat</h3>
        <div id="global-logs" style="flex: 1; overflow-y: auto; margin-top: 10px; font-size: 13px;"></div>
        <div style="display: flex; gap: 5px;">
            <input id="global-in" placeholder="Talk globally..." style="margin-bottom: 0;">
            <button class="btn" onclick="core.globalChat()">></button>
        </div>
    </aside>
</div>

<script>
    const socket = io();
    let session = JSON.parse(localStorage.getItem('cw_v3_session'));
    let currentGameId = null;

    const core = {
        init() {
            if (session) {
                document.getElementById("login-view").style.display = "none";
                document.getElementById("main-app").style.visibility = "visible";
                document.getElementById("u-name").innerText = session.name;
                document.getElementById("u-cubes").innerText = (session.name === "BloxColaYT") ? "∞ CUBES" : session.cubes + " CUBES";
            }
        },
        login() {
            const username = document.getElementById("u-in").value;
            const password = document.getElementById("p-in").value;
            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            }).then(res => res.json()).then(data => {
                if(data.success) {
                    localStorage.setItem('cw_v3_session', JSON.stringify({name: data.user, cubes: data.cubes}));
                    location.reload();
                }
            });
        },
        nav(id, el) {
            document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
            document.querySelectorAll(".nav-link").forEach(n => n.classList.remove("active"));
            document.getElementById("view-" + id).classList.add("active");
            el.classList.add("active");
        },
        publish() {
            const name = document.getElementById("studio-title").value;
            if(!name) return;
            socket.emit("publish", { name, user: session.name });
            document.getElementById("studio-title").value = "";
            this.nav('games', document.querySelector('.nav-link'));
        },
        join(id, name) {
            currentGameId = id;
            document.getElementById("playing-title").innerText = "Server: " + name;
            document.getElementById("game-overlay").style.display = "flex";
            document.getElementById("server-logs").innerHTML = "";
            socket.emit("join-server", id);
        },
        leaveGame() { 
            document.getElementById("game-overlay").style.display = "none"; 
            currentGameId = null;
        },
        setTheme(t) { document.body.className = "theme-" + t; },
        globalChat() {
            const text = document.getElementById("global-in").value;
            socket.emit("global-send", { from: session.name, text });
            document.getElementById("global-in").value = "";
        },
        logout() { localStorage.removeItem('cw_v3_session'); location.reload(); }
    };

    // Socket Events
    socket.on("sync-games", (games) => {
        document.getElementById("game-list").innerHTML = games.map(g => `
            <div class="card" style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <div><b>${g.name}</b><br><small>by ${g.creator}</small></div>
                <button class="btn" onclick="core.join('${g.id}', '${g.name}')">JOIN</button>
            </div>
        `).join('');
    });

    socket.on("global-receive", (data) => {
        document.getElementById("global-logs").innerHTML += `<div><b>${data.from}:</b> ${data.text}</div>`;
    });

    socket.on("server-msg", (data) => {
        document.getElementById("server-logs").innerHTML += `<div><b>${data.user}:</b> ${data.text}</div>`;
    });

    // In-game chat trigger
    document.getElementById("server-in").addEventListener("keypress", (e) => {
        if(e.key === "Enter") {
            socket.emit("game-chat-send", { gameId: currentGameId, user: session.name, text: e.target.value });
            e.target.value = "";
        }
    });

    core.init();
</script>
</body>
</html>
