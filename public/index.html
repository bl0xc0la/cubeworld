<!DOCTYPE html>
<html>
<head>
    <title>CubeWorld Studio Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --retro-blue: #0055ff; --old-gui: #d6d6d6; }
        body { margin: 0; font-family: 'Tahoma', sans-serif; background: #eee; overflow: hidden; }
        
        /* THE OLD UI THEME */
        #top-bar { background: var(--retro-blue); color: white; padding: 10px; display: flex; justify-content: space-between; border-bottom: 4px solid #0033aa; }
        #player-list { position: fixed; top: 60px; right: 10px; background: rgba(255,255,255,0.8); border: 2px solid #999; width: 150px; padding: 10px; z-index: 100; }
        
        /* STUDIO LAYOUT */
        .studio-ui { display: flex; height: 100vh; }
        #sidebar { width: 250px; background: var(--old-gui); border-right: 2px solid #999; padding: 10px; }
        #viewport { flex: 1; background: #000; position: relative; }
        
        /* PROPERTY EDITOR */
        .prop-box { background: white; border: 1px solid #777; margin-top: 10px; padding: 5px; font-size: 12px; }
        .part-btn { width: 100%; padding: 5px; margin-bottom: 5px; cursor: pointer; border: 1px inset #fff; background: #ccc; }
        
        #admin-panel { display: none; background: #ffcccc; padding: 10px; border: 2px solid red; margin-top: 20px; }
    </style>
</head>
<body>

<div id="top-bar">
    <b>CUBEWORLD v2.0</b>
    <div id="user-info">Cola | <span id="cube-count">500</span> Cubes</div>
</div>

<div id="player-list">
    <b>Players</b>
    <hr>
    <div id="players-online"></div>
</div>

<div class="studio-ui">
    <aside id="sidebar">
        <h3>Insert Parts</h3>
        <button class="part-btn" onclick="studio.addPart('block')">Block</button>
        <button class="part-btn" onclick="studio.addPart('sphere')">Sphere</button>
        <button class="part-btn" onclick="studio.addPart('wedge')">Wedge</button>
        
        <div class="prop-box" id="props">
            <b>Properties</b>
            <div id="prop-content">Select a part...</div>
        </div>

        <div id="admin-panel">
            <b>🛡️ ADMIN PANEL</b><br>
            <button onclick="admin.ban()">Ban User</button>
            <button onclick="admin.shutdown()">Shutdown</button>
        </div>
    </aside>

    <main id="viewport">
        </main>
</div>

<script>
    const socket = io();
    let selectedPart = null;

    // --- STUDIO ENGINE ---
    const studio = {
        scene: new THREE.Scene(),
        init() {
            const container = document.getElementById('viewport');
            this.cam = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer();
            this.renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(this.renderer.domElement);
            this.cam.position.set(5, 5, 5);
            this.cam.lookAt(0,0,0);
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            this.render();
        },
        addPart(type) {
            let geo;
            if(type === 'sphere') geo = new THREE.SphereGeometry(0.5, 16, 16);
            else if(type === 'wedge') geo = new THREE.CylinderGeometry(0, 0.5, 1, 4);
            else geo = new THREE.BoxGeometry(1, 1, 1);

            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: 0xaaaaaa}));
            mesh.name = "Part_" + Math.floor(Math.random()*1000);
            this.scene.add(mesh);
            this.select(mesh);
        },
        select(mesh) {
            selectedPart = mesh;
            document.getElementById('prop-content').innerHTML = `
                Name: <input value="${mesh.name}"><br>
                Color: <input type="color" onchange="selectedPart.material.color.set(this.value)">
            `;
        },
        render() {
            requestAnimationFrame(() => this.render());
            this.renderer.render(this.scene, this.cam);
        }
    };

    // --- NETWORKING ---
    socket.emit("join-server", "Cola"); // Hardcoded for now
    socket.on("update-player-list", (list) => {
        document.getElementById("players-online").innerHTML = list.map(p => `<div>• ${p}</div>`).join('');
    });

    studio.init();
</script>
</body>
</html>
