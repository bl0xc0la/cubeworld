<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>cubeworld</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <style>
        :root {
            --bg: #0d1117; 
            --panel: #161b22; 
            --sidebar: #010409;
            --accent: #007bff; 
            --text: #c9d1d9; 
            --text-bright: #ffffff;
            --border: #30363d;
            --card: #21262d;
            --danger: #da3633;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Auth Overlay */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--panel); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 380px; text-align: center; }

        /* Sidebar */
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: none; flex-direction: column; padding: 25px 0; }
        .sidebar-brand { padding: 0 25px 30px; font-weight: 800; font-size: 24px; color: var(--text-bright); }
        .nav-link { padding: 12px 25px; cursor: pointer; color: var(--text); font-size: 14px; border-left: 3px solid transparent; transition: 0.2s; }
        .nav-link.active { background: rgba(0, 123, 255, 0.1); border-left-color: var(--accent); color: var(--text-bright); }

        /* Main Content */
        main { flex: 1; padding: 40px; overflow-y: auto; display: none; }
        .page { display: none; width: 100%; max-width: 1100px; margin: 0 auto; }
        .page.active-page { display: block; }

        /* Grids & Cards */
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; gap: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }

        /* Viewport */
        #viewport-container { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #000; height: 450px; margin-bottom: 20px; }
        #viewport { width: 100%; height: 100%; }

        /* Chat */
        #chat-sidebar { width: 320px; background: var(--sidebar); border-left: 1px solid var(--border); display: none; flex-direction: column; }
        #chat-history { flex: 1; padding: 20px; overflow-y: auto; font-size: 13px; }
        .chat-input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; }

        /* UI Elements */
        .btn { background: var(--accent); color: #fff; border: none; padding: 10px 18px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; }
        .btn-danger { background: var(--danger); }
        .btn-secondary { background: #30363d; color: var(--text); }
        input { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; width: 100%; outline: none; }
        .search-bar { max-width: 400px; margin-bottom: 0; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h1 style="margin-bottom:20px">cubeworld</h1>
        <input id="auth-user" placeholder="Username">
        <input id="auth-pass" type="password" placeholder="Password">
        <button class="btn" style="width:100%" onclick="handleAuth()">Login / Sign Up</button>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-brand">cubeworld</div>
    <div class="nav-link active" id="link-games" onclick="nav('games')">Discover</div>
    <div class="nav-link" id="link-studio" onclick="nav('studio')">Studio</div>
    <div class="nav-link" id="link-shop" onclick="nav('shop')">Avatar Shop</div>
    <div class="nav-link" id="link-settings" onclick="nav('settings')">Settings</div>
    <div class="nav-link" id="link-admin" style="display:none" onclick="nav('admin')">Admin Panel</div>
    <div class="nav-link" style="margin-top:auto; color: var(--danger)" onclick="logout()">Logout</div>
</div>

<main id="app-main">
    <div id="page-games" class="page active-page">
        <div class="header-row">
            <h1>Discover</h1>
            <input type="text" id="game-search" class="search-bar" placeholder="Search games..." oninput="filterGames()">
        </div>
        <div id="game-list" class="grid"></div>
    </div>

    <div id="page-studio" class="page">
        <div class="header-row">
            <h1>Studio</h1>
            <button class="btn" onclick="publishGame()">Publish Game</button>
        </div>
        <div id="viewport-container"><div id="viewport"></div></div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-secondary" onclick="studio.addPart()">Add Cube</button>
            <button class="btn btn-danger" onclick="studio.clear()">Clear All</button>
        </div>
    </div>

    <div id="page-shop" class="page">
        <h1>Avatar Shop</h1>
        <p>Balance: <span id="cb-balance">0</span> CubeBucks</p>
        <button class="btn" style="margin:20px 0" onclick="claimDaily()">Claim Daily Rewards</button>
        <div class="grid">
            <div class="card"><h3>Classic Hat</h3><p>50 CB</p><button class="btn btn-secondary">Buy</button></div>
        </div>
    </div>

    <div id="page-settings" class="page">
        <h1>Settings</h1>
        <button class="btn btn-danger" style="margin-top:20px" onclick="deleteAccount()">Delete Account</button>
    </div>

    <div id="page-admin" class="page">
        <h1>Admin Panel</h1>
        <div class="grid" style="margin-top:20px">
            <div class="card">
                <h3>User Management</h3>
                <input id="adm-user" placeholder="Username">
                <button class="btn" onclick="adminAction('ban')">Ban User</button>
                <button class="btn btn-secondary" onclick="adminAction('unban')" style="margin-top:5px">Unban</button>
            </div>
            <div class="card">
                <h3>Economy</h3>
                <input id="adm-amt" placeholder="Amount">
                <button class="btn" onclick="adminAction('give')">Give CubeBucks</button>
            </div>
            <div class="card">
                <h3>System</h3>
                <button class="btn btn-danger" onclick="adminAction('maintenance')">Toggle Maintenance</button>
            </div>
        </div>
    </div>
</main>

<div id="chat-sidebar">
    <div style="padding:20px; font-weight:bold; border-bottom:1px solid var(--border)">Global Chat</div>
    <div id="chat-history"></div>
    <div class="chat-input-area">
        <input id="chat-msg" placeholder="Message..." onkeydown="if(event.key==='Enter') sendChat()">
        <button class="btn" onclick="sendChat()">Send</button>
    </div>
</div>

<script>
    const socket = io();
    let user = null;
    let allGames = [];

    // --- AUTHENTICATION ---
    async function handleAuth() {
        const username = document.getElementById('auth-user').value;
        const password = document.getElementById('auth-pass').value;
        // Simple combined logic: try login, if fails with 404, try register
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, password })
        });

        if (res.ok) {
            loginSuccess(await res.json());
        } else {
            // Try register if login failed
            const reg = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });
            if(reg.ok) loginSuccess(await reg.json());
            else alert("Authentication failed.");
        }
    }

    function loginSuccess(data) {
        user = data;
        localStorage.setItem('cubeSession', JSON.stringify(data));
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('app-main').style.display = 'block';
        document.getElementById('chat-sidebar').style.display = 'flex';
        document.getElementById('cb-balance').innerText = data.cubebucks || 0;
        if(data.isAdmin) document.getElementById('link-admin').style.display = 'block';
        socket.emit('join-session', data.username);
    }

    // --- NAVIGATION ---
    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        const target = document.getElementById('page-' + id);
        if(target) target.classList.add('active-page');
        const link = document.getElementById('link-' + id);
        if(link) link.classList.add('active');
        if(id === 'studio') studio.init();
    }

    // --- STUDIO & GAMES ---
    const studio = {
        scene: null, cam: null, renderer: null, objects: [],
        init() {
            if(this.renderer) return;
            const container = document.getElementById('viewport');
            this.scene = new THREE.Scene();
            this.cam = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(this.renderer.domElement);
            this.scene.add(new THREE.GridHelper(30, 30, 0x30363d, 0x30363d));
            this.cam.position.set(10, 10, 10);
            this.cam.lookAt(0,0,0);
            this.render();
        },
        addPart() {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshNormalMaterial());
            this.scene.add(mesh);
            this.objects.push(mesh);
        },
        clear() { this.objects.forEach(o => this.scene.remove(o)); this.objects = []; },
        render() { requestAnimationFrame(() => this.render()); this.renderer.render(this.scene, this.cam); }
    };

    function publishGame() {
        const name = prompt("Name your cubeworld game:");
        if(!name) return;
        socket.emit('publish-game', {
            name: name,
            creator: user.username,
            parts: studio.objects.map(o => ({ pos: o.position }))
        });
        alert("Published!");
    }

    function filterGames() {
        const term = document.getElementById('game-search').value.toLowerCase();
        const filtered = allGames.filter(g => g.name.toLowerCase().includes(term));
        renderGames(filtered);
    }

    function renderGames(list) {
        document.getElementById('game-list').innerHTML = list.map(g => `
            <div class="card">
                <b>${g.name}</b><br><small>by ${g.creator}</small>
                <button class="btn" style="width:100%; margin-top:10px" onclick="alert('Joining...')">Play</button>
            </div>
        `).join('');
    }

    // --- GLOBAL CHAT ---
    function sendChat() {
        const input = document.getElementById('chat-msg');
        if(!input.value) return;
        socket.emit('send-chat', input.value);
        input.value = "";
    }

    socket.on('chat-receive', d => {
        const history = document.getElementById('chat-history');
        const msg = document.createElement('div');
        msg.innerHTML = `<b>${d.user}:</b> ${d.text}`;
        history.appendChild(msg);
        history.scrollTop = history.scrollHeight;
    });

    // --- ECONOMY & ADMIN ---
    async function claimDaily() {
        const res = await fetch('/api/daily-claim', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: user.username })
        });
        if(res.ok) {
            const data = await res.json();
            user.cubebucks = data.balance;
            document.getElementById('cb-balance').innerText = data.balance;
        } else alert(await res.text());
    }

    async function adminAction(action) {
        const target = document.getElementById('adm-user').value;
        const amount = document.getElementById('adm-amt').value;
        await fetch('/api/admin/action', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'username': user.username},
            body: JSON.stringify({ action, target, amount: parseInt(amount) })
        });
        alert("Admin action sent.");
    }

    async function deleteAccount() {
        if(!confirm("Permanently delete your account?")) return;
        await fetch('/api/delete-account', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: user.username })
        });
        logout();
    }

    function logout() { localStorage.removeItem('cubeSession'); window.location.reload(); }

    socket.on('sync-games', games => { allGames = games; renderGames(games); });

    window.onload = () => {
        const saved = localStorage.getItem('cubeSession');
        if(saved) loginSuccess(JSON.parse(saved));
    }
</script>
</body>
</html>
