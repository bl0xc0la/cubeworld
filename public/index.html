<!DOCTYPE html>
<html>
<head>
    <title>CubeWorld</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <style>
        :root { --bg: #0b0e14; --panel: #12161f; --accent: #3b82f6; --text: #fff; --border: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; padding: 15px; gap: 15px; }

        #sidebar { width: 260px; background: #0f121a; border-radius: 20px; border: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        main { flex: 1; background: var(--panel); border-radius: 25px; border: 1px solid var(--border); padding: 30px; overflow-y: auto; }
        .page { display: none; }
        .active { display: block; }

        /* Studio & UI Editor */
        #viewport { width: 100%; height: 450px; background: #000; border-radius: 15px; position: relative; }
        #in-game-ui-layer { position: absolute; inset: 0; pointer-events: none; }
        .draggable-ui-text { position: absolute; color: white; font-weight: bold; pointer-events: auto; cursor: move; }

        /* Friends List */
        .friend-item { background: var(--bg); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .friend-item.pinned { border-color: #fbbf24; background: rgba(251, 191, 36, 0.05); }
        
        .btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-pin { background: #fbbf24; color: #000; font-size: 10px; padding: 4px 8px; }
        .nav-item { padding: 12px; border-radius: 10px; cursor: pointer; color: #64748b; margin-bottom: 5px; }
        .nav-item:hover, .nav-active { background: var(--panel); color: #fff; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="text-align:center; margin-bottom:30px">
        <div style="width:60px; height:60px; background:var(--accent); border-radius:50%; margin:0 auto 10px"></div>
        <h3>BloxColaYT</h3>
    </div>
    <div class="nav-item" onclick="nav('games')">Games</div>
    <div class="nav-item nav-active" onclick="nav('studio')">Studio Workspace</div>
    <div class="nav-item" onclick="nav('friends')">Connections</div>
    <div class="nav-item" onclick="nav('admin')">Admin Panel</div>
</div>

<main>
    <div id="page-games" class="page">
        <h1>Multiplayer Games</h1>
        <button class="btn" style="margin-top:20px" onclick="joinMultiplayer()">Join Main Server</button>
        <div id="player-list-ui" style="margin-top:20px"></div>
    </div>

    <div id="page-studio" class="page active">
        <h2>Studio Workspace V3</h2>
        <div id="viewport">
            <div id="in-game-ui-layer"></div>
        </div>
        
        <div style="display:flex; gap:10px; margin-top:15px">
            <button class="btn" onclick="studio.spawnPart()">Add Part (Arrows)</button>
            <button class="btn" style="background:#7c3aed" onclick="studio.addText()">Add UI Text</button>
            <input type="color" id="p-col" value="#3b82f6" style="width:50px">
            <button class="btn" style="background:#ef4444" onclick="studio.deleteSelected()">Delete</button>
        </div>
    </div>

    <div id="page-friends" class="page">
        <h1>Connections</h1>
        <div style="margin: 20px 0; display:flex; gap:10px">
            <input id="friend-name" placeholder="Username..." style="flex:1; background:#000; border:1px solid var(--border); color:#fff; padding:10px; border-radius:8px">
            <button class="btn" onclick="addFriend()">Add Connection</button>
        </div>
        <div id="friends-list"></div>
    </div>
</main>

<script>
    const socket = io();
    const myUser = "BloxColaYT";
    let friends = JSON.parse(localStorage.getItem('friends') || '[]');

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        document.getElementById('page-'+id).classList.add('active');
        if(id === 'studio') studio.init();
        if(id === 'friends') renderFriends();
    }

    // --- STUDIO LOGIC ---
    const studio = {
        scene: null, cam: null, renderer: null, gizmo: null,
        init() {
            if(this.renderer) return;
            const container = document.getElementById('viewport');
            this.scene = new THREE.Scene();
            this.cam = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(this.renderer.domElement);
            
            this.scene.add(new THREE.GridHelper(20, 20, 0x1e293b, 0x1e293b));
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            this.cam.position.set(5, 5, 5);
            this.cam.lookAt(0,0,0);

            this.gizmo = new THREE.TransformControls(this.cam, this.renderer.domElement);
            this.scene.add(this.gizmo);
            
            this.render();
        },
        spawnPart() {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(1, 1, 1),
                new THREE.MeshStandardMaterial({ color: document.getElementById('p-col').value })
            );
            this.scene.add(mesh);
            this.gizmo.attach(mesh);
        },
        addText() {
            const txt = document.createElement('div');
            txt.className = 'draggable-ui-text';
            txt.innerText = 'New UI Text';
            txt.contentEditable = true;
            txt.style.left = '50px';
            txt.style.top = '50px';
            document.getElementById('in-game-ui-layer').appendChild(txt);
            // Simple drag logic
            txt.onmousedown = (e) => {
                let shiftX = e.clientX - txt.getBoundingClientRect().left;
                let shiftY = e.clientY - txt.getBoundingClientRect().top;
                function moveAt(pageX, pageY) {
                    txt.style.left = pageX - shiftX - 290 + 'px'; // Sidebar offset
                    txt.style.top = pageY - shiftY - 100 + 'px';
                }
                function onMouseMove(e) { moveAt(e.pageX, e.pageY); }
                document.addEventListener('mousemove', onMouseMove);
                txt.onmouseup = () => document.removeEventListener('mousemove', onMouseMove);
            };
        },
        deleteSelected() {
            if(this.gizmo.object) {
                this.scene.remove(this.gizmo.object);
                this.gizmo.detach();
            }
        },
        render() {
            requestAnimationFrame(() => this.render());
            this.renderer.render(this.scene, this.cam);
        }
    };

    // --- FRIENDS LOGIC ---
    function addFriend() {
        const name = document.getElementById('friend-name').value;
        if(name) {
            friends.push({ name, pinned: false });
            saveFriends();
            renderFriends();
        }
    }

    function togglePin(index) {
        friends[index].pinned = !friends[index].pinned;
        saveFriends();
        renderFriends();
    }

    function saveFriends() {
        localStorage.setItem('friends', JSON.stringify(friends));
    }

    function renderFriends() {
        // Sort: Pinned first
        const sorted = [...friends].sort((a, b) => b.pinned - a.pinned);
        const list = document.getElementById('friends-list');
        list.innerHTML = sorted.map((f, i) => `
            <div class="friend-item ${f.pinned ? 'pinned' : ''}">
                <span>${f.name} ${f.pinned ? '📌' : ''}</span>
                <button class="btn btn-pin" onclick="togglePin(${friends.indexOf(f)})">
                    ${f.pinned ? 'Unpin' : 'Pin to Top'}
                </button>
            </div>
        `).join('');
    }

    // --- MULTIPLAYER LOGIC ---
    function joinMultiplayer() {
        socket.emit('join-game', { username: myUser });
        alert("Joined Multiplayer! (Logic connected to backend)");
    }

    socket.on('current-players', (players) => {
        document.getElementById('player-list-ui').innerHTML = `<h3>Players Online:</h3>` + 
            Object.values(players).map(p => `<div>• ${p.username}</div>`).join('');
    });

    nav('studio');
</script>
</body>
</html>
