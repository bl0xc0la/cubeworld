<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeWorld | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    <style>
        /* CSS carried over from Flat UI with new additions */
        :root {
            --primary: #3a86ff;
            --primary-dark: #2563eb;
            --success: #06d6a0;
            --error: #ff4d6d;
            --warning: #ffbe0b;
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --border-radius: 8px;
            --admin-color: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-main); color: var(--text-main); }

        /* Auth/Login Overlay */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-main); z-index: 9999; display: flex;
        }

        .auth-side { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 4rem; background: var(--primary); }
        .auth-form-side { flex: 0 0 500px; display: flex; align-items: center; justify-content: center; padding: 2rem; border-left: 2px solid var(--border-color); background: var(--bg-main); }
        
        /* Main App Layout */
        .app-layout { display: none; min-height: 100vh; flex-direction: column; }
        .topbar { background: var(--bg-card); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--border-color); sticky: top; }
        
        .nav-links { display: flex; gap: 1rem; }
        .nav-item { padding: 0.5rem 1rem; border-radius: var(--border-radius); color: var(--text-muted); cursor: pointer; font-weight: 600; text-decoration: none; }
        .nav-item:hover, .nav-item.active { background: var(--bg-input); color: var(--text-main); }

        .content-body { padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; }
        .page { display: none; }
        .page.active { display: block; }

        /* Cards & Components */
        .card { background: var(--bg-card); border: 2px solid var(--border-color); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
        .btn { padding: 0.8rem 1.5rem; border-radius: var(--border-radius); font-weight: 700; cursor: pointer; border: none; transition: 0.2s; gap: 0.5rem; display: inline-flex; align-items: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        
        .badge-admin { background: var(--admin-color); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; margin-left: 8px; }
        
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-muted); }
        .form-input { width: 100%; padding: 0.8rem; background: var(--bg-input); border: 2px solid transparent; border-radius: var(--border-radius); color: white; outline: none; }
        .form-input:focus { border-color: var(--primary); }

        /* Group List */
        .group-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid var(--border-color); }
        
        /* Modal for Daily Reward */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-card); padding: 2.5rem; border-radius: 12px; text-align: center; max-width: 400px; border: 2px solid var(--primary); }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-side">
            <h1 style="font-size: 4rem; font-weight: 800;">CubeWorld.</h1>
            <p>Develop. Reward. Repeat.</p>
        </div>
        <div class="auth-form-side">
            <div style="width: 100%; max-width: 340px;">
                <h2 id="auth-title" style="margin-bottom: 0.5rem;">Create Account</h2>
                <p id="auth-sub" style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">Join the future of cuboid gaming.</p>
                
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="username-input" class="form-input" placeholder="BloxColaYT">
                </div>

                <form id="captcha-form">
                    <div class="h-captcha" data-sitekey="4d00da62-6dd2-434e-8e1a-1a8279c8321c"></div>
                    <button type="button" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" onclick="processAuth()">Enter CubeWorld</button>
                </form>
            </div>
        </div>
    </div>

    <div class="app-layout" id="main-app">
        <nav class="topbar">
            <div class="brand" style="font-weight: 800; font-size: 1.5rem; color: var(--primary);">
                <i class="fas fa-cube"></i> CUBEWORLD
            </div>
            <div class="nav-links">
                <div class="nav-item active" onclick="showPage('home')">Home</div>
                <div class="nav-item" onclick="showPage('groups')">Groups</div>
                <div class="nav-item" onclick="showPage('shop')">Shop</div>
            </div>
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <div style="color: var(--warning); font-weight: 700;">
                    <i class="fas fa-coins"></i> <span id="coin-balance">0</span> CC
                </div>
                <div id="user-display" style="font-weight: 600;"></div>
            </div>
        </nav>

        <main class="content-body">
            <div id="page-home" class="page active">
                <div class="card">
                    <h2>Welcome back, <span class="user-name-span"></span>!</h2>
                    <p style="color: var(--text-muted); margin-top: 0.5rem;">Your daily rewards are waiting.</p>
                    <button class="btn btn-success" style="margin-top: 1rem;" onclick="checkDailyReward()">
                        <i class="fas fa-gift"></i> Claim Daily CubeCoins
                    </button>
                </div>
            </div>

            <div id="page-groups" class="page">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h1>Groups</h1>
                    <button class="btn btn-primary" onclick="createGroup()">+ Create Group</button>
                </div>
                <div id="group-list" class="card">
                    <p style="color: var(--text-muted);">No groups found. Be the first to create one!</p>
                </div>
            </div>
        </main>
    </div>

    <div id="reward-modal" class="modal">
        <div class="modal-content">
            <h1 style="color: var(--warning); font-size: 3rem;"><i class="fas fa-coins"></i></h1>
            <h2 style="margin: 1rem 0;">+100 CubeCoins!</h2>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Come back in 24 hours for more.</p>
            <button class="btn btn-primary" onclick="closeModal()">Awesome!</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let userData = JSON.parse(localStorage.getItem('cubeUserData')) || {
            balance: 0,
            lastReward: 0,
            groups: []
        };

        // --- AUTH LOGIC ---
        function processAuth() {
            const username = document.getElementById('username-input').value.trim();
            const captchaResponse = hcaptcha.getResponse();

            if (!username) return alert("Please enter a username!");
            if (!captchaResponse) return alert("Please complete the Captcha!");

            currentUser = username;
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            
            setupUserUI();
        }

        function setupUserUI() {
            const display = document.getElementById('user-display');
            display.innerHTML = currentUser;
            
            // ADMIN CHECK
            if (currentUser.toLowerCase() === 'bloxcolayt') {
                display.innerHTML += '<span class="badge-admin">Admin</span>';
            }

            document.querySelectorAll('.user-name-span').forEach(el => el.innerText = currentUser);
            updateBalanceUI();
            renderGroups();
        }

        // --- CUBECOIN SYSTEM ---
        function updateBalanceUI() {
            document.getElementById('coin-balance').innerText = userData.balance;
            localStorage.setItem('cubeUserData', JSON.stringify(userData));
        }

        function checkDailyReward() {
            const now = Date.now();
            const oneDay = 24 * 60 * 60 * 1000;

            if (now - userData.lastReward > oneDay) {
                userData.balance += 100;
                userData.lastReward = now;
                updateBalanceUI();
                document.getElementById('reward-modal').style.display = 'flex';
            } else {
                const timeLeft = Math.ceil((oneDay - (now - userData.lastReward)) / (1000 * 60 * 60));
                alert(`Reward already claimed! Try again in ${timeLeft} hours.`);
            }
        }

        // --- GROUP SYSTEM ---
        function createGroup() {
            const gName = prompt("Enter Group Name:");
            if (gName) {
                userData.groups.push({ name: gName, members: 1, owner: currentUser });
                updateBalanceUI();
                renderGroups();
            }
        }

        function renderGroups() {
            const container = document.getElementById('group-list');
            if (userData.groups.length === 0) return;
            
            container.innerHTML = userData.groups.map(g => `
                <div class="group-item">
                    <div>
                        <strong style="font-size: 1.1rem;">${g.name}</strong><br>
                        <span style="font-size: 0.8rem; color: var(--text-muted);">Owner: ${g.owner} • ${g.members} Members</span>
                    </div>
                    <button class="btn btn-primary" style="padding: 0.4rem 1rem; font-size: 0.8rem;">Join</button>
                </div>
            `).join('');
        }

        // --- UI NAVIGATION ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(`page-${pageId}`).classList.add('active');
            event.target.classList.add('active');
        }

        function closeModal() {
            document.getElementById('reward-modal').style.display = 'none';
        }
    </script>
</body>
</html>
