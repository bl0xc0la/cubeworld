<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CUBEWORLD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --bg: #222222; --panel: #1a1a1a; --accent: #00f28d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: white; overflow: hidden; }

        /* LOGIN SCREEN */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box h1 { background: var(--panel); padding: 20px 60px; border-radius: 20px; margin-bottom: 20px; font-size: 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .login-box input { width: 100%; padding: 12px; background: var(--panel); border: none; border-radius: 10px; color: #fff; margin-bottom: 10px; text-align: center; }
        .btn-sign { background: linear-gradient(to right, #00f28d, #00e0d1); color: white; width: 100%; padding: 15px; border-radius: 50px; border: none; font-size: 20px; font-weight: 600; cursor: pointer; }

        /* APP LAYOUT */
        .app { display: grid; grid-template-columns: 260px 1fr 300px; height: 100vh; visibility: hidden; }
        .sidebar { background: var(--panel); border-right: 2px solid #2a2a2a; display: flex; flex-direction: column; }
        .avatar-pfp { height: 200px; background: #000; overflow: hidden; position: relative; }
        .avatar-pfp iframe { width: 100%; height: 100%; transform: scale(1.5); pointer-events: none; }
        
        .nav-item { padding: 15px 25px; cursor: pointer; color: #777; font-weight: 600; }
        .nav-item.active { background: #00a8ff; color: white; }
        .admin-btn { color: #ff4757; border: 1px solid #ff4757; margin: 15px; border-radius: 10px; text-align: center; }
        
        main { padding: 30px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1>Log In</h1>
        <input id="u" type="text" placeholder="Username">
        <input id="p" type="password" placeholder="Password">
        <button class="btn-sign" onclick="core.login()">Sign in</button>
    </div>
</div>

<div class="app" id="main-app">
    <aside class="sidebar">
        <div class="avatar-pfp">
            <iframe src="https://my.spline.design/untitled-rTr9O3JjlJGN8gVcG65A69Lz/"></iframe>
        </div>
        <div style="padding: 15px;">
            <b id="user-name">User</b><br>
            <span id="user-cubes" style="color: gold; font-size: 13px;">0 CUBES</span>
        </div>
        <div class="nav-item active" onclick="core.nav('home', this)">DASHBOARD</div>
        <div class="nav-item" onclick="core.nav('avatar', this)">AVATAR SHOP</div>
        <div id="adm-link" class="nav-item admin-btn hidden" onclick="core.nav('admin', this)">ADMIN PANEL</div>
    </aside>

    <main>
        <section id="view-home" class="view active">
            <h2>Welcome, <span id="welcome-name">Cola</span></h2>
            <div style="background: #333; padding: 20px; border-radius: 15px; margin-top: 20px;">
                <p>Status: <b>Online</b> | Region: <b>UK-1</b></p>
                <button style="margin-top: 15px; padding: 10px 20px; background: #00a8ff; border: none; color: white; border-radius: 8px;">JOIN CUBECITY</button>
            </div>
        </section>

        <section id="view-admin" class="view">
            <h2 style="color: #ff4757;">Admin Root</h2>
            <div style="background: #111; padding: 20px; border-radius: 15px; margin-top: 20px;">
                <input id="target" placeholder="Target Username" style="width: 100%; padding: 10px; background: #000; border: none; color: white; margin-bottom: 10px;">
                <button onclick="core.cmd('ban')" style="background: #ff4757; color: white; padding: 10px 20px; border: none; border-radius: 5px;">BAN USER</button>
                <button onclick="core.cmd('op')" style="background: gold; padding: 10px 20px; border: none; border-radius: 5px; margin-left: 10px;">MAKE ADMIN</button>
            </div>
        </section>
    </main>
</div>

<script>
    const socket = io();
    let session = JSON.parse(localStorage.getItem('cw_user'));

    const core = {
        init() {
            if (session) {
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("main-app").style.visibility = "visible";
                document.getElementById("user-name").innerText = session.name;
                document.getElementById("welcome-name").innerText = session.name;
                document.getElementById("user-cubes").innerText = (session.name === "BloxColaYT") ? "∞ CUBES" : session.cubes + " CUBES";
                
                if (session.name === "BloxColaYT" || session.role === "Admin") {
                    document.getElementById("adm-link").classList.remove("hidden");
                }
            }
        },
        login() {
            const username = document.getElementById("u").value;
            const password = document.getElementById("p").value;
            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            }).then(res => res.json()).then(data => {
                if(data.success) {
                    localStorage.setItem('cw_user', JSON.stringify({name: data.user, role: data.role, cubes: data.cubes}));
                    location.reload();
                } else alert(data.message);
            });
        },
        nav(id, el) {
            document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
            document.getElementById("view-" + id).classList.add("active");
            document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
            el.classList.add("active");
        },
        cmd(type) {
            const target = document.getElementById("target").value;
            socket.emit("admin-cmd", { type, target });
            alert(`Command ${type} sent for ${target}`);
        }
    };
    core.init();
</script>
</body>
</html>
