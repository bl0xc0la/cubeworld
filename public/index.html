<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CUBEWORLD | PLATFORM</title>
    <!-- Font Import -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #0f1115;
            --panel: #16191f;
            --accent: #00a2ff;
            --border: #252a33;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --radius: 16px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* AUTH GATE */
        #auth-gate {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--panel); padding: 50px; border-radius: var(--radius);
            box-shadow: var(--shadow); width: 400px; text-align: center; border: 1px solid var(--border);
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px; background: var(--panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 40px 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.2);
        }
        .nav-item {
            padding: 16px 20px; color: var(--text-dim); text-decoration: none; font-size: 14px;
            cursor: pointer; border-radius: 12px; margin-bottom: 8px; font-weight: 600; transition: 0.2s;
        }
        .nav-item:hover { color: white; background: #1f242d; }
        .nav-item.active { color: white; background: var(--accent); box-shadow: 0 4px 15px rgba(0, 162, 255, 0.3); }

        /* MAIN CONTENT */
        .main-container { flex: 1; display: flex; flex-direction: column; }
        .top-bar {
            height: 90px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 50px;
        }
        .view { padding: 50px; display: none; flex: 1; overflow-y: auto; }
        .view.active { display: block; }

        /* COMPONENTS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        .flat-card {
            background: var(--panel); border: 1px solid var(--border); padding: 30px;
            border-radius: var(--radius); box-shadow: var(--shadow); transition: 0.3s ease;
        }
        .flat-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        input {
            width: 100%; background: #0b0d11; border: 1px solid var(--border);
            padding: 14px; color: white; border-radius: 12px; margin-bottom: 12px;
            font-size: 14px; outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn {
            background: var(--accent); border: none; color: white; padding: 16px;
            border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer;
            letter-spacing: 1px; transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 162, 255, 0.2);
        }
        .btn:hover { background: #008be0; transform: scale(1.02); }

        /* CHAT */
        #chat-window {
            position: fixed; bottom: 30px; right: 30px; width: 340px;
            background: var(--panel); border-radius: var(--radius);
            border: 1px solid var(--border); box-shadow: var(--shadow);
            display: none; flex-direction: column; overflow: hidden;
        }
        #chat-msgs { height: 250px; overflow-y: auto; padding: 20px; font-size: 13px; line-height: 1.6; }

        .admin-label { color: #ff4757; font-weight: 800; font-size: 12px; }
        .hidden { display: none; }
        #studio-canvas { width: 100%; height: 500px; border-radius: var(--radius); display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- AUTH GATE -->
    <div id="auth-gate">
        <div class="auth-card">
            <h1 style="margin-top: 0; font-weight: 800; letter-spacing: -1px;">CUBEWORLD</h1>
            <input type="text" id="u" placeholder="USERNAME">
            <input type="password" id="p" placeholder="PASSWORD">
            <button class="btn" onclick="auth('login')">LOGIN</button>
            <p onclick="auth('register')" style="font-size: 12px; color: var(--text-dim); margin-top: 25px; cursor: pointer;">CREATE ACCOUNT</p>
        </div>
    </div>

    <!-- NAVIGATION -->
    <div class="sidebar">
        <h2 style="padding-left: 20px; margin-bottom: 40px; font-weight: 800;">CW_SYSTEM</h2>
        <div class="nav-item active" onclick="setView('home')">DASHBOARD</div>
        <div class="nav-item" onclick="setView('games')">GAMES</div>
        <div class="nav-item" onclick="setView('studio')">STUDIO</div>
        <div class="nav-item" onclick="setView('shop')">SHOP</div>
        <div id="admin-nav" class="nav-item hidden" style="border: 1px solid #ff4757; color: #ff4757;" onclick="setView('admin')">ADMIN ROOT</div>
    </div>

    <div class="main-container">
        <div class="top-bar">
            <div id="user-tag" style="font-weight: 600; font-size: 18px;">GUEST</div>
            <div style="background: rgba(0,162,255,0.1); padding: 8px 20px; border-radius: 50px; color: var(--accent); font-weight: 800;">
                <span id="cube-bal">0</span> CUBES
            </div>
        </div>

        <div id="home" class="view active">
            <h1 style="font-weight: 800;">DASHBOARD</h1>
            <div class="grid">
                <div class="flat-card"><h3>TOTAL USERS</h3><p style="font-size: 24px; font-weight: 800;">2,841</p></div>
                <div class="flat-card"><h3>SERVER STATUS</h3><p style="color: #2ecc71; font-weight: 800;">OPERATIONAL</p></div>
            </div>
        </div>

        <div id="games" class="view">
            <h1 style="font-weight: 800;">DISCOVER</h1>
            <button class="btn" style="width: 250px;" onclick="joinGlobal()">JOIN GLOBAL LOBBY</button>
        </div>

        <div id="studio" class="view">
            <h1 style="font-weight: 800;">STUDIO ENGINE</h1>
            <button class="btn" style="width: 250px;" onclick="initThree()">LAUNCH 3D VIEW</button>
            <canvas id="studio-canvas"></canvas>
        </div>

        <div id="admin" class="view">
            <h1 style="color: #ff4757; font-weight: 800;">ADMINISTRATION</h1>
            <button class="btn" style="background: #ff4757;">RESET CHAT LOGS</button>
        </div>
    </div>

    <!-- CHAT BOX -->
    <div id="chat-window">
        <div id="chat-msgs"></div>
        <input type="text" id="chat-input" placeholder="Type a message..." style="margin: 0; border-radius: 0; border: none; border-top: 1px solid var(--border);">
    </div>

    <script>
        const socket = io();
        let user = "";

        async function auth(mode) {
            const u = document.getElementById("u").value;
            const p = document.getElementById("p").value;
            const res = await fetch(`/api/${mode}`, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            if(data.success) {
                if(mode === 'login') {
                    user = data.user;
                    document.getElementById("auth-gate").style.display = "none";
                    document.getElementById("user-tag").innerText = user.toUpperCase();
                    document.getElementById("cube-bal").innerText = data.cubes;
                    if(data.role === "Admin") document.getElementById("admin-nav").classList.remove("hidden");
                } else { alert("ACCOUNT CREATED"); }
            }
        }

        function setView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        function joinGlobal() {
            document.getElementById("chat-window").style.display = "flex";
            socket.emit("join-session", {user: user});
        }

        document.getElementById("chat-input").addEventListener("keypress", (e) => {
            if(e.key === "Enter") {
                socket.emit("send-chat", {u: user, m: e.target.value});
                e.target.value = "";
            }
        });

        socket.on("new-chat", (data) => {
            const div = document.createElement("div");
            div.innerHTML = `<span style="color:var(--accent); font-weight:800;">${data.u.toUpperCase()}</span>: ${data.m}`;
            document.getElementById("chat-msgs").appendChild(div);
        });

        function initThree() {
            const canvas = document.getElementById("studio-canvas");
            canvas.style.display = "block";
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth/500, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({canvas: canvas, antialias: true, alpha: true});
            renderer.setSize(canvas.clientWidth, 500);

            const box = new THREE.Mesh(new THREE.BoxGeometry(), new THREE.MeshBasicMaterial({color: 0x00a2ff, wireframe: true}));
            scene.add(box);
            camera.position.z = 3;

            function anim() {
                requestAnimationFrame(anim);
                box.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            anim();
        }
    </script>
</body>
</html>
