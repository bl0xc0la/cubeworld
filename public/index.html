<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CubeWorld</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <style>
        :root {
            --bg: #0b0e14; --panel: #12161f; --sidebar: #0f121a;
            --accent: #3b82f6; --text: #ffffff; --border: #1e293b;
        }
        .neon-theme {
            --bg: #030a03; --panel: #051405; --sidebar: #020802;
            --accent: #00ff41; --text: #00ff41; --border: #00ff41;
        }
        .white-theme {
            --bg: #f3f4f6; --panel: #ffffff; --sidebar: #e5e7eb;
            --accent: #2563eb; --text: #111827; --border: #d1d5db;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; padding: 15px; gap: 15px; transition: 0.3s; }

        /* Sidebar */
        #sidebar { width: 260px; background: var(--sidebar); border-radius: 20px; border: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        .avatar { width: 70px; height: 70px; background: var(--accent); border-radius: 50%; margin: 0 auto 15px; border: 3px solid var(--border); }
        .nav-btn { padding: 12px 15px; border-radius: 10px; cursor: pointer; color: #64748b; margin-bottom: 8px; font-weight: 600; transition: 0.2s; }
        .nav-btn:hover, .nav-btn.active { background: var(--panel); color: var(--text); }

        /* Content */
        main { flex: 1; background: var(--panel); border-radius: 20px; border: 1px solid var(--border); padding: 30px; overflow-y: auto; }
        .page { display: none; }
        .page.active-page { display: block; }

        /* Studio Controls */
        .studio-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        #viewport { height: 450px; background: #000; border-radius: 12px; border: 1px solid var(--border); }
        .props { background: var(--sidebar); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #64748b; margin-bottom: 5px; }
        input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; border-radius: 6px; outline: none; }
        
        #luau-editor { width: 100%; height: 120px; background: #050505; color: #00ff00; font-family: monospace; padding: 10px; border-radius: 8px; margin-top: 15px; border: 1px solid var(--border); }

        /* Chat */
        #chat-pane { width: 300px; background: var(--sidebar); border-radius: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        #chat-flow { flex: 1; padding: 20px; overflow-y: auto; font-size: 13px; }
        .chat-bar { padding: 15px; display: flex; gap: 8px; }

        .btn { background: var(--accent); color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
    </style>
</head>
<body id="app-body">

<div id="sidebar">
    <div style="text-align: center; margin-bottom: 30px;">
        <div class="avatar"></div>
        <h3 id="u-display">BloxColaYT</h3>
        <p style="color: #eab308; font-size: 11px; font-weight: 900; margin-top: 4px;">INFINITY CUBES</p>
    </div>
    <div class="nav-btn active" id="nav-games" onclick="nav('games')">Games</div>
    <div class="nav-btn" id="nav-studio" onclick="nav('studio')">Studio Workspace</div>
    <div class="nav-btn" id="nav-admin" onclick="nav('admin')">Admin Panel</div>
    <div class="nav-btn" id="nav-settings" onclick="nav('settings')">Settings & Friends</div>
</div>

<main>
    <div id="page-games" class="page active-page">
        <h1>Discover Games</h1>
        <div id="game-container" style="margin-top: 20px;"></div>
    </div>

    <div id="page-studio" class="page">
        <h2>Studio Engine V3</h2>
        <div class="studio-grid">
            <div id="viewport"></div>
            <div class="props">
                <div class="input-group">
                    <label>Scale X / Y / Z</label>
                    <div style="display:flex; gap:5px">
                        <input id="sx" value="1.5">
                        <input id="sy" value="1.5">
                        <input id="sz" value="1.5">
                    </div>
                </div>
                <div class="input-group">
                    <label>Part Color</label>
                    <input type="color" id="p-col" value="#3b82f6">
                </div>
                <button class="btn" onclick="studio.spawn()">Spawn Part</button>
                <div class="input-group" style="margin-top:20px">
                    <label>Sun Intensity</label>
                    <input type="range" oninput="studio.setSun(this.value/50)">
                </div>
                <button class="btn" style="background:#ef4444" onclick="studio.clear()">Clear Workspace</button>
            </div>
        </div>
        <textarea id="luau-editor" placeholder="-- Enter Luau Script here..."></textarea>
    </div>

    <div id="page-admin" class="page">
        <h1>Admin Panel</h1>
        <div id="admin-gate" style="margin-top: 20px; color: #22c55e;">Access Granted. System online.</div>
    </div>

    <div id="page-settings" class="page">
        <h1>Client Settings</h1>
        <div style="margin-top: 20px; display: grid; gap: 10px;">
            <button class="btn" onclick="setTheme('dark')">Dark Mode</button>
            <button class="btn" style="background:#052e16" onclick="setTheme('neon')">Neon Green</button>
            <button class="btn" style="background:#fff; color:#000" onclick="setTheme('white')">White Mode</button>
        </div>
    </div>
</main>

<div id="chat-pane">
    <div style="padding: 20px; border-bottom: 1px solid var(--border);"><b>Global Chat</b></div>
    <div id="chat-flow"></div>
    <div class="chat-bar">
        <input id="chat-in" class="btn" style="background:#000; text-align:left; font-weight:normal;" placeholder="Type...">
        <button class="btn" style="width:50px" onclick="sendChat()">></button>
    </div>
</div>

<script>
    const socket = io();
    const user = "BloxColaYT";

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        const target = document.getElementById('page-'+id);
        if(target) {
            target.classList.add('active-page');
            document.getElementById('nav-'+id).classList.add('active');
        }
        if(id === 'studio') studio.init();
    }

    function setTheme(t) {
        document.getElementById('app-body').className = t + '-theme';
    }

    const studio = {
        scene: null, cam: null, renderer: null, objects: [],
        init() {
            if(this.renderer) return;
            const container = document.getElementById('viewport');
            this.scene = new THREE.Scene();
            this.cam = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(this.renderer.domElement);
            
            this.scene.add(new THREE.GridHelper(20, 20, 0x334155, 0x1e293b));
            this.sun = new THREE.DirectionalLight(0xffffff, 1);
            this.sun.position.set(5, 10, 7);
            this.scene.add(this.sun, new THREE.AmbientLight(0xffffff, 0.4));
            
            this.cam.position.set(5, 5, 5);
            this.cam.lookAt(0,0,0);

            // GIZMO ARROWS
            this.gizmo = new THREE.TransformControls(this.cam, this.renderer.domElement);
            this.scene.add(this.gizmo);

            this.render();
        },
        spawn() {
            const x = parseFloat(document.getElementById('sx').value) || 1;
            const y = parseFloat(document.getElementById('sy').value) || 1;
            const z = parseFloat(document.getElementById('sz').value) || 1;
            const col = document.getElementById('p-col').value;

            const mesh = new THREE.Mesh(new THREE.BoxGeometry(x, y, z), new THREE.MeshStandardMaterial({ color: col }));
            mesh.position.y = y/2;
            this.scene.add(mesh);
            this.objects.push(mesh);
            this.gizmo.attach(mesh); // Add Arrows
        },
        setSun(v) { if(this.sun) this.sun.intensity = v; },
        clear() { this.objects.forEach(o => this.scene.remove(o)); this.objects = []; this.gizmo.detach(); },
        render() {
            requestAnimationFrame(() => this.render());
            this.renderer.render(this.scene, this.cam);
        }
    };

    function sendChat() {
        const inp = document.getElementById('chat-in');
        if(inp.value.trim()) socket.emit('send-chat', inp.value);
        inp.value = "";
    }

    socket.on('chat-msg', d => {
        const flow = document.getElementById('chat-flow');
        const m = d.sys ? `<div style="color:#64748b; font-style:italic;">${d.text}</div>` : 
                          `<div><b style="color:var(--accent)">${d.user}:</b> ${d.text}</div>`;
        flow.innerHTML += `<div style="margin-bottom:10px">${m}</div>`;
        flow.scrollTop = flow.scrollHeight;
    });

    socket.on('user-data', d => {
        if(!d.isAdmin) document.getElementById('admin-gate').innerText = "Access Denied.";
    });

    socket.emit('join-session', user);
</script>
</body>
</html>
