<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CubeWorld</title>

<style>
:root{
    --bg:#0b0f16;
    --panel:#111827;
    --panel2:#0f172a;
    --accent:#3b82f6;
    --shadow:0 10px 25px rgba(0,0,0,0.4);
    --radius:10px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:var(--bg);
    color:white;
}

/* LOGIN */
#loginScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--bg);
}

.loginBox{
    width:320px;
    padding:20px;
    background:var(--panel);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:none;
    background:var(--panel2);
    color:white;
}

/* APP */
.app{
    display:grid;
    grid-template-columns:220px 1fr;
    height:100vh;
}

.sidebar{
    background:var(--panel);
    padding:12px;
}

button{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:8px;
    background:#1f2937;
    color:white;
    cursor:pointer;
    box-shadow:var(--shadow);
}

button:hover{
    background:#273449;
}

.main{
    padding:15px;
}

.card{
    background:var(--panel);
    padding:12px;
    border-radius:var(--radius);
    margin-bottom:10px;
    box-shadow:var(--shadow);
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
    <div class="loginBox">
        <h2>CubeWorld Login</h2>

        <input id="usernameInput" placeholder="username">
        <input id="passwordInput" type="password" placeholder="password">

        <button onclick="handleLogin()">Login</button>

        <div id="errorText" style="color:red;margin-top:8px;"></div>
    </div>
</div>

<!-- APP -->
<div class="app hidden" id="app">

<div class="sidebar">
    <button onclick="show('home')">Home</button>
    <button onclick="show('games')">Games</button>
    <button onclick="show('studio')">Studio</button>
</div>

<div class="main">

<div id="home">
    <div class="card">
        Welcome <span id="userDisplay"></span>
    </div>
</div>

<div id="games" class="hidden">
    <div class="card">Games Section</div>
</div>

<div id="studio" class="hidden">
    <div class="card">Studio (coming soon)</div>
</div>

</div>
</div>

<script>

let currentUser = "";

/* FIXED LOGIN (no DOM name collisions) */
function handleLogin(){

    const username = document.getElementById("usernameInput").value;
    const password = document.getElementById("passwordInput").value;

    if(!username || !password){
        document.getElementById("errorText").innerText = "Missing fields";
        return;
    }

    currentUser = username;

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("userDisplay").innerText = currentUser;
}

/* NAV */
function show(page){

    document.querySelectorAll(".main > div")
    .forEach(el => el.classList.add("hidden"));

    document.getElementById(page).classList.remove("hidden");
}

</script>

</body>
</html>
