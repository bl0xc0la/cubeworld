<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CubeWorld</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --sidebar: #010409;
            --accent: #007bff; --text: #c9d1d9; --border: #30363d;
            --card: #21262d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        #sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0; }
        .sidebar-header { padding: 0 25px 20px; font-weight: 800; font-size: 22px; color: #fff; letter-spacing: -1px; }
        .nav-link { padding: 12px 25px; cursor: pointer; font-weight: 500; font-size: 14px; border-left: 3px solid transparent; transition: 0.2s; }
        .nav-link.active { background: rgba(0, 123, 255, 0.1); border-left-color: var(--accent); color: #fff; }

        main { flex: 1; padding: 30px; overflow-y: auto; }
        .page { display: none; max-width: 1200px; margin: 0 auto; }
        .page.active { display: block; }

        /* Game Cards */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .game-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .game-thumb { height: 130px; background: #000; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .game-info { padding: 15px; }
        .btn-join { width: 100%; margin-top: 10px; background: var(--accent); color: #fff; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: 600; }

        /* Studio */
        .studio-layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; height: 550px; }
        #viewport { background: #000; border-radius: 12px; border: 1px solid var(--border); position: relative; }
        .inspector { background: var(--panel); border-radius: 12px; padding: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 15px; }
        
        .btn { background: var(--accent); color: #fff; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body id="main-body">

<div id="sidebar">
    <div class="sidebar-header">CubeWorld</div>
    <div class="nav-link active" onclick="nav('games', this)">Games</div>
    <div class="nav-link" onclick="nav('studio', this)">Create</div>
    <div class="nav-link" onclick="nav('settings', this)">Settings</div>
</div>

<main>
    <div id="page-games" class="page active">
        <h1 style="margin-bottom:20px">Discover</h1>
        <div id="game-list" class="game-grid"></div>
    </div>

    <div id="page-studio" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h1>Studio</h1>
            <button class="btn" onclick="publishGame()">Publish to CubeWorld</button>
        </div>
        <div class="studio-layout">
            <div id="viewport"></div>
            <div class="inspector">
                <h3>Part Tools</h3>
                <input type="color" id="p-col" value="#007bff" style="width:100%; height:40px; border:none; background:none; cursor:pointer">
                <button class="btn" onclick="studio.addPart()">Insert Cube</button>
                <button class="btn" style="background:#da3633" onclick="studio.deleteSelected()">Delete Selected</button>
                <hr style="border:0; border-top:1px solid var(--border)">
                <h3>Environment</h3>
                <button class="btn" style="background:#30363d" onclick="studio.clear()">Clear Workspace</button>
            </div>
        </div>
    </div>
</main>

<script>
    const socket = io();
    const user = "BloxColaYT";

    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        el.classList.add('active');
        if(id === 'studio') studio.init();
    }

    const studio = {
        scene: null, cam: null, renderer: null, objects: [],
        init() {
            if(this.renderer) return;
            const container = document.getElementById('viewport');
            this.scene = new THREE.Scene();
            this.cam = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(this.renderer.domElement);
            
            this.scene.add(new THREE.GridHelper(40, 40, 0x30363d, 0x30363d));
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            this.cam.position.set(10, 10, 10);
            this.cam.lookAt(0,0,0);

            this.gizmo = new THREE.TransformControls(this.cam, this.renderer.domElement);
            this.scene.add(this.gizmo);
            this.render();
        },
        addPart(data = null) {
            const color = data ? data.col : document.getElementById('p-col').value;
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 1.5, 1.5),
                new THREE.MeshStandardMaterial({ color: color })
            );
            if(data) {
                mesh.position.set(data.pos.x, data.pos.y, data.pos.z);
            }
            this.scene.add(mesh);
            this.objects.push(mesh);
            this.gizmo.attach(mesh);
            return mesh;
        },
        deleteSelected() {
            if(this.gizmo.object) {
                this.scene.remove(this.gizmo.object);
                this.objects = this.objects.filter(o => o !== this.gizmo.object);
                this.gizmo.detach();
            }
        },
        clear() {
            this.objects.forEach(o => this.scene.remove(o));
            this.objects = [];
            this.gizmo.detach();
        },
        render() {
            requestAnimationFrame(() => this.render());
            this.renderer.render(this.scene, this.cam);
        }
    };

    async function joinGame(id) {
        nav('studio', document.querySelectorAll('.nav-link')[1]);
        const res = await fetch('/api/games/' + id);
        const game = await res.json();
        
        studio.clear();
        game.parts.forEach(p => studio.addPart(p));
        alert(`Joined ${game.name}`);
    }

    function publishGame() {
        const name = prompt("Name your cubeworld game:");
        if(name) {
            socket.emit('publish-game', {
                name: name,
                creator: user,
                parts: studio.objects.map(o => ({ pos: o.position, col: '#' + o.material.color.getHexString() }))
            });
            alert("Game Published!");
        }
    }

    socket.on('sync-games', games => {
        document.getElementById('game-list').innerHTML = games.map(g => `
            <div class="game-card">
                <div class="game-thumb">🧊</div>
                <div class="game-info">
                    <b style="color:#fff">${g.name}</b><br>
                    <small style="color:#8b949e">by ${g.creator}</small>
                    <button class="btn-join" onclick="joinGame('${g._id}')">Join Game</button>
                </div>
            </div>
        `).join('');
    });
</script>
</body>
</html>
