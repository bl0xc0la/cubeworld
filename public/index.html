<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeWorld | All-In-One</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0f1115; --sidebar: #16191f; --panel: #1e222a;
            --accent: #0066ff; --text: #f1f5f9; --dim: #94a3b8;
            --red: #ff4757; --border: #2d333d;
        }
        body.light-theme {
            --bg: #f0f2f5; --sidebar: #ffffff; --panel: #f8f9fa;
            --text: #1c1f26; --dim: #65676b; --border: #dcdfe4;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; font-weight: 400; }

        /* HEADER & GLOBAL NOTIF */
        #global-alert { position: fixed; top: 0; left: 0; right: 0; background: var(--accent); color: white; padding: 10px; text-align: center; font-weight: 600; z-index: 10001; display: none; }
        header { background: var(--sidebar); border-bottom: 1px solid var(--border); height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }

        /* LAYOUT */
        .app-container { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 65px); }
        aside { background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .nav-link { padding: 12px 15px; border-radius: 10px; color: var(--dim); cursor: pointer; transition: 0.2s; font-size: 14px; }
        .nav-link:hover { background: var(--panel); color: white; }
        .nav-link.active { background: var(--accent); color: white; }

        main { padding: 40px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 20px; }

        /* AUTH */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 15px; outline: none; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }

        /* STUDIO */
        #studio-ui { position: fixed; inset: 0; background: #000; z-index: 9000; display: none; flex-direction: column; }
        .studio-header { height: 50px; background: #1c1f26; display: flex; align-items: center; padding: 0 15px; gap: 10px; border-bottom: 1px solid #333; }
        .studio-main { display: grid; grid-template-columns: 240px 1fr 280px; flex: 1; }
        #studio-canvas { background: #0a0b0e; }
        .studio-panel { background: #121418; border: 1px solid #222; padding: 15px; color: #fff; font-size: 13px; }

        .hidden { display: none !important; }
    </style>
</head>
<body class="dark-theme">

    <div id="global-alert">SYSTEM NOTIFICATION</div>

    <div id="auth-overlay">
        <div class="card" style="width: 360px; text-align: center;">
            <h2 style="margin-bottom: 20px;">Cube<span>World</span></h2>
            <input id="login-user" type="text" placeholder="Username">
            <input id="login-pass" type="password" placeholder="Password">
            <button class="btn btn-primary" style="width: 100%;" onclick="core.login()">Login</button>
        </div>
    </div>

    <header>
        <div style="font-weight: 600; font-size: 20px; letter-spacing: -1px;">CUBE<span>WORLD</span></div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <span id="user-tag" style="font-size: 13px; font-weight: 600; opacity: 0.7;">Guest</span>
            <button class="btn" style="background: var(--red); color: white; font-size: 12px;" onclick="core.logout()">Logout</button>
        </div>
    </header>

    <div class="app-container">
        <aside>
            <div class="nav-link active" onclick="core.nav('home', this)">Home</div>
            <div class="nav-link" onclick="core.nav('discover', this)">Discover</div>
            <div class="nav-link" onclick="core.nav('studio-hub', this)">Studio</div>
            <div class="nav-link" onclick="core.nav('social', this)">Social</div>
            <div class="nav-link" onclick="core.nav('settings', this)">Settings</div>
            <div id="admin-btn" class="nav-link hidden" style="color: var(--red);" onclick="core.nav('admin', this)">Admin Root</div>
        </aside>

        <main>
            <section id="view-home" class="view active">
                <div class="card" style="background: var(--accent); color: white;">
                    <h1 id="welcome-msg">Welcome Back</h1>
                    <p>Building the future, one cube at a time.</p>
                </div>
            </section>

            <section id="view-discover" class="view">
                <h2>Discover Worlds</h2>
                <div id="game-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px;">
                    <div class="card" style="text-align:center;">
                        <div style="height:100px; background:var(--accent); border-radius:8px; margin-bottom:10px;"></div>
                        <b>Default World</b>
                    </div>
                </div>
            </section>

            <section id="view-studio-hub" class="view">
                <h2>Studio Workspace</h2>
                <div class="card" style="margin-top:20px;">
                    <button class="btn btn-primary" onclick="core.launchStudio()">Launch 3D Engine</button>
                </div>
            </section>

            <section id="view-social" class="view">
                <h2>Global Chat</h2>
                <div class="card" style="margin-top:20px;">
                    <div id="chat-logs" style="height: 250px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 15px; margin-bottom: 15px;"></div>
                    <div style="display: flex; gap: 10px;">
                        <input id="chat-msg" type="text" placeholder="Type a message..." style="margin:0;">
                        <button class="btn btn-primary" onclick="core.sendChat()">Send</button>
                    </div>
                </div>
            </section>

            <section id="view-settings" class="view">
                <h2>Settings</h2>
                <div class="card" style="margin-top:20px;">
                    <h3>Appearance</h3>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button class="btn" style="background:#222; color:white;" onclick="core.setTheme('dark')">Dark</button>
                        <button class="btn" style="background:#ddd; color:#000;" onclick="core.setTheme('light')">Light</button>
                    </div>
                </div>
            </section>

            <section id="view-admin" class="view">
                <h2 style="color: var(--red);">Root Controller</h2>
                <div class="card" style="margin-top:20px;">
                    <input id="notif-input" type="text" placeholder="Global Alert Message...">
                    <button class="btn btn-primary" onclick="core.adminNotify()">Broadcast</button>
                </div>
                <div class="card">
                    <input id="ban-input" type="text" placeholder="Username to Ban...">
                    <button class="btn" style="background:var(--red); color:white;" onclick="core.adminBan()">Terminate User</button>
                </div>
            </section>
        </main>
    </div>

    <div id="studio-ui">
        <div class="studio-header">
            <button class="btn" style="background:var(--red); color:white;" onclick="core.closeStudio()">Exit</button>
            <button class="btn" onclick="core.addCube()">+ Add Cube</button>
            <div style="margin-left: auto;">
                <button class="btn" onclick="core.studioTool = 'move'">Move</button>
                <button class="btn" onclick="core.studioTool = 'scale'">Scale</button>
            </div>
        </div>
        <div class="studio-main">
            <div class="studio-panel">
                <h4>Explorer</h4>
                <div id="obj-list" style="margin-top:10px;"></div>
            </div>
            <div id="studio-canvas"></div>
            <div class="studio-panel">
                <h4>Properties</h4>
                <div id="obj-props" style="margin-top:10px; opacity:0.6;">Select an object</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let session = JSON.parse(localStorage.getItem('cw_session'));

        const core = {
            studioTool: 'move',

            init() {
                if (session) {
                    document.getElementById("auth-overlay").classList.add("hidden");
                    document.getElementById("user-tag").innerText = session.user;
                    document.getElementById("welcome-msg").innerText = `Welcome, ${session.user}`;
                    if (session.role === "Admin") document.getElementById("admin-btn").classList.remove("hidden");
                    socket.emit("join-main", session.user);
                }
            },

            login() {
                const u = document.getElementById("login-user").value;
                const p = document.getElementById("login-pass").value;
                fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        localStorage.setItem('cw_session', JSON.stringify({user: data.user, role: data.role}));
                        location.reload();
                    }
                });
            },

            logout() {
                localStorage.removeItem('cw_session');
                location.reload();
            },

            nav(id, el) {
                const target = document.getElementById("view-" + id);
                if (!target) return;
                document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
                document.querySelectorAll(".nav-link").forEach(n => n.classList.remove("active"));
                target.classList.add("active");
                if (el) el.classList.add("active");
            },

            setTheme(t) { document.body.className = t + "-theme"; },

            sendChat() {
                const msg = document.getElementById("chat-msg").value;
                if (!msg) return;
                socket.emit("send-global-chat", { u: session.user, m: msg });
                document.getElementById("chat-msg").value = "";
            },

            adminNotify() {
                const m = document.getElementById("notif-input").value;
                socket.emit("admin-broadcast", m);
            },

            adminBan() {
                const t = document.getElementById("ban-input").value;
                socket.emit("admin-ban-user", t);
            },

            // 3D LOGIC
            launchStudio() {
                document.getElementById("studio-ui").style.display = "flex";
                this.init3D();
            },

            init3D() {
                const container = document.getElementById("studio-canvas");
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(container.clientWidth, container.clientHeight);
                container.appendChild(this.renderer.domElement);

                this.scene.add(new THREE.GridHelper(100, 100, 0x0066ff, 0x222222));
                this.camera.position.set(5, 5, 5);
                this.camera.lookAt(0,0,0);
                this.animate();
            },

            addCube() {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color: 0x0066ff}));
                mesh.position.y = 0.5;
                this.scene.add(mesh);
                const id = "Part_" + Math.floor(Math.random()*100);
                const el = document.createElement("div");
                el.innerText = id;
                el.style.padding = "5px"; el.style.cursor = "pointer";
                el.onclick = () => {
                    document.getElementById("obj-props").innerHTML = `<b>Name:</b> ${id}<br><b>Pos Y:</b> ${mesh.position.y}`;
                };
                document.getElementById("obj-list").appendChild(el);
            },

            animate() {
                if(!this.renderer) return;
                requestAnimationFrame(() => this.animate());
                this.renderer.render(this.scene, this.camera);
            },

            closeStudio() { location.reload(); }
        };

        // Listeners
        socket.on("receive-chat", d => {
            const log = document.getElementById("chat-logs");
            log.innerHTML += `<div><b>${d.u}:</b> ${d.m}</div>`;
            log.scrollTop = log.scrollHeight;
        });

        socket.on("global-notif", m => {
            const el = document.getElementById("global-alert");
            el.innerText = m; el.style.display = "block";
            setTimeout(() => el.style.display = "none", 5000);
        });

        socket.on("kick-user", target => {
            if (session && session.user === target) core.logout();
        });

        core.init();
    </script>
</body>
</html>
