<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cubeworld</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.rawgit.com/mrdoob/three.js/master/examples/js/controls/TransformControls.js"></script>
    <style>
        :root {
            --bg: #0a0a0c; --panel: #121217; --accent: #3b82f6; 
            --text: #a1a1aa; --text-bright: #ffffff;
            --border: #27272a; --ui-corner: 12px; /* UI Corner Variable */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* Modern UI Buttons & Corners */
        .btn { 
            background: var(--accent); color: #fff; border: none; 
            padding: 12px 20px; border-radius: var(--ui-corner); 
            font-weight: 700; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .card { 
            background: var(--panel); border: 1px solid var(--border); 
            border-radius: var(--ui-corner); padding: 20px; 
        }

        /* Profile Section */
        .profile-pic {
            width: 45px; height: 45px; border-radius: 50%;
            background: linear-gradient(45deg, var(--accent), #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; border: 2px solid var(--border);
        }

        #sidebar { width: 280px; background: #000; border-right: 1px solid var(--border); display: none; flex-direction: column; padding: 20px; }
        .nav-link { padding: 15px; cursor: pointer; border-radius: var(--ui-corner); margin-bottom: 5px; transition: 0.2s; }
        .nav-link.active { background: var(--panel); color: var(--text-bright); border: 1px solid var(--border); }

        main { flex: 1; padding: 40px; overflow-y: auto; display: none; }
        .page { display: none; animation: slideUp 0.4s ease; }
        .active-page { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #viewport-container { 
            width: 100%; height: 600px; border-radius: var(--ui-corner); 
            border: 1px solid var(--border); background: #000; position: relative; 
        }
        #viewport { width: 100%; height: 100%; }

        #chat-sidebar { width: 320px; background: #000; border-left: 1px solid var(--border); display: none; flex-direction: column; }
    </style>
</head>
<body>

<div id="auth-overlay" style="position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="width:350px; text-align:center;">
        <h1 style="color:white; margin-bottom:20px;">cubeworld</h1>
        <input id="auth-user" type="text" placeholder="Username" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid var(--border); background:#000; color:white;">
        <button class="btn" style="width:100%" onclick="handleAuth()">Join Engine</button>
    </div>
</div>

<div id="sidebar">
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:30px; padding:10px;">
        <div class="profile-pic" id="user-avatar">?</div>
        <div>
            <div style="color:white; font-weight:bold; font-size:14px;" id="user-name">Guest</div>
            <div style="font-size:12px; color:var(--accent);" id="user-bucks">0 CB</div>
        </div>
    </div>
    <div class="nav-link active" onclick="nav('games')">Discover</div>
    <div class="nav-link" onclick="nav('studio')">Studio Builder</div>
    <div class="nav-link" onclick="nav('shop')">Avatar Shop</div>
    <div class="nav-link" style="margin-top:auto; color:#ef4444" onclick="location.reload()">Logout</div>
</div>

<main id="app-main">
    <div id="page-games" class="page active-page">
        <h1 style="color:white; margin-bottom:30px;">Featured Experiences</h1>
        <div id="game-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap:20px;"></div>
    </div>

    <div id="page-studio" class="page">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h1 style="color:white;">Workspace</h1>
            <button class="btn" onclick="publishGame()">Publish to World</button>
        </div>
        <div id="viewport-container">
            <div id="viewport"></div>
            <div style="position:absolute; top:20px; right:20px; display:flex; gap:10px;">
                <button class="btn" style="background:#27272a" onclick="studio.addPart()">+ Add Part</button>
                <button class="btn" style="background:#ef4444" onclick="studio.clear()">Reset</button>
            </div>
        </div>
    </div>
</main>

<script>
    const socket = io();
    let user = null;
    let allGames = [];

    // --- AUTH & PROFILE ---
    async function handleAuth() {
        const username = document.getElementById('auth-user').value;
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, password: 'password123' })
        });
        const data = await res.json();
        loginSuccess(data);
    }

    function loginSuccess(data) {
        user = data;
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('sidebar').style.display = 'flex';
        document.getElementById('app-main').style.display = 'block';
        document.getElementById('user-name').innerText = data.username;
        document.getElementById('user-avatar').innerText = data.username[0].toUpperCase();
        document.getElementById('user-bucks').innerText = (data.cubebucks || 0) + " CB";
        socket.emit('join-session', data.username);
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById('page-' + id).classList.add('active-page');
        if(id === 'studio') studio.init();
    }

    // --- 3D STUDIO WITH GIZMOS ---
    const studio = {
        scene: null, cam: null, renderer: null, control: null, objects: [],
        init() {
            if(this.renderer) return;
            const container = document.getElementById('viewport');
            this.scene = new THREE.Scene();
            this.scene.background = new THREE.Color(0x0a0a0c);
            
            this.cam = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(this.renderer.domElement);

            // X, Y, Z Gizmos (TransformControls)
            this.control = new THREE.TransformControls(this.cam, this.renderer.domElement);
            this.scene.add(this.control);

            this.scene.add(new THREE.GridHelper(50, 50, 0x27272a, 0x27272a));
            this.cam.position.set(10, 10, 10);
            this.cam.lookAt(0,0,0);

            // Click to select part
            window.addEventListener('mousedown', (e) => {
                const mouse = new THREE.Vector2(
                    (e.clientX - container.offsetLeft) / container.clientWidth * 2 - 1,
                    -((e.clientY - container.offsetTop) / container.clientHeight) * 2 + 1
                );
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, this.cam);
                const intersects = raycaster.intersectObjects(this.objects);
                if(intersects.length > 0) {
                    this.control.attach(intersects[0].object);
                }
            });

            this.render();
        },
        addPart() {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshStandardMaterial({color: 0x3b82f6}));
            mesh.position.y = 1;
            this.scene.add(mesh);
            this.objects.push(mesh);
            this.control.attach(mesh); // Auto-attach arrows to new part
        },
        clear() { this.objects.forEach(o => this.scene.remove(o)); this.objects = []; this.control.detach(); },
        render() { requestAnimationFrame(() => this.render()); this.renderer.render(this.scene, this.cam); }
    };

    // --- PUBLISH LOGIC ---
    function publishGame() {
        const name = prompt("Name your game:");
        if(!name) return;
        const gameData = {
            name, creator: user.username,
            parts: studio.objects.map(o => ({ pos: o.position }))
        };
        socket.emit('publish-game', gameData);
        alert("Published! Check the Discover tab.");
    }

    socket.on('sync-games', (games) => {
        const list = document.getElementById('game-list');
        list.innerHTML = games.map(g => `
            <div class="card">
                <div style="height:120px; background:#000; border-radius:8px; margin-bottom:15px; display:flex; align-items:center; justify-content:center; color:var(--accent); font-weight:bold;">CUBE WORLD</div>
                <b style="color:white; font-size:18px;">${g.name}</b>
                <p style="font-size:12px; margin-top:5px;">by ${g.creator}</p>
                <button class="btn" style="width:100%; margin-top:15px;" onclick="nav('studio')">Play Now</button>
            </div>
        `).join('');
    });
</script>
</body>
</html>
