<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CubeWorld v3</title>
<script src="/socket.io/socket.io.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0b0f16;
    color:white;
}

.app{
    display:grid;
    grid-template-columns:200px 1fr;
    height:100vh;
}

.sidebar{
    background:#111827;
    padding:10px;
}

button{
    width:100%;
    margin:5px 0;
    padding:10px;
    border:none;
    background:#1f2937;
    color:white;
    border-radius:6px;
}

button:hover{
    background:#2b3a55;
}

.main{
    padding:15px;
}

.card{
    background:#111827;
    padding:12px;
    border-radius:8px;
    margin-bottom:10px;
}

.hidden{display:none}

/* LOGIN */
#login{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b0f16;
}

.box{
    width:300px;
    padding:20px;
    background:#111827;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    background:#0f172a;
    color:white;
}

</style>
</head>

<body>

<div id="login">
    <div class="box">
        <h3>CubeWorld Login</h3>
        <input id="u" placeholder="username">
        <input id="p" type="password" placeholder="password">
        <input id="e" placeholder="email">
        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
        <input id="code" placeholder="email code">
        <button onclick="verify()">Verify Email</button>
    </div>
</div>

<div class="app hidden" id="app">

<div class="sidebar">
    <button onclick="show('home')">Home</button>
    <button onclick="show('studio')">Studio</button>
</div>

<div class="main">

<div id="home">
    <div class="card">
        Welcome <span id="user"></span>
    </div>

    <div class="card">
        Join Studio Room
        <input id="room">
        <button onclick="joinRoom()">Join</button>
    </div>
</div>

<div id="studio" class="hidden">
    <div class="card">
        CubeWorld Studio
        <button onclick="sendUpdate()">Add Block</button>
    </div>
</div>

</div>
</div>

<script>

const socket = io();
let user = "";
let room = "";

/* REGISTER */
async function register(){

    await fetch("/api/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:u.value,
            password:p.value,
            email:e.value
        })
    });
}

/* VERIFY */
async function verify(){

    await fetch("/api/verify",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email:e.value,
            code:code.value
        })
    });
}

/* LOGIN */
async function login(){

    const res = await fetch("/api/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:u.value,
            password:p.value
        })
    });

    const data = await res.json();

    if(data.success){

        user = data.user;

        login.style.display="none";
        app.classList.remove("hidden");

        document.getElementById("user").innerText = user;
    }
}

/* STUDIO */
function joinRoom(){
    room = document.getElementById("room").value;
    socket.emit("join", room);
    show('studio');
}

function sendUpdate(){
    socket.emit("studioUpdate",{room,user,action:"block"});
}

/* NAV */
function show(id){
    document.querySelectorAll(".main > div")
    .forEach(d=>d.classList.add("hidden"));

    document.getElementById(id).classList.remove("hidden");
}

</script>

</body>
</html>
