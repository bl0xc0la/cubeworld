<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CUBEWORLD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg: #0a0b0e; --panel: #14171c; --accent: #00a2ff;
            --border: #22272e; --text: #ffffff; --text-dim: #8b949e;
            --radius: 16px; --shadow: 0 12px 40px rgba(0,0,0,0.6);
        }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 20px; }
        .nav-item { padding: 16px; color: var(--text-dim); cursor: pointer; border-radius: 12px; margin-bottom: 8px; font-weight: 600; transition: 0.2s; }
        .nav-item:hover { color: white; background: #1c2128; }
        .nav-item.active { color: white; background: var(--accent); box-shadow: 0 4px 20px rgba(0, 162, 255, 0.3); }

        /* CONTENT */
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { height: 90px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 50px; }
        .view { padding: 50px; display: none; flex: 1; overflow-y: auto; }
        .view.active { display: block; }

        /* CARDS & UI */
        .flat-card { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: var(--radius); box-shadow: var(--shadow); }
        .btn { background: var(--accent); border: none; color: white; padding: 16px 24px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn:hover { transform: scale(1.02); background: #008be0; }
        
        input { background: #0d1117; border: 1px solid var(--border); padding: 14px; color: white; border-radius: 12px; width: 100%; margin-bottom: 15px; outline: none; }

        /* SOCIAL/DM SYSTEM */
        #dm-window { position: fixed; bottom: 30px; right: 30px; width: 350px; background: var(--panel); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); display: none; flex-direction: column; }
        #dm-messages { height: 300px; overflow-y: auto; padding: 20px; font-size: 13px; border-bottom: 1px solid var(--border); }

        .hidden { display: none; }
        #auth-gate { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <div class="flat-card" style="width: 380px; text-align: center;">
            <h1 style="margin: 0 0 30px 0; font-weight: 800;">CUBEWORLD</h1>
            <input type="text" id="u" placeholder="USERNAME">
            <input type="password" id="p" placeholder="PASSWORD">
            <button class="btn" style="width: 100%;" onclick="auth('login')">LOGIN</button>
            <p onclick="auth('register')" style="color: var(--text-dim); font-size: 12px; margin-top: 20px; cursor: pointer;">CREATE ACCOUNT</p>
        </div>
    </div>

    <div class="sidebar">
        <h2 style="margin: 0 0 40px 15px; font-weight: 800; color: var(--accent);">CW_SYSTEM</h2>
        <div class="nav-item active" onclick="tab('home')">DASHBOARD</div>
        <div class="nav-item" onclick="tab('social')">SOCIAL</div>
        <div class="nav-item" onclick="tab('studio')">STUDIO</div>
        <div id="adm-nav" class="nav-item hidden" style="color: #ff4757; border: 1px solid #ff4757;" onclick="tab('admin')">ADMIN ROOT</div>
    </div>

    <div class="main">
        <div class="header">
            <div id="user-tag" style="font-weight: 600;">GUEST</div>
            <div style="background: rgba(0,162,255,0.1); color: var(--accent); padding: 10px 20px; border-radius: 50px; font-weight: 800;">
                <span id="cube-bal">0</span> CUBES
            </div>
        </div>

        <div id="home" class="view active">
            <h1 style="font-weight: 800;">DASHBOARD</h1>
            <div class="flat-card">
                <h3>NEWS</h3>
                <p style="color: var(--text-dim);">SYSTEM V5 IS NOW LIVE. SOCIAL FEATURES ENABLED.</p>
            </div>
        </div>

        <div id="social" class="view">
            <h1 style="font-weight: 800;">SOCIAL</h1>
            <input type="text" id="friend-search" placeholder="Enter username to message..." style="width: 300px;">
            <button class="btn" onclick="openDM()">START PRIVATE CHAT</button>
        </div>

        <div id="studio" class="view">
            <h1 style="font-weight: 800;">STUDIO</h1>
            <button class="btn" onclick="launch3D()">INITIALIZE RENDERER</button>
            <canvas id="studio-canvas" style="width: 100%; height: 500px; margin-top: 20px; border-radius: 16px; display: none;"></canvas>
        </div>

        <div id="admin" class="view">
            <h1 style="color: #ff4757; font-weight: 800;">ADMIN_ROOT</h1>
            <p>ACCESS GRANTED: BloxColaYT</p>
        </div>
    </div>

    <!-- DM OVERLAY -->
    <div id="dm-window">
        <div style="padding: 15px; background: #1c2128; font-weight: 800; display: flex; justify-content: space-between;">
            <span id="dm-target">CHAT</span>
            <span onclick="this.parentElement.parentElement.style.display='none'" style="cursor: pointer;">X</span>
        </div>
        <div id="dm-messages"></div>
        <input type="text" id="dm-input" placeholder="Message..." style="margin: 0; border: none; border-radius: 0;">
    </div>

    <script>
        const socket = io();
        let user = "";

        async function auth(mode) {
            const u = document.getElementById("u").value;
            const p = document.getElementById("p").value;
            const res = await fetch(`/api/${mode}`, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            if(data.success) {
                if(mode === 'login') {
                    user = data.user;
                    document.getElementById("auth-gate").style.display = "none";
                    document.getElementById("user-tag").innerText = user.toUpperCase();
                    document.getElementById("cube-bal").innerText = data.cubes;
                    if(data.role === "Admin") document.getElementById("adm-nav").classList.remove("hidden");
                    socket.emit("register-online", user);
                } else { alert("ACCOUNT CREATED"); }
            }
        }

        function tab(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- DM LOGIC ---
        function openDM() {
            const target = document.getElementById("friend-search").value;
            if(!target) return;
            document.getElementById("dm-window").style.display = "flex";
            document.getElementById("dm-target").innerText = target.toUpperCase();
        }

        document.getElementById("dm-input").addEventListener("keypress", (e) => {
            if(e.key === "Enter") {
                const target = document.getElementById("dm-target").innerText.toLowerCase();
                const text = e.target.value;
                socket.emit("send-dm", { from: user, to: target, text: text });
                
                const div = document.createElement("div");
                div.style.textAlign = "right";
                div.innerHTML = `<span style="color:var(--accent)">ME:</span> ${text}`;
                document.getElementById("dm-messages").appendChild(div);
                e.target.value = "";
            }
        });

        socket.on("receive-dm", (data) => {
            document.getElementById("dm-window").style.display = "flex";
            document.getElementById("dm-target").innerText = data.from.toUpperCase();
            const div = document.createElement("div");
            div.innerHTML = `<span style="color:#ff4757">${data.from.toUpperCase()}:</span> ${data.text}`;
            document.getElementById("dm-messages").appendChild(div);
        });

        function launch3D() {
            const canvas = document.getElementById("studio-canvas");
            canvas.style.display = "block";
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth/500, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({canvas, antialias: true, alpha: true});
            renderer.setSize(canvas.clientWidth, 500);
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(), new THREE.MeshBasicMaterial({color: 0x00a2ff, wireframe: true}));
            scene.add(mesh);
            camera.position.z = 2;
            function anim() { requestAnimationFrame(anim); mesh.rotation.y += 0.01; renderer.render(scene, camera); }
            anim();
        }
    </script>
</body>
</html>
