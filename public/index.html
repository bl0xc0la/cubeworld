<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CubeWorld - Play, Create & Connect</title>
  
  <!-- External Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-dark: #0d0f12;
      --panel-bg: rgba(22, 26, 33, 0.85);
      --panel-border: rgba(255, 255, 255, 0.08);
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --radius-lg: 16px;
      --radius-md: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      user-select: none;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* --- Header / Navigation --- */
    header {
      height: 64px;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.25rem;
      letter-spacing: -0.5px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-color);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    nav {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-btn:hover, .nav-btn.active {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.04);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--panel-border);
      cursor: pointer;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
    }

    /* --- Main Layout --- */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      gap: 16px;
      padding: 16px;
      height: calc(100vh - 64px);
    }

    .panel {
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 16px;
      font-size: 0.95rem;
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* --- 3D Viewport / Studio --- */
    #viewport-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #050608;
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    #cubeworld-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .viewport-overlay {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      padding: 8px 14px;
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      border: 1px solid var(--panel-border);
    }

    /* --- Chat System --- */
    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 0.9rem;
    }

    .chat-msg {
      background: rgba(255, 255, 255, 0.03);
      padding: 8px 12px;
      border-radius: var(--radius-md);
      line-height: 1.4;
    }

    .chat-msg .username {
      color: var(--accent-color);
      margin-right: 6px;
    }

    .chat-input-area {
      padding: 12px;
      border-top: 1px solid var(--panel-border);
      display: flex;
      gap: 8px;
    }

    input[type="text"], input[type="password"] {
      flex: 1;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      color: var(--text-main);
      outline: none;
    }

    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--accent-color);
    }

    .action-btn {
      background: var(--accent-color);
      color: #fff;
      border: none;
      padding: 0 16px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .action-btn:hover {
      background: var(--accent-hover);
    }

    /* --- Login Modal --- */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-card {
      width: 360px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-header {
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: center;
    }

    .login-header h2 {
      font-size: 1.5rem;
    }

    .login-header p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .login-btn {
      height: 42px;
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- Login Modal -->
  <div class="modal-overlay" id="login-modal">
    <div class="login-card">
      <div class="login-header">
        <h2>CubeWorld</h2>
        <p>Sign in to your account</p>
      </div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group" style="margin-bottom: 12px;">
          <label for="login-user">Username</label>
          <input type="text" id="login-user" placeholder="Enter username" required />
        </div>

        <div class="form-group" style="margin-bottom: 16px;">
          <label for="login-pass">Password</label>
          <input type="password" id="login-pass" placeholder="Enter password" required />
        </div>

        <button type="submit" class="action-btn login-btn">Sign In</button>
      </form>
    </div>
  </div>

  <!-- Header Section -->
  <header>
    <div class="brand">
      <div class="brand-icon">📦</div>
      <span>CubeWorld</span>
    </div>

    <nav>
      <button class="nav-btn active">Games</button>
      <button class="nav-btn">Studio</button>
      <button class="nav-btn">Avatar Shop</button>
      <button class="nav-btn">Community</button>
    </nav>

    <div class="user-profile" onclick="openLogin()">
      <div class="status-dot"></div>
      <span id="player-username">Sign In</span>
    </div>
  </header>

  <!-- Main Viewport and Panels -->
  <main>
    <!-- Left Panel: Sidebar / Navigation -->
    <section class="panel">
      <div class="panel-header">
        <span>CubeWorld Studio</span>
      </div>
      <div style="padding: 16px; display: flex; flex-direction: column; gap: 10px;">
        <button class="action-btn" style="width: 100%; height: 40px;">Create New World</button>
        <button class="nav-btn" style="width: 100%; text-align: left;">My Inventories</button>
        <button class="nav-btn" style="width: 100%; text-align: left;">Friend Requests</button>
        <button class="nav-btn" style="width: 100%; text-align: left;">Settings</button>
      </div>
    </section>

    <!-- Center Panel: 3D Render Engine Viewport -->
    <section id="viewport-container">
      <div class="viewport-overlay">
        <span>CubeWorld Engine v1.0 | Active Session</span>
      </div>
      <canvas id="cubeworld-canvas"></canvas>
    </section>

    <!-- Right Panel: Global Chat & Social -->
    <section class="panel">
      <div class="panel-header">
        <span>Global Chat</span>
        <span style="font-size: 0.8rem; color: var(--text-muted);" id="online-count">1 Online</span>
      </div>

      <div class="chat-messages" id="chat-box">
        <div class="chat-msg">
          <span class="username">System:</span> Welcome to CubeWorld! Build, explore, and hang out.
        </div>
      </div>

      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Type a message..." />
        <button class="action-btn" onclick="sendMessage()">Send</button>
      </div>
    </section>
  </main>

  <!-- Engine & Socket Logic Script -->
  <script>
    // --- Login Logic ---
    function handleLogin(event) {
      event.preventDefault();
      const usernameInput = document.getElementById('login-user').value.trim();
      if (usernameInput) {
        document.getElementById('player-username').innerText = usernameInput;
        document.getElementById('login-modal').style.display = 'none';
      }
    }

    function openLogin() {
      document.getElementById('login-modal').style.display = 'flex';
    }

    // --- CubeWorld Socket & Global Init ---
    const socket = typeof io !== 'undefined' ? io() : null;

    // --- Three.js Viewport Setup ---
    const container = document.getElementById('viewport-container');
    const canvas = document.getElementById('cubeworld-canvas');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0c10);

    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(3, 4, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);

    // --- Lighting ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0x6366f1, 1);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // --- CubeWorld Demo Object ---
    const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
    const material = new THREE.MeshStandardMaterial({ 
      color: 0x6366f1, 
      roughness: 0.3,
      metalness: 0.2 
    });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    // Grid Floor
    const gridHelper = new THREE.GridHelper(20, 20, 0x6366f1, 0x222630);
    gridHelper.position.y = -1;
    scene.add(gridHelper);

    // Render Loop
    function animate() {
      requestAnimationFrame(animate);
      cube.rotation.x += 0.005;
      cube.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    animate();

    // Window Resize Handling
    window.addEventListener('resize', () => {
      const width = container.clientWidth;
      const height = container.clientHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    });

    // --- Chat System Logic ---
    function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      const chatBox = document.getElementById('chat-box');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'chat-msg';
      const currentUser = document.getElementById('player-username').innerText;
      const sender = currentUser === 'Sign In' ? 'You' : currentUser;
      
      msgDiv.innerHTML = `<span class="username">${escapeHtml(sender)}:</span> ${escapeHtml(text)}`;
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      if (socket) {
        socket.emit('chatMessage', text);
      }

      input.value = '';
    }

    document.getElementById('chat-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
  </script>
</body>
</html>
