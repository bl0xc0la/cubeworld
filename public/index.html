<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeWorld | Dashboard</title>
    <style>
        /* Modern Roblox/Polytoria inspired Theme */
        :root {
            --bg-dark: #0a0b0d;
            --card-bg: #1a1c20;
            --main-blue: #00a2ff;
            --btn-hover: #0077ff;
            --text-dim: #adb5bd;
            --error-red: #ff4d4d;
            --success-green: #4dff88;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #161b22 0%, #0a0b0d 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* The Dashboard Card */
        .auth-card {
            background: var(--card-bg);
            width: 360px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 162, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 30px;
            background: linear-gradient(to bottom right, #ffffff, var(--main-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -1.5px;
        }

        /* Inputs with Rounded Corners and Shadows */
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        input {
            width: 100%;
            background: #0f1012;
            border: 2px solid #2d3036;
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--main-blue);
            box-shadow: 0 0 10px rgba(0, 162, 255, 0.2);
        }

        /* Polytoria style Gradient Buttons */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--main-blue), #0055ff);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 162, 255, 0.3);
            margin-top: 10px;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 162, 255, 0.5);
            background: linear-gradient(135deg, #2bb2ff, var(--btn-hover));
        }

        .btn-secondary {
            background: transparent;
            border: none;
            color: var(--text-dim);
            margin-top: 25px;
            cursor: pointer;
            font-size: 14px;
            display: block;
            width: 100%;
            transition: color 0.2s;
        }

        .btn-secondary:hover {
            color: white;
            text-decoration: underline;
        }

        /* Status Messages */
        #status {
            margin-top: 20px;
            font-size: 14px;
            min-height: 20px;
            font-weight: 500;
        }

        .hidden { display: none; }

        /* Welcome Screen Extras */
        #user-display {
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 162, 255, 0.5);
        }
    </style>
</head>
<body>

    <!-- Auth UI -->
    <div id="login-screen" class="auth-card">
        <h1>CubeWorld</h1>
        
        <div class="input-group">
            <input type="text" id="u" placeholder="Username" autocomplete="off">
        </div>
        
        <div class="input-group">
            <input type="password" id="p" placeholder="Password">
        </div>

        <button class="btn-primary" onclick="handleAuth('login')">Login</button>
        <button class="btn-secondary" onclick="handleAuth('register')">Don't have an account? Sign Up</button>
        
        <div id="status"></div>
    </div>

    <!-- Success / Game UI -->
    <div id="app-screen" class="auth-card hidden">
        <h1>Success!</h1>
        <p style="color: var(--text-dim); margin-bottom: 30px;">
            Authenticated as <span id="user-display" style="color: var(--main-blue);"></span>
        </p>
        
        <button class="btn-primary" onclick="alert('Entering Studio...')">Launch Studio</button>
        <button class="btn-secondary" onclick="location.reload()">Logout</button>
    </div>

    <script>
        async function handleAuth(type) {
            const u = document.getElementById("u").value;
            const p = document.getElementById("p").value;
            const status = document.getElementById("status");

            // Reset status
            status.style.color = "var(--error-red)";
            status.innerText = "";

            if (!u || !p) {
                status.innerText = "Please fill in all fields.";
                return;
            }

            try {
                status.style.color = "white";
                status.innerText = type === 'login' ? "Logging in..." : "Creating account...";

                const response = await fetch(`/api/${type}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: u, password: p })
                });

                const data = await response.json();

                if (data.success) {
                    if (type === 'register') {
                        status.style.color = "var(--success-green)";
                        status.innerText = "Account created! You can now login.";
                    } else {
                        // Login successful
                        document.getElementById("login-screen").classList.add("hidden");
                        document.getElementById("app-screen").classList.remove("hidden");
                        document.getElementById("user-display").innerText = data.user;
                    }
                } else {
                    status.style.color = "var(--error-red)";
                    status.innerText = data.msg || "Authentication failed.";
                }
            } catch (err) {
                status.style.color = "var(--error-red)";
                status.innerText = "Error: Could not connect to server.";
            }
        }
    </script>
</body>
</html>
