<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CubeWorld</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { 
            --accent: #0070ff; --bg: #0e1117; --panel: #161b22; 
            --border: #30363d; --text: #c9d1d9; --success: #238636;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* NAVIGATION */
        nav { 
            height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 1000;
        }
        .nav-links { display: flex; gap: 20px; margin-left: 40px; flex: 1; }
        .nav-item { cursor: pointer; font-weight: 600; font-size: 14px; color: #8b949e; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { color: #fff; }
        .logo { font-weight: 800; color: #fff; font-size: 22px; cursor: pointer; }
        .logo span { color: var(--accent); }

        /* HERO & DASHBOARD */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        
        .card { 
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px; 
            overflow: hidden; transition: 0.3s; cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card-img { width: 100%; height: 150px; background: #000; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .card-info { padding: 15px; }

        /* STUDIO MODE (Full Screen) */
        #studio-layout { display: none; height: calc(100vh - 60px); }
        .studio-sidebar { width: 280px; background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; }
        #viewport { flex: 1; background: #000; }

        /* UTILS */
        .btn { 
            background: var(--accent); color: white; border: none; padding: 8px 16px; 
            border-radius: 6px; font-weight: 600; cursor: pointer;
        }
        .user-stat { font-size: 13px; margin-left: 15px; display: flex; align-items: center; gap: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="page.load('home')">CUBE<span>WORLD</span></div>
    <div class="nav-links">
        <div class="nav-item active" onclick="page.load('home')">Home</div>
        <div class="nav-item" onclick="page.load('games')">Games</div>
        <div class="nav-item" onclick="page.load('studio')">Create</div>
        <div class="nav-item" onclick="page.load('social')">Friends</div>
    </div>
    <div class="user-stat">
        <b style="color:#f1c40f">⬢</b> <span id="cube-count">500</span>
    </div>
</nav>

<div id="page-home" class="container content-page">
    <h1 style="margin-bottom: 10px;">Welcome back, Cola!</h1>
    <p style="color: #8b949e; margin-bottom: 30px;">Continue working on your latest projects.</p>
    
    <div class="grid">
        <div class="card" onclick="page.load('studio')">
            <div class="card-img">🛠️</div>
            <div class="card-info">
                <h3>Open Studio</h3>
                <p style="font-size: 12px; color: #8b949e;">Build new worlds</p>
            </div>
        </div>
    </div>
</div>

<div id="page-games" class="container content-page hidden">
    <h1 style="margin-bottom: 20px;">Discover</h1>
    <div class="grid" id="game-display-list">
        </div>
</div>

<div id="page-social" class="container content-page hidden">
    <h1>Social Hub</h1>
    <div style="background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-top: 20px;">
        <h3>Online Friends</h3>
        <p style="color: #8b949e; margin-top: 10px;">You currently have no friends online.</p>
    </div>
</div>

<div id="studio-layout">
    <aside class="studio-sidebar">
        <div style="padding: 15px; border-bottom: 1px solid var(--border);">
            <h3 style="font-size: 14px;">Toolbox</h3>
        </div>
        <div style="padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" onclick="studio.addPart('Box')">Part</button>
            <button class="btn" style="background:#21262d" onclick="studio.addPart('Sphere')">Sphere</button>
        </div>
        <div style="padding: 15px; border-top: 1px solid var(--border);">
            <h3 style="font-size: 14px;">Properties</h3>
            <div id="prop-editor" style="margin-top: 10px; font-size: 13px;">
                Color: <input type="color" onchange="studio.updateColor(this.value)" style="background:none; border:none; width:100%;">
            </div>
        </div>
        <button class="btn" style="margin: 20px; background: var(--success);" onclick="studio.publish()">Publish Game</button>
    </aside>
    <main id="viewport"></main>
</div>

<script>
    const socket = io();
    
    // --- PAGE ROUTER ---
    const page = {
        load(target) {
            // Reset visibility
            document.querySelectorAll('.content-page').forEach(p => p.classList.add('hidden'));
            document.getElementById('studio-layout').style.display = 'none';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

            if (target === 'studio') {
                document.getElementById('studio-layout').style.display = 'flex';
                studio.init();
            } else {
                document.getElementById('page-' + target).classList.remove('hidden');
            }
        }
    };

    // --- STUDIO LOGIC ---
    const studio = {
        scene: null, renderer: null, camera: null, parts: [],
        init() {
            if(this.scene) return;
            const container = document.getElementById('viewport');
            this.scene = new THREE.Scene();
            this.camera = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(this.renderer.domElement);
            
            this.scene.add(new THREE.GridHelper(40, 40, 0x30363d, 0x21262d));
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            this.camera.position.set(5, 5, 5);
            this.camera.lookAt(0,0,0);
            this.animate();
        },
        addPart(type) {
            const geo = type === 'Box' ? new THREE.BoxGeometry(1,1,1) : new THREE.SphereGeometry(0.5, 32, 32);
            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x0070ff }));
            mesh.position.y = 0.5;
            this.scene.add(mesh);
            this.parts.push(mesh);
            this.selected = mesh;
        },
        updateColor(val) {
            if(this.selected) this.selected.material.color.set(val);
        },
        publish() {
            const name = prompt("Name your masterpiece:");
            if(name) {
                socket.emit('publish-game', { name, creator: 'Cola', mapData: [] });
                alert("Game Published!");
                page.load('games');
            }
        },
        animate() {
            requestAnimationFrame(() => this.animate());
            this.renderer.render(this.scene, this.camera);
        }
    };

    // --- GAME DISCOVERY SYNC ---
    socket.on('sync-games', (games) => {
        const list = document.getElementById('game-display-list');
        list.innerHTML = games.map(g => `
            <div class="card">
                <div class="card-img" style="background: linear-gradient(45deg, #0070ff, #00c6ff)">🎮</div>
                <div class="card-info">
                    <h3>${g.name}</h3>
                    <p style="font-size: 12px; color: #8b949e;">Created by ${g.creator}</p>
                </div>
            </div>
        `).join('');
    });
</script>
</body>
</html>
