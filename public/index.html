<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CubeWorld v3</title>
<script src="/socket.io/socket.io.js"></script>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0b0f16;
    color:white;
}

.app{
    display:grid;
    grid-template-columns:220px 1fr;
    height:100vh;
}

.sidebar{
    background:#111827;
    padding:12px;
}

button{
    width:100%;
    margin:5px 0;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#1f2937;
    color:white;
}

button:hover{
    background:#2b3a55;
}

.main{
    padding:15px;
}

.card{
    background:#111827;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}

.hidden{display:none}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    border:none;
    background:#0f172a;
    color:white;
}

</style>
</head>

<body>

<div id="login">
    <div class="card">
        <h2>CubeWorld Login</h2>
        <input id="u" placeholder="username">
        <input id="p" type="password" placeholder="password">
        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
    </div>
</div>

<div class="app hidden" id="app">

<div class="sidebar">
    <button onclick="show('home')">Home</button>
    <button onclick="show('games')">Games</button>
    <button onclick="show('studio')">Studio</button>
    <button onclick="show('admin')">Admin</button>
</div>

<div class="main">

<div id="home">
    <div class="card">
        Welcome <span id="user"></span>
    </div>
</div>

<div id="games" class="hidden">
    <div class="card">
        <button onclick="createGame()">Create Game</button>
        <div id="gameList"></div>
    </div>
</div>

<div id="studio" class="hidden">
    <div class="card">
        Studio Mode
        <button onclick="saveWorld()">Save World</button>
    </div>
</div>

<div id="admin" class="hidden">
    <div class="card">
        Admin Panel
        <input id="banUser" placeholder="user">
        <button onclick="ban()">Ban</button>
    </div>
</div>

</div>
</div>

<script>

const socket = io();
let user = "";

/* AUTH */
async function register(){
    await fetch("/api/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:u.value,
            password:p.value
        })
    });
}

async function login(){

    const res = await fetch("/api/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:u.value,
            password:p.value
        })
    });

    const data = await res.json();

    if(data.success){
        user = data.user;

        login.style.display="none";
        app.classList.remove("hidden");

        document.getElementById("user").innerText = user;
    }
}

/* NAV */
function show(id){
    document.querySelectorAll(".main > div").forEach(d=>d.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

/* GAMES */
async function createGame(){

    await fetch("/api/games/create",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            title:"New Game",
            creator:user
        })
    });
}

/* STUDIO */
function saveWorld(){
    fetch("/api/world/save",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            gameId:"1",
            data:{blocks:10}
        })
    });
}

/* ADMIN */
function ban(){
    fetch("/api/admin/ban",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            admin:user,
            user:banUser.value
        })
    });
}

</script>

</body>
</html>
