<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CubeWorld | CubeCity Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0b0d11;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: linear-gradient(135px, #0066ff, #00d4ff);
            --text: #ffffff;
            --dim: #a0a7b1;
            --radius: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; }

        /* MODERN UI LAYOUT */
        .app { display: grid; grid-template-columns: 280px 1fr 280px; height: 100vh; padding: 15px; gap: 15px; }

        /* GLASS PANELS */
        .panel { 
            background: var(--glass); 
            backdrop-filter: blur(12px); 
            border: 1px solid var(--glass-border); 
            border-radius: var(--radius);
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar { padding: 25px; }
        .logo { font-size: 22px; font-weight: 600; margin-bottom: 30px; letter-spacing: -1px; }
        .logo span { color: #0066ff; }
        
        .nav-item { 
            padding: 14px 18px; border-radius: 12px; cursor: pointer; color: var(--dim); 
            transition: 0.3s; font-size: 14px; margin-bottom: 5px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: var(--accent); color: white; font-weight: 600; }

        /* MAIN CONTENT */
        main { padding: 10px; overflow-y: auto; }
        .view { display: none; }
        .view.active { display: block; }

        .featured-hero { 
            height: 220px; background: var(--accent); border-radius: 20px; 
            padding: 40px; position: relative; margin-bottom: 30px;
            box-shadow: 0 15px 40px rgba(0, 102, 255, 0.2);
        }

        /* DISCOVER GRID */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .game-card { 
            background: var(--glass); border: 1px solid var(--glass-border); 
            border-radius: 15px; padding: 15px; transition: 0.3s; cursor: pointer;
        }
        .game-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.07); }
        .game-thumb { height: 120px; background: #1c1f26; border-radius: 10px; margin-bottom: 12px; overflow: hidden; }

        /* FRIENDS PANEL */
        .friends-list { padding: 20px; }
        .friend-item { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .status { width: 10px; height: 10px; border-radius: 50%; background: #2ecc71; }

        /* AUTH OVERLAY */
        #auth-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card { background: #15171c; width: 380px; padding: 40px; border-radius: 25px; text-align: center; border: 1px solid #2d333d; }
        input { 
            width: 100%; padding: 14px; background: #0b0d11; border: 1px solid #2d333d; 
            border-radius: 12px; color: white; margin-bottom: 15px; outline: none;
        }
        .btn { 
            background: var(--accent); color: white; border: none; padding: 12px 25px; 
            border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h1 class="logo">Cube<span>World</span></h1>
        <p style="color:var(--dim); margin-bottom: 25px; font-size: 14px;">Log in to any shared account.</p>
        <input id="login-u" type="text" placeholder="Username">
        <input id="login-p" type="password" placeholder="Password">
        <button class="btn" onclick="core.login()">Enter Engine</button>
    </div>
</div>

<div class="app">
    <aside class="panel sidebar">
        <div class="logo">Cube<span>World</span></div>
        <div class="nav-item active" onclick="core.nav('home', this)">Home</div>
        <div class="nav-item" onclick="core.nav('discover', this)">Discover</div>
        <div class="nav-item" onclick="core.nav('studio', this)">Studio</div>
        <div class="nav-item" onclick="core.nav('social', this)">Messages</div>
        <div class="nav-item" style="margin-top: auto; color: #ff4757;" onclick="core.logout()">Logout</div>
    </aside>

    <main>
        <section id="view-home" class="view active">
            <div class="featured-hero">
                <span style="font-size: 12px; font-weight: 600; opacity: 0.8; text-transform: uppercase;">Featured</span>
                <h1 style="font-size: 32px; margin-top: 5px;">CubeCity Beta</h1>
                <p style="opacity: 0.9;">Explore the first official multiplayer city.</p>
                <button class="btn" style="width: auto; margin-top: 20px; background: white; color: #0066ff;">Play Now</button>
            </div>

            <h3 style="margin-bottom: 15px;">New Arrivals</h3>
            <div class="game-grid" id="discover-grid">
                <div class="game-card">
                    <div class="game-thumb" style="background: url('https://via.placeholder.com/200x120/0066ff/ffffff?text=CubeCity') center/cover;"></div>
                    <b>CubeCity</b><br>
                    <span style="font-size: 12px; color: var(--dim);">By Official</span>
                </div>
            </div>
        </section>

        <section id="view-discover" class="view">
            <h2>Discover</h2>
            <div class="game-grid" style="margin-top: 20px;">
                </div>
        </section>

        <section id="view-studio" class="view">
            <div class="panel" style="padding: 40px; text-align: center;">
                <h2>Studio Engine</h2>
                <p style="color: var(--dim); margin: 15px 0;">Create 3D objects and publish your own maps.</p>
                <button class="btn" style="width: 200px;" onclick="core.launchStudio()">Launch Studio</button>
            </div>
        </section>
    </main>

    <aside class="panel friends-list">
        <h3 style="font-size: 16px; margin-bottom: 20px;">Friends</h3>
        <div id="friend-box">
            <div class="friend-item">
                <div class="status"></div>
                <div style="font-size: 14px;">BloxColaYT</div>
            </div>
            <div class="friend-item">
                <div class="status" style="background: #555;"></div>
                <div style="font-size: 14px; color: var(--dim);">Guest_302</div>
            </div>
        </div>
        <button class="btn" style="margin-top: auto; font-size: 12px; background: var(--glass);" onclick="core.addFriend()">+ Add Friend</button>
    </aside>
</div>

<script>
    const socket = io();
    let user = JSON.parse(localStorage.getItem('cw_user'));

    const core = {
        init() {
            if (user) {
                document.getElementById("auth-overlay").classList.add("hidden");
                // Load user preferences here
            }
        },

        login() {
            const u = document.getElementById("login-u").value;
            const p = document.getElementById("login-p").value;
            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            }).then(res => res.json()).then(data => {
                if (data.success) {
                    localStorage.setItem('cw_user', JSON.stringify({name: data.user, role: data.role}));
                    location.reload();
                } else {
                    alert(data.message);
                }
            });
        },

        logout() {
            localStorage.removeItem('cw_user');
            location.reload();
        },

        nav(id, el) {
            const target = document.getElementById("view-" + id);
            if (!target) return;
            document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
            document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
            target.classList.add("active");
            el.classList.add("active");
        },

        addFriend() {
            const name = prompt("Enter username:");
            if (name) {
                const box = document.getElementById("friend-box");
                box.innerHTML += `
                    <div class="friend-item">
                        <div class="status" style="background: #f1c40f;"></div>
                        <div style="font-size: 14px;">${name}</div>
                    </div>
                `;
            }
        },

        launchStudio() {
            alert("Studio Engine v0.9.0 Launching...");
            // Existing 3D Logic goes here
        }
    };

    core.init();
</script>
</body>
</html>
