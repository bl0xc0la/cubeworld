<!DOCTYPE html>
<html>
<head>
    <title>CubeWorld V3 Professional</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <style>
        :root { --bg: #0b0e14; --panel: #12161f; --accent: #3b82f6; --text: #fff; --border: #1e293b; }
        .neon-theme { --bg: #001a00; --panel: #002b00; --accent: #00ff00; --border: #00ff00; }
        .white-theme { --bg: #f0f2f5; --panel: #fff; --accent: #0070ff; --text: #000; --border: #ddd; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; height: 100vh; padding: 15px; gap: 15px; }
        
        #sidebar { width: 250px; background: var(--panel); border-radius: 15px; padding: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        main { flex: 1; background: var(--panel); border-radius: 20px; padding: 30px; border: 1px solid var(--border); overflow-y: auto; position: relative; }
        
        .page { display: none; }
        .active { display: block; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; color: #888; }
        .nav-item:hover, .active-nav { background: rgba(255,255,255,0.05); color: #fff; }

        /* STUDIO */
        #viewport { width: 100%; height: 400px; background: #000; border-radius: 10px; margin-top: 15px; }
        #script-editor { width: 100%; height: 150px; background: #050505; color: #00ff00; font-family: monospace; padding: 10px; border: 1px solid var(--border); margin-top: 10px; }
        
        /* SHOP */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item-card { background: var(--bg); padding: 15px; border-radius: 10px; border: 1px solid var(--border); text-align: center; }

        .btn { background: var(--accent); color: #fff; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body id="body">

<div id="sidebar">
    <h2 style="margin-bottom:20px">CUBEWORLD</h2>
    <div class="nav-item active-nav" onclick="nav('games')">Games</div>
    <div class="nav-item" onclick="nav('studio')">Studio Workspace</div>
    <div class="nav-item" onclick="nav('shop')">Avatar Shop</div>
    <div class="nav-item" onclick="nav('admin')">Admin Panel</div>
    <div class="nav-item" onclick="nav('settings')">Settings</div>
    <div style="margin-top:auto">Cubes: <span id="cubes">0</span></div>
</div>

<main>
    <div id="page-games" class="page active">
        <h1>Discover Games</h1>
        <div id="game-list"></div>
    </div>

    <div id="page-studio" class="page">
        <h2>Studio V3</h2>
        <div id="viewport"></div>
        <div style="display:flex; gap:10px; margin-top:10px">
            <input id="sx" placeholder="X Scale" value="1.5" style="width:60px">
            <input id="sy" placeholder="Y Scale" value="1.5" style="width:60px">
            <input id="sz" placeholder="Z Scale" value="1.5" style="width:60px">
            <input type="color" id="pcol" value="#3b82f6">
            <button onclick="studio.spawn()" style="flex:1">Spawn Part</button>
        </div>
        <textarea id="script-editor">-- Luau Scripting
print("Hello Cubeworld!")
local part = getSelectedPart()
part.Color = Color3.fromRGB(255, 0, 0)</textarea>
    </div>

    <div id="page-shop" class="page">
        <h1>Avatar Shop</h1>
        <div class="shop-grid">
            <div class="item-card">
                <h3>Red Classic Cap</h3>
                <p>150 Cubes</p>
                <button class="btn" onclick="buy('red_cap')">Buy Now</button>
            </div>
        </div>
    </div>

    <div id="page-settings" class="page">
        <h1>Themes</h1>
        <button class="btn" onclick="setTheme('dark')">Dark Mode</button>
        <button class="btn" style="background:#238636" onclick="setTheme('neon')">Neon Green</button>
        <button class="btn" style="background:#fff; color:#000" onclick="setTheme('white')">White Mode</button>
    </div>

    <div id="page-admin" class="page">
        <h1>Admin Panel</h1>
        <div id="admin-content">Access Granted. Welcome, Admin.</div>
    </div>
</main>

<script>
    const socket = io();
    let user = "BloxColaYT";
    let selectedPart = null;

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        if(id === 'studio') studio.init();
    }

    function setTheme(t) {
        document.getElementById('body').className = t + '-theme';
    }

    const studio = {
        scene: new THREE.Scene(), objects: [],
        init() {
            if(this.renderer) return;
            const div = document.getElementById('viewport');
            this.cam = new THREE.PerspectiveCamera(75, div.clientWidth/div.clientHeight, 0.1, 1000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(div.clientWidth, div.clientHeight);
            div.appendChild(this.renderer.domElement);
            
            this.scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x222222));
            this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            this.cam.position.set(5, 5, 5);
            this.cam.lookAt(0,0,0);

            // X, Y, Z ARROWS (Gizmos)
            this.gizmo = new THREE.TransformControls(this.cam, this.renderer.domElement);
            this.scene.add(this.gizmo);

            this.render();
        },
        spawn() {
            const x = parseFloat(document.getElementById('sx').value);
            const y = parseFloat(document.getElementById('sy').value);
            const z = parseFloat(document.getElementById('sz').value);
            const col = document.getElementById('pcol').value;

            const mesh = new THREE.Mesh(new THREE.BoxGeometry(x, y, z), new THREE.MeshStandardMaterial({ color: col }));
            this.scene.add(mesh);
            this.objects.push(mesh);
            this.gizmo.attach(mesh); // Add arrows to part
            selectedPart = mesh;
        },
        render() {
            requestAnimationFrame(() => this.render());
            this.renderer.render(this.scene, this.cam);
        }
    };

    function buy(id) { socket.emit('buy-item', { username: user, itemId: id }); }

    socket.on('user-data', data => {
        document.getElementById('cubes').innerText = data.cubes;
        if(!data.isAdmin) document.getElementById('admin-content').innerText = "Access Denied.";
    });

    socket.emit('get-user', user);
</script>
</body>
</html>
