<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeWorld</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <style>
        :root {
            --bg: #0b0e14;
            --card: #161b22;
            --primary: #3b82f6;
            --accent: #10b981;
            --text: #f9fafb;
            --text-dim: #9ca3af;
            --border: #30363d;
        }

        * { margin:0; padding:0; box-sizing:border-box; outline:none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Navigation Sidebar */
        .wrapper { display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        
        .nav-link { padding: 12px 16px; border-radius: 8px; color: var(--text-dim); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--border); color: var(--text); }
        .nav-link.active { border-left: 4px solid var(--primary); }

        /* Main Area */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
        .page { display: none; animation: slideUp 0.4s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Studio Viewport */
        #viewport { width: 100%; height: 500px; background: #000; border-radius: 12px; border: 1px solid var(--border); position: relative; }
        .studio-tools { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
        
        /* Components */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .game-thumb { aspect-ratio: 16/9; background: var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
        
        .btn { padding: 12px 24px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn-p { background: var(--primary); color: white; }
        .btn-p:hover { filter: brightness(1.2); }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { width: 400px; padding: 40px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
        .input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 16px; }

        .badge-admin { background: #ef4444; font-size: 10px; padding: 2px 6px; border-radius: 4px; vertical-align: middle; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="margin-bottom: 8px;">CubeWorld</h1>
            <p style="color: var(--text-dim); margin-bottom: 24px;">Login or create an account</p>
            <input type="text" id="user-in" class="input" placeholder="Username">
            <input type="password" id="pass-in" class="input" placeholder="Password">
            <div class="h-captcha" data-sitekey="4d00da62-6dd2-434e-8e1a-1a8279c8321c"></div>
            <button class="btn btn-p" style="width: 100%; margin-top: 20px;" onclick="auth('login')">Login</button>
            <button class="btn" style="width: 100%; color: var(--text-dim);" onclick="auth('register')">Sign Up</button>
        </div>
    </div>

    <div class="wrapper">
        <div class="sidebar">
            <div class="logo"><i class="fas fa-cubes"></i> CubeWorld</div>
            <div class="nav-link active" onclick="tab('home', this)"><i class="fas fa-home"></i> Home</div>
            <div class="nav-link" onclick="tab('games', this)"><i class="fas fa-gamepad"></i> Games</div>
            <div class="nav-link" onclick="tab('studio', this)"><i class="fas fa-pencil-ruler"></i> Studio</div>
            <div class="nav-link" onclick="tab('social', this)"><i class="fas fa-users"></i> Social</div>
            
            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
                <div id="me-display" style="font-weight: 800;"></div>
                <div style="color: var(--accent); font-size: 14px;"><i class="fas fa-coins"></i> <span id="cc-bal">0</span> CC</div>
            </div>
        </div>

        <div class="main-content">
            <div id="page-home" class="page active">
                <div class="card">
                    <h2>Hello, <span class="me-name">Developer</span>!</h2>
                    <p style="color: var(--text-dim);">The community has created 12 new items today.</p>
                </div>
            </div>

            <div id="page-games" class="page">
                <h2 style="margin-bottom: 24px;">Discover</h2>
                <div class="grid" id="game-list">
                    </div>
            </div>

            <div id="page-studio" class="page">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2>Studio Editor</h2>
                    <div>
                        <button class="btn btn-p" onclick="saveGame()">Save Map</button>
                    </div>
                </div>
                <div id="viewport">
                    <div class="studio-tools">
                        <button class="btn btn-p" style="padding: 8px 16px;" onclick="addPart()">+ Part</button>
                        <button class="btn" style="padding: 8px 16px; background: var(--card);" onclick="changeColor()">Color</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        let user = null;
        let scene, camera, renderer, blocks = [];

        // --- AUTH LOGIC ---
        window.auth = async (type) => {
            const u = document.getElementById('user-in').value;
            const p = document.getElementById('pass-in').value;
            const res = await fetch(`/api/${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p, captchaToken: hcaptcha.getResponse()})
            });
            const data = await res.json();
            if(data.success) {
                if(type === 'register') return alert("Account created! Now login.");
                user = data.user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('me-display').innerText = user.username;
                if(user.isAdmin) document.getElementById('me-display').innerHTML += ' <span class="badge-admin">ADMIN</span>';
                document.getElementById('cc-bal').innerText = user.balance;
                initStudio();
            } else alert(data.message);
        };

        // --- NAVIGATION ---
        window.tab = (id, el) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.add('active');
            el.classList.add('active');
        };

        // --- STUDIO LOGIC ---
        function initStudio() {
            const container = document.getElementById('viewport');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0b0e14);
            
            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);
            camera.lookAt(0,0,0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            const grid = new THREE.GridHelper(20, 20, 0x30363d, 0x30363d);
            scene.add(grid);

            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.addPart = () => {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0x3b82f6 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(Math.floor(Math.random()*5), 0.5, Math.floor(Math.random()*5));
            scene.add(mesh);
            blocks.push({ x: mesh.position.x, y: mesh.position.y, z: mesh.position.z, color: 0x3b82f6 });
        };

        window.saveGame = async () => {
            const title = prompt("Map Title:");
            if(!title) return;
            await fetch('/api/studio/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title, creator: user.username, blocks })
            });
            alert("Map Saved to Cloud!");
        };
    </script>
</body>
</html>
