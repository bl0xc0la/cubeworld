<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CubeWorld v2</title>

<script src="/socket.io/socket.io.js"></script>

<style>

:root{
    --bg:#0b0f16;
    --panel:rgba(20,25,35,0.75);
    --stroke:rgba(255,255,255,0.08);
    --accent:#3b82f6;
    --shadow:0 10px 30px rgba(0,0,0,0.5);
    --radius:14px;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:white;
}

/* GLASS UI */
.card{
    background:var(--panel);
    border:1px solid var(--stroke);
    border-radius:var(--radius);
    padding:14px;
    box-shadow:var(--shadow);
    backdrop-filter:blur(10px);
}

/* LAYOUT */
.app{
    display:grid;
    grid-template-columns:220px 1fr;
    height:100vh;
}

.sidebar{
    padding:12px;
    background:rgba(15,18,25,0.9);
    border-right:1px solid var(--stroke);
}

button{
    width:100%;
    margin:6px 0;
    padding:10px;
    border:none;
    border-radius:12px;
    background:#1a2233;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#24324d;
}

.main{
    padding:16px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:10px;
}

/* STUDIO */
#studio{
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    z-index:999;
}

#studioUI{
    position:absolute;
    top:10px;
    left:10px;
    width:260px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    border:none;
    background:#111827;
    color:white;
}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">
    <h3>CubeWorld</h3>
    <button onclick="show('home')">Home</button>
    <button onclick="show('games')">Games</button>
    <button onclick="openStudio()">Studio</button>
    <button onclick="show('admin')" id="adminBtn" style="display:none">Admin</button>
</div>

<div class="main">

<div id="home">
    <div class="card">
        Logged in as <span id="user"></span>
    </div>
</div>

<div id="games" style="display:none">
    <div class="card">
        Join Game
        <input id="gameId" placeholder="Game ID">
        <button onclick="joinGame()">Join</button>
    </div>

    <div class="grid">
        <div class="card">City Life</div>
        <div class="card">Obby World</div>
    </div>
</div>

<div id="admin" style="display:none">
    <div class="card">
        Admin Panel
        <input id="banUser" placeholder="user to ban">
        <button onclick="ban()">Ban User</button>
    </div>
</div>

</div>
</div>

<!-- STUDIO -->
<div id="studio">
    <div id="studioUI" class="card">
        Studio Mode
        <button onclick="addBlock()">Add Block</button>
        <button onclick="exitStudio()">Exit</button>
    </div>
</div>

<script>

const socket = io();
let user = prompt("username:");

document.getElementById("user").innerText = user;

if(user === "BloxColaYT"){
    document.getElementById("adminBtn").style.display = "block";
}

/* NAV */
function show(id){
    document.querySelectorAll('.main > div').forEach(d=>d.style.display="none");
    document.getElementById(id).style.display="block";
}

/* MULTIPLAYER */
function joinGame(){
    let id = document.getElementById("gameId").value;
    socket.emit("joinGame",{gameId:id,user});
    alert("joined " + id);
}

/* ADMIN */
function ban(){
    fetch("/api/admin/ban",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            user:document.getElementById("banUser").value,
            admin:user
        })
    });
}

/* STUDIO */
function openStudio(){
    document.getElementById("studio").style.display="block";
}

function exitStudio(){
    document.getElementById("studio").style.display="none";
}

function addBlock(){
    socket.emit("studioUpdate",{type:"block",user});
}

</script>

</body>
</html>
