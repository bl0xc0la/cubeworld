<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CubeWorld v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg:#0e1116;
    --panel:#151a22;
    --panel2:#11151c;
    --text:#e6e6e6;
    --muted:#8b8b8b;
    --accent:#3b82f6;
    --shadow:0 6px 18px rgba(0,0,0,0.35);
    --radius:0.3rem;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* LAYOUT */
.app{
    display:grid;
    grid-template-columns:220px 1fr;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    background:var(--panel);
    padding:12px;
    box-shadow:var(--shadow);
}

.brand{
    font-weight:bold;
    margin-bottom:15px;
}

.nav button{
    width:100%;
    padding:10px;
    margin-bottom:6px;
    border:none;
    background:var(--panel2);
    color:var(--text);
    border-radius:var(--radius);
    cursor:pointer;
    box-shadow:var(--shadow);
}

.nav button:hover{
    background:#1a2230;
}

/* MAIN */
.main{
    padding:18px;
}

/* CARD */
.card{
    background:var(--panel);
    padding:12px;
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    margin-bottom:12px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:10px;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin:6px 0;
    background:#0f141c;
    border:1px solid #222;
    color:white;
    border-radius:var(--radius);
}

/* BUTTON */
button{
    padding:10px;
    border:none;
    background:var(--accent);
    color:white;
    border-radius:var(--radius);
    cursor:pointer;
    box-shadow:var(--shadow);
}

button:hover{
    opacity:0.9;
}

/* HIDDEN */
.hidden{display:none}

/* CHAT */
.chatBox{
    height:220px;
    overflow:auto;
    background:#0f141c;
    padding:10px;
    border-radius:var(--radius);
    border:1px solid #222;
}

/* ADMIN */
.admin{
    border:1px solid #3b82f6;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="brand">CubeWorld v2</div>

    <div class="nav">
        <button onclick="show('home')">Home</button>
        <button onclick="show('games')">Games</button>
        <button onclick="show('friends')">Friends</button>
        <button onclick="show('dm')">DMs</button>
        <button onclick="show('admin')" id="adminBtn" class="hidden">Admin</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home" class="page">
    <div class="card">
        Welcome to CubeWorld v2
        <div id="userInfo"></div>
    </div>
</div>

<!-- GAMES -->
<div id="games" class="page hidden">
    <div class="card">
        Games
    </div>

    <div class="grid">
        <div class="card">City Life</div>
        <div class="card">Sword Fight</div>
        <div class="card">Obby</div>
    </div>
</div>

<!-- FRIENDS -->
<div id="friends" class="page hidden">
    <div class="card">
        Add Friend
        <input id="friendName" placeholder="username">
        <button onclick="addFriend()">Add</button>
    </div>

    <div class="card">
        Friend List
        <div id="friendList"></div>
    </div>
</div>

<!-- DM -->
<div id="dm" class="page hidden">
    <div class="card">
        DM System
        <input id="dmUser" placeholder="user">
        <input id="dmMsg" placeholder="message">
        <button onclick="sendDM()">Send</button>
    </div>

    <div class="card">
        Messages
        <div id="dmBox" class="chatBox"></div>
    </div>
</div>

<!-- ADMIN -->
<div id="admin" class="page hidden admin">
    <div class="card">
        Admin Panel (BloxColaYT)
    </div>

    <div class="card">
        <button onclick="broadcast()">Send Global Message</button>
        <button onclick="clearData()">Clear Local Data</button>
    </div>

    <div class="card">
        Logs
        <div id="logs" class="chatBox"></div>
    </div>
</div>

</div>
</div>

<script>

let user = prompt("Enter username:");
let friends = [];
let dms = [];

/* ADMIN CHECK */
if(user === "BloxColaYT"){
    document.getElementById("adminBtn").classList.remove("hidden");
}

/* UI INIT */
document.getElementById("userInfo").innerText = "Logged in as: " + user;

/* NAV */
function show(page){
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
    document.getElementById(page).classList.remove("hidden");
}

/* FRIENDS */
function addFriend(){
    let f = document.getElementById("friendName").value;
    if(!f) return;

    friends.push(f);
    renderFriends();
}

function renderFriends(){
    document.getElementById("friendList").innerHTML =
    friends.map(f=>`<div class="card">${f}</div>`).join("");
}

/* DMS */
function sendDM(){
    let u = document.getElementById("dmUser").value;
    let m = document.getElementById("dmMsg").value;

    if(!u || !m) return;

    dms.push({u,m});
    renderDM();
}

function renderDM(){
    document.getElementById("dmBox").innerHTML =
    dms.map(d=>`<div><b>${d.u}:</b> ${d.m}</div>`).join("");
}

/* ADMIN */
function broadcast(){
    let msg = prompt("Global message:");

    log("GLOBAL: " + msg);
}

function clearData(){
    friends = [];
    dms = [];
    renderFriends();
    renderDM();
    log("DATA CLEARED");
}

function log(text){
    document.getElementById("logs").innerHTML +=
    `<div>${text}</div>`;
}

</script>

</body>
</html>
