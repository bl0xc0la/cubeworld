<!DOCTYPE html>
<html>
<head>
<title>CubeWorld</title>
<style>
body { margin:0; font-family:Arial; background:#0f1115; color:white; }
#box { padding:20px; }
button { padding:10px; margin-top:10px; }
</style>
</head>
<body>

<div id="box">
    <h1>CubeWorld v2</h1>

    <button onclick="check()">Check Server</button>

    <p id="out"></p>
</div>

<script>
async function check(){
    const res = await fetch("/api/status");
    const data = await res.json();
    document.getElementById("out").innerText = data.message;
}
</script>

</body>
</html>
